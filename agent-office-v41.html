<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏢 Agent Office v4.1 | REAL MEEBIT SPRITES</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #00d4ff; --green: #22c55e; }
        * { margin: 0; padding: 0; box-sizing: border-box; image-rendering: pixelated; }
        body { font-family: 'VT323', monospace; background: #0a0a0f; color: #fff; overflow: hidden; }
        .header { background: linear-gradient(180deg, #1a0f2e, #2d1b4e); border-bottom: 4px solid var(--accent); padding: 0 1rem; height: 60px; display: flex; justify-content: space-between; align-items: center; position: fixed; top: 0; left: 0; right: 0; z-index: 1000; }
        .logo { display: flex; align-items: center; gap: 10px; }
        .logo-icon { width: 40px; height: 40px; background: var(--accent); border: 3px solid #fff; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
        .logo h1 { font-family: 'Press Start 2P'; font-size: 0.55rem; color: var(--accent); text-shadow: 2px 2px 0 #000; }
        #gameCanvas { position: fixed; top: 60px; left: 0; right: 0; bottom: 0; cursor: grab; }
        #gameCanvas:active { cursor: grabbing; }
        .controls { position: fixed; bottom: 20px; left: 20px; display: flex; gap: 8px; z-index: 100; }
        .btn { padding: 12px 16px; background: linear-gradient(180deg, #2d1b4e, #1a0f2e); border: 3px solid var(--accent); border-radius: 4px; font-family: 'Press Start 2P'; font-size: 0.4rem; color: #fff; cursor: pointer; box-shadow: 3px 3px 0 rgba(0,0,0,0.3); }
        .btn:hover { background: var(--accent); color: #000; }
        .loading { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: #0a0a0f; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 2000; }
        .loading.hidden { opacity: 0; pointer-events: none; transition: opacity 0.5s; }
        .loading h2 { font-family: 'Press Start 2P'; color: var(--accent); margin-bottom: 20px; }
        .progress { width: 400px; height: 20px; background: #1a1a2e; border: 2px solid var(--accent); border-radius: 4px; overflow: hidden; }
        .progress-bar { height: 100%; background: var(--accent); width: 0%; transition: width 0.3s; }
        .stats { position: fixed; top: 70px; right: 20px; background: rgba(0,0,0,0.9); border: 3px solid var(--accent); border-radius: 8px; padding: 12px; font-family: 'Press Start 2P'; font-size: 0.45rem; }
        .agent-list { position: fixed; top: 60px; right: -300px; width: 280px; height: calc(100% - 60px); background: rgba(10,10,15,0.98); border-left: 3px solid var(--accent); transition: right 0.3s; z-index: 99; overflow-y: auto; padding: 15px; }
        .agent-list.active { right: 0; }
        .agent-card { display: flex; align-items: center; gap: 10px; padding: 10px; margin-bottom: 8px; background: #1a1a2e; border-radius: 6px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="loading" id="loading">
        <h2>🏢 LOADING REAL MEEBITS...</h2>
        <div class="progress"><div class="progress-bar" id="progress"></div></div>
        <div id="loadingText" style="margin-top:15px;color:#888">Fetching sprite sheets...</div>
    </div>

    <header class="header">
        <div class="logo">
            <div class="logo-icon">🏢</div>
            <h1>AGENT OFFICE v4.1</h1>
        </div>
        <div style="font-size:0.7rem;">🟢 REAL MEEBIT SPRITES</div>
    </header>
    
    <canvas id="gameCanvas"></canvas>
    
    <div class="controls">
        <button class="btn" onclick="resetCam()">🎯 RESET</button>
        <button class="btn" onclick="toggleList()">👥 TEAM</button>
        <button class="btn" onclick="toggleView()">🔲 ISO</button>
        <button class="btn" onclick="zoomIn()">➕</button>
        <button class="btn" onclick="zoomOut()">➖</button>
    </div>
    
    <div class="stats">
        <div>AGENTS: <span id="agentCount">0/11</span></div>
        <div>VIEW: <span id="viewLabel">ISO</span></div>
    </div>
    
    <div class="agent-list" id="agentList"></div>

    <script>
        // Curated Meebits - mix of Humans, Pigs, Robots, Visitors
        // Selected for visual variety and cool looks
        const MEEBIT_AGENTS = [
            { id: 'nexus', name: 'Nexus', role: 'Director', meebitId: 1, type: 'Human', x: 0, y: 0 },
            { id: 'glasses', name: 'Glasses', role: 'Research', meebitId: 42, type: 'Human', x: -3, y: -2 },
            { id: 'quill', name: 'Quill', role: 'Writer', meebitId: 100, type: 'Human', x: 3, y: -2 },
            { id: 'pixel', name: 'Pixel', role: 'Artist', meebitId: 200, type: 'Human', x: -5, y: 0 },
            { id: 'gary', name: 'Gary', role: 'Marketing', meebitId: 300, type: 'Human', x: 5, y: 0 },
            { id: 'larry', name: 'Larry', role: 'Social', meebitId: 500, type: 'Pig', x: -3, y: 2 },
            { id: 'sentry', name: 'Sentry', role: 'Engineer', meebitId: 600, type: 'Robot', x: 3, y: 2 },
            { id: 'audit', name: 'Audit', role: 'QA', meebitId: 700, type: 'Visitor', x: -6, y: -4 },
            { id: 'cipher', name: 'Cipher', role: 'Security', meebitId: 800, type: 'Human', x: 6, y: -4 },
            { id: 'limitless', name: 'Limitless', role: 'Trader', meebitId: 1000, type: 'Robot', x: 0, y: -5 },
            { id: 'olivia', name: 'Olivia', role: 'Sales', meebitId: 1500, type: 'Human', x: 0, y: 4 }
        ];

        const ZONES = {
            nexus: { minX: -1, maxX: 1, minY: -1, maxY: 1 },
            glasses: { minX: -5, maxX: -2, minY: -4, maxY: -1 },
            quill: { minX: 2, maxX: 5, minY: -4, maxY: -1 },
            pixel: { minX: -7, maxX: -4, minY: -2, maxY: 2 },
            gary: { minX: 4, maxX: 7, minY: -2, maxY: 2 },
            larry: { minX: -5, maxX: -2, minY: 1, maxY: 4 },
            sentry: { minX: 2, maxX: 5, minY: 1, maxY: 4 },
            audit: { minX: -8, maxX: -5, minY: -6, maxY: -3 },
            cipher: { minX: 5, maxX: 8, minY: -6, maxY: -3 },
            limitless: { minX: -2, maxX: 2, minY: -7, maxY: -4 },
            olivia: { minX: -2, maxX: 2, minY: 3, maxY: 6 }
        };

        // Sprite sheet cache
        const SPRITE_CACHE = {};

        // Load sprite sheet from Meebits API
        async function loadSpriteSheet(meebitId) {
            const url = `https://api.meebits.app/v2/sprites/sheet/${String(meebitId).padStart(5, '0')}`;
            
            return new Promise((resolve) => {
                const img = new Image();
                img.crossOrigin = 'anonymous';
                img.onload = () => resolve(img);
                img.onerror = () => resolve(null);
                img.src = url;
            });
        }

        class Agent {
            constructor(data, spriteSheet) {
                Object.assign(this, data);
                this.tx = data.x;
                this.ty = data.y;
                this.activity = 'idle';
                this.idleTimer = 0;
                this.speech = null;
                this.speechTimer = 0;
                this.dir = 'down';
                this.frame = 0;
                this.animTimer = 0;
                this.spriteSheet = spriteSheet;
                // Sprite sheet layout: typically 4x4 or similar for walk animations
                // Frame 0: front idle, 1: front walk1, 2: front walk2, 3: front walk3
                // We'll use simple extraction
            }

            update(dt, all) {
                this.animTimer += dt;
                if (this.animTimer > 200) {
                    this.animTimer = 0;
                    this.frame = (this.frame + 1) % 4;
                }

                if (this.activity === 'idle') {
                    this.idleTimer += dt;
                    if (this.idleTimer > 2000 + Math.random() * 4000) this.startWalk();
                } else if (this.activity === 'walking') {
                    const dx = this.tx - this.x;
                    const dy = this.ty - this.y;
                    const dist = Math.hypot(dx, dy);
                    if (dist < 0.1) {
                        this.x = this.tx;
                        this.y = this.ty;
                        this.activity = 'idle';
                        this.idleTimer = 0;
                    } else {
                        const s = 2 * dt * 0.001;
                        this.x += (dx / dist) * s;
                        this.y += (dy / dist) * s;
                    }
                }

                if (this.speech) {
                    this.speechTimer -= dt;
                    if (this.speechTimer <= 0) this.speech = null;
                }

                if (this.activity === 'idle' && Math.random() < 0.003) {
                    const nearby = all.filter(a =>
                        a.id !== this.id &&
                        a.activity === 'idle' &&
                        Math.hypot(a.x - this.x, a.y - this.y) < 2
                    );
                    if (nearby.length) {
                        const p = nearby[0];
                        this.activity = 'talking';
                        p.activity = 'talking';
                        const chats = ['Hey!', 'How\'s it?', 'Almost done!', 'Nice!', 'Coffee?', 'Deploy?'];
                        this.speech = chats[Math.floor(Math.random() * chats.length)];
                        this.speechTimer = 3000;
                        p.speech = chats[Math.floor(Math.random() * chats.length)];
                        p.speechTimer = 3000;
                        setTimeout(() => {
                            this.activity = 'idle';
                            p.activity = 'idle';
                        }, 3000);
                    }
                }
            }

            startWalk() {
                const z = ZONES[this.id];
                this.tx = z.minX + Math.random() * (z.maxX - z.minX);
                this.ty = z.minY + Math.random() * (z.maxY - z.minY);
                this.activity = 'walking';
                const dx = this.tx - this.x;
                const dy = this.ty - this.y;
                this.dir = Math.abs(dx) > Math.abs(dy) ? (dx > 0 ? 'right' : 'left') : (dy > 0 ? 'down' : 'up');
            }

            render(ctx, math, cam, vm) {
                const pos = math.toScreen(this.x, this.y, 0);
                const px = (pos.x - cam.x) * cam.zoom;
                const py = (pos.y - cam.y) * cam.zoom;
                const size = 80 * cam.zoom;

                // Shadow
                ctx.fillStyle = 'rgba(0,0,0,0.3)';
                ctx.beginPath();
                ctx.ellipse(px, py + size * 0.4, size * 0.35, size * 0.1, 0, 0, Math.PI * 2);
                ctx.fill();

                // Draw sprite from sheet
                if (this.spriteSheet) {
                    // Sprite sheets are typically 512x512 with multiple frames
                    // Extract front-facing frame (usually top-left area)
                    const frameSize = 128; // Assuming 4x4 grid on 512px sheet
                    const frameX = (this.frame % 4) * frameSize;
                    const frameY = 0; // Front facing row

                    let bob = 0;
                    if (this.activity === 'walking') {
                        bob = Math.sin(this.frame * Math.PI / 2) * 5 * cam.zoom;
                    }

                    ctx.drawImage(
                        this.spriteSheet,
                        frameX, frameY, frameSize, frameSize,
                        px - size / 2, py - size + bob, size, size
                    );
                } else {
                    // Fallback: colored circle with type emoji
                    ctx.fillStyle = '#444';
                    ctx.beginPath();
                    ctx.arc(px, py - size * 0.3, size * 0.4, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.font = `${size * 0.5}px serif`;
                    ctx.textAlign = 'center';
                    const emojis = { 'Human': '👤', 'Pig': '🐷', 'Robot': '🤖', 'Visitor': '👽' };
                    ctx.fillText(emojis[this.type] || '👤', px, py - size * 0.2);
                }

                // Name tag
                ctx.fillStyle = 'rgba(0,0,0,0.8)';
                ctx.fillRect(px - 45, py + size * 0.45, 90, 20);
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 12px monospace';
                ctx.textAlign = 'center';
                ctx.fillText(this.name, px, py + size * 0.45 + 14);

                // Type indicator
                ctx.fillStyle = '#888';
                ctx.font = '10px monospace';
                ctx.fillText(`[${this.type}]`, px, py + size * 0.45 + 32);

                // Speech bubble
                if (this.speech) {
                    const bx = px;
                    const by = py - size * 0.9;
                    ctx.fillStyle = '#fff';
                    ctx.beginPath();
                    ctx.roundRect(bx - 55, by - 15, 110, 28, 10);
                    ctx.fill();
                    ctx.strokeStyle = '#000';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                    ctx.fillStyle = '#000';
                    ctx.font = 'bold 12px monospace';
                    ctx.fillText(this.speech, bx, by + 5);
                    // Tail
                    ctx.fillStyle = '#fff';
                    ctx.beginPath();
                    ctx.moveTo(bx - 6, by + 13);
                    ctx.lineTo(bx + 6, by + 13);
                    ctx.lineTo(bx, by + 22);
                    ctx.fill();
                    ctx.stroke();
                }
            }
        }

        class Game {
            constructor() {
                this.c = document.getElementById('gameCanvas');
                this.ctx = this.c.getContext('2d');
                this.agents = new Map();
                this.cam = { x: 0, y: 0, zoom: 1.0 };
                this.viewMode = 'iso';
                this.lastTime = 0;
                this.blink = false;

                this.iso = {
                    toScreen: (x, y, z) => ({
                        x: (x - y) * 50 + this.c.width / 2,
                        y: (x + y) * 25 - z * 25 + this.c.height / 2.5
                    })
                };
                this.td = {
                    toScreen: (x, y, z) => ({
                        x: x * 70 + this.c.width / 2,
                        y: y * 70 + this.c.height / 2 - z * 30
                    })
                };

                this.setupInput();
                this.resize();
                window.addEventListener('resize', () => this.resize());
            }

            resize() {
                this.c.width = window.innerWidth;
                this.c.height = window.innerHeight - 60;
            }

            setupInput() {
                let d = false, lx, ly;
                this.c.addEventListener('mousedown', e => {
                    const r = this.c.getBoundingClientRect();
                    const mx = e.clientX - r.left, my = e.clientY - r.top;
                    let cl = null;
                    for (const a of this.agents.values()) {
                        const p = this.gm().toScreen(a.x, a.y, 0);
                        const px = (p.x - this.cam.x) * this.cam.zoom;
                        const py = (p.y - this.cam.y) * this.cam.zoom;
                        if (Math.hypot(mx - px, my - (py - 30 * this.cam.zoom)) < 40 * this.cam.zoom) {
                            cl = a;
                            break;
                        }
                    }
                    if (cl) {
                        focusAgent(cl.id);
                    } else {
                        d = true;
                        lx = e.clientX;
                        ly = e.clientY;
                        this.c.style.cursor = 'grabbing';
                    }
                });
                this.c.addEventListener('mousemove', e => {
                    if (!d) return;
                    this.cam.x -= (e.clientX - lx) / this.cam.zoom;
                    this.cam.y -= (e.clientY - ly) / this.cam.zoom;
                    lx = e.clientX;
                    ly = e.clientY;
                });
                this.c.addEventListener('mouseup', () => {
                    d = false;
                    this.c.style.cursor = 'grab';
                });
                this.c.addEventListener('wheel', e => {
                    e.preventDefault();
                    this.cam.zoom = Math.max(0.4, Math.min(2.5, this.cam.zoom * (e.deltaY > 0 ? 0.9 : 1.1)));
                }, { passive: false });
            }

            gm() { return this.viewMode === 'iso' ? this.iso : this.td; }

            async init() {
                // Load all sprite sheets
                const loadingText = document.getElementById('loadingText');
                const progressBar = document.getElementById('progress');
                let loaded = 0;

                for (const data of MEEBIT_AGENTS) {
                    loadingText.textContent = `Loading Meebit #${data.meebitId} (${data.type})...`;
                    const sprite = await loadSpriteSheet(data.meebitId);
                    this.agents.set(data.id, new Agent(data, sprite));
                    loaded++;
                    progressBar.style.width = `${(loaded / MEEBIT_AGENTS.length) * 100}%`;
                }

                document.getElementById('agentCount').textContent = `${loaded}/${MEEBIT_AGENTS.length}`;
                document.getElementById('loading').classList.add('hidden');
                this.renderUI();
                this.start();
            }

            start() {
                const loop = (n) => {
                    const dt = n - this.lastTime;
                    this.lastTime = n;
                    this.blink = Math.sin(n / 150) > 0;
                    this.agents.forEach(a => a.update(dt, Array.from(this.agents.values())));
                    this.render();
                    requestAnimationFrame(loop);
                };
                requestAnimationFrame(loop);
            }

            render() {
                const ctx = this.ctx, c = this.c, m = this.gm();
                ctx.fillStyle = '#0a0a0f';
                ctx.fillRect(0, 0, c.width, c.height);

                // Floor
                for (let x = -10; x <= 10; x++) {
                    for (let y = -10; y <= 10; y++) {
                        const p = m.toScreen(x, y, 0);
                        const cx = (p.x - this.cam.x) * this.cam.zoom;
                        const cy = (p.y - this.cam.y) * this.cam.zoom;
                        const inZone = Object.values(ZONES).some(z =>
                            x >= z.minX && x <= z.maxX &&
                            y >= z.minY && y <= z.maxY
                        );
                        ctx.fillStyle = inZone ?
                            ((x + y) % 2 ? '#C4A77D' : '#D4B88D') :
                            '#1a1a2e';
                        if (this.viewMode === 'topdown') {
                            const ts = 70 * this.cam.zoom;
                            ctx.fillRect(cx - ts / 2, cy - ts / 2, ts, ts);
                        } else {
                            const tw = 50 * this.cam.zoom;
                            const th = 25 * this.cam.zoom;
                            ctx.beginPath();
                            ctx.moveTo(cx, cy);
                            ctx.lineTo(cx + tw, cy + th);
                            ctx.lineTo(cx, cy + th * 2);
                            ctx.lineTo(cx - tw, cy + th);
                            ctx.closePath();
                            ctx.fill();
                        }
                    }
                }

                // Walls
                for (let x = -8; x <= 8; x++) {
                    const p = m.toScreen(x, -9, 0);
                    const cx = (p.x - this.cam.x) * this.cam.zoom;
                    const cy = (p.y - this.cam.y) * this.cam.zoom;
                    ctx.fillStyle = (x % 2) ? '#e6d7b8' : '#d7c8a8';
                    ctx.fillRect(cx - 35 * this.cam.zoom, cy - 80 * this.cam.zoom, 70 * this.cam.zoom, 80 * this.cam.zoom);
                }

                // Windows
                [-5, -1, 3, 7].forEach(wx => {
                    const p = m.toScreen(wx, -9, 0);
                    const cx = (p.x - this.cam.x) * this.cam.zoom;
                    const cy = (p.y - this.cam.y) * this.cam.zoom;
                    ctx.fillStyle = '#87CEEB';
                    ctx.fillRect(cx - 28 * this.cam.zoom, cy - 65 * this.cam.zoom, 56 * this.cam.zoom, 50 * this.cam.zoom);
                    ctx.strokeStyle = '#5c4033';
                    ctx.lineWidth = 3 * this.cam.zoom;
                    ctx.strokeRect(cx - 28 * this.cam.zoom, cy - 65 * this.cam.zoom, 56 * this.cam.zoom, 50 * this.cam.zoom);
                    ctx.beginPath();
                    ctx.moveTo(cx, cy - 65 * this.cam.zoom);
                    ctx.lineTo(cx, cy - 15 * this.cam.zoom);
                    ctx.moveTo(cx - 28 * this.cam.zoom, cy - 40 * this.cam.zoom);
                    ctx.lineTo(cx + 28 * this.cam.zoom, cy - 40 * this.cam.zoom);
                    ctx.stroke();
                });

                // Furniture
                const mt = m.toScreen(0, 0, 0);
                ctx.fillStyle = '#8B4513';
                ctx.beginPath();
                ctx.ellipse((mt.x - this.cam.x) * this.cam.zoom, (mt.y - this.cam.y) * this.cam.zoom, 80 * this.cam.zoom, 40 * this.cam.zoom, 0, 0, Math.PI * 2);
                ctx.fill();

                const pt = m.toScreen(7, -3, 0);
                ctx.fillStyle = '#228B22';
                ctx.fillRect((pt.x - this.cam.x) * this.cam.zoom - 70 * this.cam.zoom, (pt.y - this.cam.y) * this.cam.zoom - 35 * this.cam.zoom, 140 * this.cam.zoom, 70 * this.cam.zoom);
                ctx.strokeStyle = '#8B4513';
                ctx.lineWidth = 8 * this.cam.zoom;
                ctx.strokeRect((pt.x - this.cam.x) * this.cam.zoom - 70 * this.cam.zoom, (pt.y - this.cam.y) * this.cam.zoom - 35 * this.cam.zoom, 140 * this.cam.zoom, 70 * this.cam.zoom);

                const sr = m.toScreen(7, 4, 0);
                ctx.fillStyle = '#1a1a2e';
                ctx.fillRect((sr.x - this.cam.x) * this.cam.zoom - 60 * this.cam.zoom, (sr.y - this.cam.y) * this.cam.zoom - 50 * this.cam.zoom, 120 * this.cam.zoom, 100 * this.cam.zoom);
                for (let r = 0; r < 2; r++) {
                    ctx.fillStyle = '#333';
                    ctx.fillRect((sr.x - this.cam.x) * this.cam.zoom - 55 * this.cam.zoom + r * 60 * this.cam.zoom, (sr.y - this.cam.y) * this.cam.zoom - 45 * this.cam.zoom, 50 * this.cam.zoom, 90 * this.cam.zoom);
                    for (let i = 0; i < 6; i++) {
                        ctx.fillStyle = this.blink ? '#0f0' : '#0a0';
                        ctx.fillRect((sr.x - this.cam.x) * this.cam.zoom - 50 * this.cam.zoom + r * 60 * this.cam.zoom, (sr.y - this.cam.y) * this.cam.zoom - 40 * this.cam.zoom + i * 14 * this.cam.zoom, 12 * this.cam.zoom, 8 * this.cam.zoom);
                    }
                }
                ctx.fillStyle = '#0f0';
                ctx.font = `${10 * this.cam.zoom}px monospace`;
                ctx.textAlign = 'center';
                ctx.fillText('MEMORY', (sr.x - this.cam.x) * this.cam.zoom, (sr.y - this.cam.y) * this.cam.zoom - 55 * this.cam.zoom);

                // Agents (sorted by Y)
                Array.from(this.agents.values())
                    .sort((a, b) => (a.y + a.x) - (b.y + b.x))
                    .forEach(a => a.render(ctx, m, this.cam, this.viewMode));
            }

            renderUI() {
                const list = document.getElementById('agentList');
                list.innerHTML = MEEBIT_AGENTS.map(a => {
                    const agent = this.agents.get(a.id);
                    const hasSprite = agent && agent.spriteSheet;
                    return `
                        <div class="agent-card" onclick="focusAgent('${a.id}')">
                            <div style="width:50px;height:50px;background:${hasSprite ? '#333' : '#1a1a2e'};border:2px solid ${hasSprite ? '#0f0' : '#666'};display:flex;align-items:center;justify-content:center;font-size:1.5rem;border-radius:4px;">
                                ${hasSprite ? '✓' : '○'}
                            </div>
                            <div>
                                <div style="font-weight:bold;">${a.name}</div>
                                <div style="font-size:0.8rem;color:#888;">${a.role} | ${a.type}</div>
                                <div style="font-size:0.7rem;color:${hasSprite ? '#0f0' : '#888'};">#${a.meebitId} ${hasSprite ? '✓ LOADED' : '○ FALLBACK'}</div>
                            </div>
                        </div>
                    `;
                }).join('');
            }
        }

        let game;

        function init() {
            game = new Game();
            game.init();
        }

        function resetCam() {
            game.cam.x = 0;
            game.cam.y = 0;
            game.cam.zoom = 1.0;
        }

        function toggleList() {
            document.getElementById('agentList').classList.toggle('active');
        }

        function toggleView() {
            game.viewMode = game.viewMode === 'iso' ? 'topdown' : 'iso';
            game.cam.x = 0;
            game.cam.y = 0;
            document.getElementById('viewLabel').textContent = game.viewMode === 'iso' ? 'ISO' : 'TOP';
        }

        function zoomIn() {
            game.cam.zoom = Math.min(2.5, game.cam.zoom * 1.2);
        }

        function zoomOut() {
            game.cam.zoom = Math.max(0.4, game.cam.zoom / 1.2);
        }

        function focusAgent(id) {
            const a = game.agents.get(id);
            if (!a) return;
            if (game.viewMode === 'topdown') {
                game.cam.x = a.x * 70;
                game.cam.y = a.y * 70;
            } else {
                game.cam.x = (a.x - a.y) * 50;
                game.cam.y = (a.x + a.y) * 25 - 80;
            }
            game.cam.zoom = 2.0;
        }

        window.addEventListener('load', init);
    </script>
</body>
</html>
