<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏢 Agent Office v6.0 | KAIROSOFT + CHAT + GOSSIP</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #00d4ff; --green: #22c55e; --pink: #ff6b9d; --kairo-brown: #8B7355; }
        * { margin: 0; padding: 0; box-sizing: border-box; image-rendering: pixelated; }
        body { font-family: 'VT323', monospace; background: #1a1a2e; color: #fff; overflow: hidden; }
        .header { background: linear-gradient(180deg, #2d1b4e, #1a0f2e); border-bottom: 4px solid var(--accent); padding: 0 1rem; height: 60px; display: flex; justify-content: space-between; align-items: center; position: fixed; top: 0; left: 0; right: 0; z-index: 1000; }
        .logo { display: flex; align-items: center; gap: 10px; }
        .logo-icon { width: 40px; height: 40px; background: var(--accent); border: 3px solid #fff; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
        .logo h1 { font-family: 'Press Start 2P'; font-size: 0.55rem; color: var(--accent); }
        #gameCanvas { position: fixed; top: 60px; left: 0; right: 0; bottom: 0; cursor: grab; }
        #gameCanvas:active { cursor: grabbing; }
        .controls { position: fixed; bottom: 20px; left: 20px; display: flex; gap: 8px; z-index: 100; flex-wrap: wrap; }
        .btn { padding: 12px 16px; background: linear-gradient(180deg, #2d1b4e, #1a0f2e); border: 3px solid var(--accent); border-radius: 4px; font-family: 'Press Start 2P'; font-size: 0.4rem; color: #fff; cursor: pointer; }
        .btn:hover { background: var(--accent); color: #000; }
        .loading { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: #1a1a2e; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 2000; }
        .loading.hidden { opacity: 0; pointer-events: none; transition: opacity 0.5s; }
        .loading h2 { font-family: 'Press Start 2P'; color: var(--accent); margin-bottom: 20px; }
        .progress { width: 400px; height: 20px; background: #2a1b3d; border: 2px solid var(--accent); border-radius: 4px; overflow: hidden; }
        .progress-bar { height: 100%; background: var(--accent); width: 0%; transition: width 0.3s; }
        .stats { position: fixed; top: 70px; right: 20px; background: rgba(0,0,0,0.9); border: 3px solid var(--accent); border-radius: 8px; padding: 12px; font-family: 'Press Start 2P'; font-size: 0.45rem; }
        .chat-overlay { position: fixed; top: 70px; left: 20px; max-width: 320px; max-height: 300px; overflow-y: auto; background: rgba(0,0,0,0.9); border: 2px solid var(--pink); border-radius: 8px; padding: 10px; z-index: 100; }
        .chat-message { margin-bottom: 6px; padding: 6px; background: rgba(255,255,255,0.1); border-radius: 4px; font-size: 0.8rem; }
        .chat-name { color: var(--accent); font-weight: bold; }
        .chat-input-box { position: fixed; bottom: 80px; left: 20px; width: 300px; background: rgba(0,0,0,0.95); border: 2px solid var(--accent); border-radius: 8px; padding: 10px; z-index: 101; display: none; }
        .chat-input-box.active { display: block; }
        .chat-input-box h4 { color: var(--accent); margin-bottom: 8px; font-family: 'Press Start 2P'; font-size: 0.5rem; }
        .chat-input-box input { width: 100%; padding: 8px; background: #1a1a2e; border: 1px solid var(--accent); color: #fff; font-family: 'VT323'; font-size: 1rem; margin-bottom: 8px; }
        .chat-input-box button { padding: 6px 12px; background: var(--accent); border: none; color: #000; font-family: 'Press Start 2P'; font-size: 0.4rem; cursor: pointer; margin-right: 5px; }
        .gossip-panel { position: fixed; top: 70px; right: 20px; width: 280px; max-height: 400px; overflow-y: auto; background: rgba(45,27,78,0.95); border: 3px solid var(--pink); border-radius: 8px; padding: 12px; z-index: 102; display: none; }
        .gossip-panel.active { display: block; }
        .gossip-panel h3 { color: var(--pink); font-family: 'Press Start 2P'; font-size: 0.55rem; margin-bottom: 10px; }
        .gossip-item { padding: 8px; margin-bottom: 8px; background: rgba(0,0,0,0.3); border-left: 3px solid var(--pink); font-size: 0.85rem; }
        .agent-list { position: fixed; top: 60px; right: -320px; width: 300px; height: calc(100% - 60px); background: rgba(10,10,15,0.98); border-left: 3px solid var(--accent); transition: right 0.3s; z-index: 99; overflow-y: auto; padding: 15px; }
        .agent-list.active { right: 0; }
        .agent-card { display: flex; align-items: center; gap: 10px; padding: 10px; margin-bottom: 8px; background: #1a1a2e; border-radius: 6px; cursor: pointer; transition: all 0.2s; }
        .agent-card:hover { background: rgba(0,212,255,0.2); border-left: 3px solid var(--accent); }
        .agent-card.selected { background: rgba(0,212,255,0.3); border-left: 3px solid var(--accent); }
    </style>
</head>
<body>
    <div class="loading" id="loading">
        <h2>🏢 AGENT OFFICE v6.0</h2>
        <div class="progress"><div class="progress-bar" id="progress"></div></div>
        <div id="loadingText" style="margin-top:15px;color:#888">Loading Kairosoft environment...</div>
    </div>

    <header class="header">
        <div class="logo">
            <div class="logo-icon">🏢</div>
            <h1>AGENT OFFICE v6.0</h1>
        </div>
        <div style="font-size:0.7rem;">🦖 HUGE T-REX + 💬 CHAT + 📰 GOSSIP</div>
    </header>
    
    <div class="chat-overlay" id="chatOverlay">
        <div style="color:#ff6b9d;font-weight:bold;margin-bottom:10px;">💬 LIVE CHAT</div>
        <div id="chatHistory"></div>
    </div>

    <div class="chat-input-box" id="chatInputBox">
        <h4>💬 CHAT WITH <span id="chatTarget">AGENT</span></h4>
        <input type="text" id="chatInput" placeholder="Type your message..." maxlength="100">
        <div>
            <button onclick="sendChat()">SEND</button>
            <button onclick="closeChat()">CLOSE</button>
        </div>
    </div>

    <div class="gossip-panel" id="gossipPanel">
        <h3>📰 OFFICE GOSSIP</h3>
        <div style="font-size:0.7rem;color:#888;margin-bottom:10px;">Last 1 Hour Summary</div>
        <div id="gossipContent"></div>
    </div>

    <canvas id="gameCanvas"></canvas>
    
    <div class="controls">
        <button class="btn" onclick="resetCam()">🎯 RESET</button>
        <button class="btn" onclick="toggleList()">👥 TEAM</button>
        <button class="btn" onclick="toggleView()">🔲 ISO</button>
        <button class="btn" onclick="toggleGossip()">📰 GOSSIP</button>
        <button class="btn" onclick="toggleChatMute()">🔊 MUTE</button>
        <button class="btn" onclick="zoomIn()">➕</button>
        <button class="btn" onclick="zoomOut()">➖</button>
    </div>
    
    <div class="stats">
        <div>AGENTS: <span id="agentCount">11</span></div>
        <div>CHATS: <span id="chatCount">0</span></div>
        <div style="color:#ff6b9d;margin-top:8px;">🦖 MEGA T-REX</div>
    </div>
    
    <div class="agent-list" id="agentList"></div>

    <script>
        // Chat history for gossip
        let chatHistory = [];
        let selectedAgent = null;

        const AGENT_CONFIG = [
            { id: 'nexus', name: 'Nexus', role: 'Director', meebitId: 1, type: 'Human', x: 0, y: 0, personality: 'bossy', traits: ['Type','Human','Hair Style','Bald','Shirt','Athletic Jacket'] },
            { id: 'glasses', name: 'Glasses', role: 'Research', meebitId: 42, type: 'Human', x: -3, y: -2, personality: 'nerdy' },
            { id: 'quill', name: 'Quill', role: 'Writer', meebitId: 100, type: 'Human', x: 3, y: -2, personality: 'creative' },
            { id: 'pixel', name: 'Pixel', role: 'Artist', meebitId: 200, type: 'Human', x: -5, y: 0, personality: 'artsy' },
            { id: 'gary', name: 'Gary', role: 'Marketing', meebitId: 300, type: 'Human', x: 5, y: 0, personality: 'hype' },
            { id: 'larry', name: 'Larry', role: 'Social', meebitId: 500, type: 'Pig', x: -3, y: 2, personality: 'social' },
            { id: 'sentry', name: 'Sentry', role: 'Engineer', meebitId: 600, type: 'Robot', x: 3, y: 2, personality: 'robotic' },
            { id: 'audit', name: 'Audit', role: 'QA', meebitId: 700, type: 'Skeleton', x: -6, y: -4, personality: 'strict' },
            { id: 'cipher', name: 'Cipher', role: 'Security', meebitId: 800, type: 'Visitor', x: 6, y: -4, personality: 'mysterious' },
            { id: 'limitless', name: 'Limitless', role: 'Trader', meebitId: 1000, type: 'Robot', x: 0, y: -5, personality: 'calculating' },
            { id: 'olivia', name: 'Olivia', role: 'Sales', meebitId: 1500, type: 'Human', x: 0, y: 4, personality: 'charming' }
        ];

        // AI Response templates based on personality
        const AI_RESPONSES = {
            bossy: ["Get back to work!", "We have deadlines!", "Focus on the task!", "Stop chatting!", "Make it happen!", "I need results!"],
            nerdy: ["Did you know...", "According to my calculations...", "The data suggests...", "Actually, technically...", "Have you considered the algorithm?"],
            creative: ["What if we tried...", "I have an idea!", "Let's think outside the box!", "Artistically speaking...", "This needs more flair!"],
            hype: ["To the moon!", "Let's crush it!", "Epic win!", "This is going viral!", "Big moves only!", "We're killing it!"],
            social: ["Did you see the game?", "Lunch later?", "TGIF am I right?", "Check out this meme!", "Party this weekend?"],
            robotic: ["Processing...", "Task accepted.", "Efficiency at 98%.", "Calculating optimal path...", "Beep boop."],
            strict: ["This violates protocol.", "Needs more testing.", "I'm watching you.", "Quality check failed.", "Document everything."],
            mysterious: ["I know things...", "The truth is out there...", "Trust no one.", "I've seen things...", "They don't want you to know..."],
            calculating: ["Risk analysis complete.", "Expected ROI: 340%", "Probability of success: 87%", "Market trend indicates...", "Optimal strategy calculated."],
            charming: ["You're doing great!", "I believe in you!", "Let's collaborate!", "Your work is amazing!", "We make a great team!"]
        };

        const ZONES = {
            nexus: { minX: -1, maxX: 1, minY: -1, maxY: 1 },
            glasses: { minX: -5, maxX: -2, minY: -4, maxY: -1 },
            quill: { minX: 2, maxX: 5, minY: -4, maxY: -1 },
            pixel: { minX: -7, maxX: -4, minY: -2, maxY: 2 },
            gary: { minX: 4, maxX: 7, minY: -2, maxY: 2 },
            larry: { minX: -5, maxX: -2, minY: 1, maxY: 4 },
            sentry: { minX: 2, maxX: 5, minY: 1, maxY: 4 },
            audit: { minX: -8, maxX: -5, minY: -6, maxY: -3 },
            cipher: { minX: 5, maxX: 8, minY: -6, maxY: -3 },
            limitless: { minX: -2, maxX: 2, minY: -7, maxY: -4 },
            olivia: { minX: -2, maxX: 2, minY: 3, maxY: 6 }
        };

        let chatMuted = false;
        let totalChats = 0;

        function loadImage(src) {
            return new Promise((resolve) => {
                const img = new Image();
                img.crossOrigin = 'anonymous';
                img.onload = () => resolve({ img, success: true });
                img.onerror = () => resolve({ img: null, success: false });
                img.src = src;
            });
        }

        async function loadMeebitSprite(meebitId) {
            const url = `https://api.meebits.app/v2/sprites/sheet/${String(meebitId).padStart(5, '0')}`;
            return loadImage(url);
        }

        async function loadMeebitFullImage(meebitId) {
            const url = `https://api.meebits.app/v2/images/yugalabs_full/${String(meebitId).padStart(5, '0')}`;
            return loadImage(url);
        }

        function addToChatHistory(name, text, isUser = false) {
            if (chatMuted) return;
            totalChats++;
            document.getElementById('chatCount').textContent = totalChats;
            
            // Add to history for gossip
            chatHistory.push({
                name: name,
                text: text,
                time: Date.now(),
                isUser: isUser
            });
            
            // Keep only last 100 messages
            if (chatHistory.length > 100) chatHistory.shift();
            
            const historyEl = document.getElementById('chatHistory');
            const msg = document.createElement('div');
            msg.className = 'chat-message';
            msg.innerHTML = `<span class="chat-name" style="color:${isUser ? '#0f0' : '#00d4ff'}">${name}:</span> ${text}`;
            historyEl.insertBefore(msg, historyEl.firstChild);
            while (historyEl.children.length > 20) historyEl.removeChild(historyEl.lastChild);
        }

        function generateAIResponse(agent, userMessage) {
            const responses = AI_RESPONSES[agent.personality] || ["Interesting!", "Tell me more!", "I see...", "Hmm...", "OK!"];
            
            // Context-aware responses
            if (userMessage.toLowerCase().includes('help')) {
                return "I'll help you with that!";
            } else if (userMessage.toLowerCase().includes('bug')) {
                return agent.personality === 'strict' ? "I found 47 bugs already." : "Bugs are just features!";
            } else if (userMessage.toLowerCase().includes('deploy')) {
                return agent.personality === 'bossy' ? "Deploy it NOW!" : "Ship it! 🚀";
            } else if (userMessage.toLowerCase().includes('lunch')) {
                return "Pizza sounds good!";
            } else if (userMessage.toLowerCase().includes('t-rex') || userMessage.toLowerCase().includes('dino')) {
                return "The T-Rex is watching us... 🦖";
            }
            
            return responses[Math.floor(Math.random() * responses.length)];
        }

        function sendChat() {
            const input = document.getElementById('chatInput');
            const text = input.value.trim();
            if (!text || !selectedAgent) return;
            
            // User message
            addToChatHistory('You', text, true);
            
            // AI response
            const agent = game.agents.get(selectedAgent);
            if (agent) {
                const response = generateAIResponse(agent, text);
                agent.speech = response;
                agent.speechTimer = 5000;
                setTimeout(() => addToChatHistory(agent.name, response), 500);
            }
            
            input.value = '';
        }

        function closeChat() {
            document.getElementById('chatInputBox').classList.remove('active');
            selectedAgent = null;
        }

        function toggleGossip() {
            const panel = document.getElementById('gossipPanel');
            panel.classList.toggle('active');
            if (panel.classList.contains('active')) {
                generateGossip();
            }
        }

        function generateGossip() {
            const oneHourAgo = Date.now() - (60 * 60 * 1000);
            const recentChats = chatHistory.filter(c => c.time > oneHourAgo);
            
            const gossipContent = document.getElementById('gossipContent');
            gossipContent.innerHTML = '';
            
            if (recentChats.length === 0) {
                gossipContent.innerHTML = '<div class="gossip-item">📭 No gossip yet... Agents are being quiet!</div>';
                return;
            }
            
            // Generate gossip summaries
            const talkative = {};
            recentChats.forEach(c => {
                talkative[c.name] = (talkative[c.name] || 0) + 1;
            });
            
            const mostTalkative = Object.entries(talkative).sort((a,b) => b[1] - a[1])[0];
            
            const gossips = [
                `📢 ${mostTalkative[0]} has been the chattiest today with ${mostTalkative[1]} messages!`,
                `🍕 Someone mentioned lunch ${recentChats.filter(c => c.text.toLowerCase().includes('lunch') || c.text.toLowerCase().includes('pizza')).length} times.`,
                `🐛 ${recentChats.filter(c => c.text.toLowerCase().includes('bug')).length} bugs were discussed today.`,
                `🚀 ${recentChats.filter(c => c.text.includes('🚀') || c.text.toLowerCase().includes('moon')).length} people are feeling bullish!`,
                `☕ Coffee was mentioned ${recentChats.filter(c => c.text.toLowerCase().includes('coffee')).length} times.`,
                `🎮 ${recentChats.filter(c => c.text.toLowerCase().includes('game') || c.text.toLowerCase().includes('gaming')).length} agents want to play games.`
            ];
            
            // Add random specific gossip
            const randomChat = recentChats[Math.floor(Math.random() * recentChats.length)];
            if (randomChat) {
                gossips.push(`💬 Overheard: "${randomChat.text.substring(0, 50)}${randomChat.text.length > 50 ? '...' : ''}" - ${randomChat.name}`);
            }
            
            gossips.forEach(g => {
                const div = document.createElement('div');
                div.className = 'gossip-item';
                div.textContent = g;
                gossipContent.appendChild(div);
            });
        }

        class Agent {
            constructor(config, spriteData, fullImageData) {
                Object.assign(this, config);
                this.tx = config.x; this.ty = config.y;
                this.activity = 'idle'; this.idleTimer = 0;
                this.speech = null; this.speechTimer = 0;
                this.dir = 'down';
                this.frame = 0; this.animTimer = 0;
                this.spriteData = spriteData;
                this.fullImageData = fullImageData;
                this.frameSize = 128;
                this.chatCooldown = 0;
                this.useFullImage = true; // Use full image instead of sprite sheet
            }

            update(dt, all) {
                this.animTimer += dt;
                this.chatCooldown -= dt;

                if (this.animTimer > 200) {
                    this.animTimer = 0;
                    this.frame = (this.frame + 1) % 4;
                }

                if (this.activity === 'idle') {
                    this.idleTimer += dt;
                    if (this.idleTimer > 2000 + Math.random() * 3000) this.startWalk();
                    
                    if (this.chatCooldown <= 0 && Math.random() < 0.015) {
                        const chats = ["Hey!","Working hard!","Need coffee...","Deploying!","Bug fixed!","Ship it!","TGIF!","To the moon! 🚀","LOL!","😂","🔥","💯"];
                        this.speech = chats[Math.floor(Math.random() * chats.length)];
                        this.speechTimer = 4000;
                        addToChatHistory(this.name, this.speech);
                        this.chatCooldown = 5000 + Math.random() * 4000;
                    }
                } else if (this.activity === 'walking') {
                    const dx = this.tx - this.x, dy = this.ty - this.y, dist = Math.hypot(dx, dy);
                    if (dist < 0.1) {
                        this.x = this.tx; this.y = this.ty;
                        this.activity = 'idle'; this.idleTimer = 0;
                    } else {
                        const s = 2 * dt * 0.001;
                        this.x += (dx / dist) * s;
                        this.y += (dy / dist) * s;
                    }
                }

                if (this.speech) { this.speechTimer -= dt; if (this.speechTimer <= 0) this.speech = null; }

                if (this.activity === 'idle' && this.chatCooldown <= 0 && Math.random() < 0.03) {
                    const nearby = all.filter(a => a.id !== this.id && a.activity === 'idle' && Math.hypot(a.x - this.x, a.y - this.y) < 3);
                    if (nearby.length) {
                        const p = nearby[0];
                        this.activity = 'talking'; p.activity = 'talking';
                        const myChat = ["Hey!","What's up?","How's it going?","Did you hear?","Check this out!"][Math.floor(Math.random() * 5)];
                        const theirChat = ["Yo!","Not bad!","Tell me!","Really?","No way!"][Math.floor(Math.random() * 5)];
                        this.speech = myChat; this.speechTimer = 4000;
                        p.speech = theirChat; p.speechTimer = 4000;
                        addToChatHistory(this.name, myChat);
                        setTimeout(() => addToChatHistory(p.name, theirChat), 800);
                        this.chatCooldown = 6000; p.chatCooldown = 6000;
                        setTimeout(() => { this.activity = 'idle'; p.activity = 'idle'; }, 3500);
                    }
                }
            }

            startWalk() {
                const z = ZONES[this.id];
                this.tx = z.minX + Math.random() * (z.maxX - z.minX);
                this.ty = z.minY + Math.random() * (z.maxY - z.minY);
                this.activity = 'walking';
                const dx = this.tx - this.x, dy = this.ty - this.y;
                this.dir = Math.abs(dx) > Math.abs(dy) ? (dx > 0 ? 'right' : 'left') : (dy > 0 ? 'down' : 'up');
            }

            render(ctx, math, cam, vm) {
                const pos = math.toScreen(this.x, this.y, 0);
                const px = (pos.x - cam.x) * cam.zoom;
                const py = (pos.y - cam.y) * cam.zoom;
                const size = 85 * cam.zoom;

                // Shadow
                ctx.fillStyle = 'rgba(0,0,0,0.4)';
                ctx.beginPath();
                ctx.ellipse(px, py + size * 0.35, size * 0.25, size * 0.08, 0, 0, Math.PI * 2);
                ctx.fill();

                // Draw agent - USE FULL IMAGE if available
                if (this.fullImageData.success) {
                    let bob = this.activity === 'walking' ? Math.sin(this.frame * Math.PI / 2) * 3 * cam.zoom : 0;
                    ctx.drawImage(
                        this.fullImageData.img,
                        px - size / 2,
                        py - size * 0.9 + bob,
                        size,
                        size
                    );
                } else if (this.spriteData.success) {
                    // Fallback to sprite sheet
                    const frame = this.getSpriteFrame();
                    let bob = this.activity === 'walking' ? Math.sin(this.frame * Math.PI / 2) * 3 * cam.zoom : 0;
                    ctx.drawImage(
                        this.spriteData.img,
                        frame.sx, frame.sy, frame.sw, frame.sh,
                        px - size / 2, py - size * 0.9 + bob, size, size
                    );
                } else {
                    // Final fallback - emoji
                    ctx.fillStyle = '#444';
                    ctx.beginPath();
                    ctx.arc(px, py - size * 0.3, size * 0.3, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.font = `${size * 0.4}px serif`;
                    ctx.textAlign = 'center';
                    const emojis = { Human: '👤', Pig: '🐷', Robot: '🤖', Visitor: '👽', Skeleton: '💀' };
                    ctx.fillText(emojis[this.type] || '👤', px, py - size * 0.25);
                }

                // Name tag
                ctx.fillStyle = 'rgba(0,0,0,0.85)';
                ctx.fillRect(px - 45, py + size * 0.05, 90, 18);
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 11px monospace';
                ctx.textAlign = 'center';
                ctx.fillText(this.name, px, py + size * 0.05 + 13);

                // Role
                ctx.fillStyle = 'rgba(0,212,255,0.2)';
                ctx.fillRect(px - 45, py + size * 0.05 + 19, 90, 14);
                ctx.fillStyle = '#00d4ff';
                ctx.font = '9px monospace';
                ctx.fillText(this.role, px, py + size * 0.05 + 29);

                // Speech bubble
                if (this.speech) {
                    const bx = px, by = py - size * 1;
                    ctx.fillStyle = '#fff';
                    ctx.beginPath();
                    ctx.roundRect(bx - 50, by - 12, 100, 24, 8);
                    ctx.fill();
                    ctx.strokeStyle = '#000';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                    ctx.fillStyle = '#000';
                    ctx.font = 'bold 11px monospace';
                    ctx.textAlign = 'center';
                    ctx.fillText(this.speech.length > 20 ? this.speech.substring(0,20)+'...' : this.speech, bx, by + 4);
                    ctx.fillStyle = '#fff';
                    ctx.beginPath();
                    ctx.moveTo(bx - 5, by + 12);
                    ctx.lineTo(bx + 5, by + 12);
                    ctx.lineTo(bx, by + 20);
                    ctx.fill();
                    ctx.stroke();
                }
            }

            getSpriteFrame() {
                const rowMap = { down: 0, right: 1, up: 2, left: 3 };
                const row = rowMap[this.dir] || 0;
                const col = this.activity === 'walking' ? this.frame : 0;
                return {
                    sx: col * this.frameSize,
                    sy: row * this.frameSize,
                    sw: this.frameSize,
                    sh: this.frameSize
                };
            }
        }

        class Game {
            constructor() {
                this.c = document.getElementById('gameCanvas');
                this.ctx = this.c.getContext('2d');
                this.agents = new Map();
                this.cam = { x: 0, y: -30, zoom: 0.9 };
                this.viewMode = 'iso';
                this.lastTime = 0;
                this.blink = false;
                this.iso = { toScreen: (x,y,z) => ({ x: (x-y)*52 + this.c.width/2, y: (x+y)*26 - z*26 + this.c.height/2.3 }) };
                this.td = { toScreen: (x,y,z) => ({ x: x*72 + this.c.width/2, y: y*72 + this.c.height/2 - z*32 }) };
                this.setupInput();
                this.resize();
                window.addEventListener('resize', () => this.resize());
            }

            resize() { this.c.width = window.innerWidth; this.c.height = window.innerHeight - 60; }

            setupInput() {
                let d = false, lx, ly;
                this.c.addEventListener('mousedown', e => {
                    const r = this.c.getBoundingClientRect();
                    const mx = e.clientX - r.left, my = e.clientY - r.top;
                    let clickedAgent = null;
                    for (const [id, a] of this.agents) {
                        const p = this.gm().toScreen(a.x, a.y, 0);
                        const px = (p.x - this.cam.x) * this.cam.zoom, py = (p.y - this.cam.y) * this.cam.zoom;
                        if (Math.hypot(mx - px, my - (py - 35*this.cam.zoom)) < 42*this.cam.zoom) {
                            clickedAgent = id;
                            break;
                        }
                    }
                    if (clickedAgent) {
                        selectAgent(clickedAgent);
                    } else {
                        d = true; lx = e.clientX; ly = e.clientY; this.c.style.cursor = 'grabbing';
                    }
                });
                this.c.addEventListener('mousemove', e => {
                    if (!d) return;
                    this.cam.x -= (e.clientX - lx) / this.cam.zoom;
                    this.cam.y -= (e.clientY - ly) / this.cam.zoom;
                    lx = e.clientX; ly = e.clientY;
                });
                this.c.addEventListener('mouseup', () => { d = false; this.c.style.cursor = 'grab'; });
                this.c.addEventListener('wheel', e => { e.preventDefault(); this.cam.zoom = Math.max(0.4, Math.min(2.5, this.cam.zoom * (e.deltaY > 0 ? 0.9 : 1.1))); }, { passive: false });
            }

            gm() { return this.viewMode === 'iso' ? this.iso : this.td; }

            async init() {
                const loadingText = document.getElementById('loadingText');
                const progressBar = document.getElementById('progress');
                let loaded = 0;
                const total = AGENT_CONFIG.length * 2; // Load both sprite and full image

                for (const data of AGENT_CONFIG) {
                    loadingText.textContent = `Loading ${data.name}...`;
                    
                    // Try full image first (works better)
                    const fullImageData = await loadMeebitFullImage(data.meebitId);
                    loaded++;
                    progressBar.style.width = `${(loaded / total) * 100}%`;
                    
                    // Also load sprite as backup
                    const spriteData = await loadMeebitSprite(data.meebitId);
                    loaded++;
                    progressBar.style.width = `${(loaded / total) * 100}%`;
                    
                    this.agents.set(data.id, new Agent(data, spriteData, fullImageData));
                }

                document.getElementById('loading').classList.add('hidden');
                this.renderUI();
                this.start();
            }

            start() {
                const loop = (n) => {
                    const dt = n - this.lastTime; this.lastTime = n;
                    this.blink = Math.sin(n / 150) > 0;
                    this.agents.forEach(a => a.update(dt, Array.from(this.agents.values())));
                    this.render();
                    requestAnimationFrame(loop);
                };
                requestAnimationFrame(loop);
            }

            drawTree(ctx, x, y, cam) {
                const pos = this.gm().toScreen(x, y, 0);
                const px = (pos.x - cam.x) * cam.zoom;
                const py = (pos.y - cam.y) * cam.zoom;
                const size = 75 * cam.zoom;
                
                // Trunk
                ctx.fillStyle = '#6B4423';
                ctx.fillRect(px - size*0.12, py - size*0.25, size*0.24, size*0.5);
                
                // Leaves (pixel style)
                ctx.fillStyle = '#228B22';
                ctx.beginPath();
                ctx.arc(px, py - size*0.45, size*0.35, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = '#32CD32';
                ctx.beginPath();
                ctx.arc(px - size*0.12, py - size*0.35, size*0.2, 0, Math.PI*2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(px + size*0.12, py - size*0.35, size*0.2, 0, Math.PI*2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(px, py - size*0.6, size*0.2, 0, Math.PI*2);
                ctx.fill();
            }

            drawMegaTRex(ctx, cam) {
                const pos = this.gm().toScreen(0, 0, 0);
                const px = (pos.x - cam.x) * cam.zoom;
                const py = (pos.y - cam.y) * cam.zoom;
                const size = 280 * cam.zoom; // MEGA SIZE
                
                ctx.strokeStyle = '#E8E4D9';
                ctx.fillStyle = '#D4D0C5';
                ctx.lineWidth = 5 * cam.zoom;
                
                // Massive skull
                ctx.beginPath();
                ctx.ellipse(px, py - size*0.55, size*0.35, size*0.28, 0, 0, Math.PI*2);
                ctx.fill();
                ctx.stroke();
                
                // Eye socket (huge)
                ctx.fillStyle = '#222';
                ctx.beginPath();
                ctx.arc(px + size*0.18, py - size*0.62, size*0.1, 0, Math.PI*2);
                ctx.fill();
                
                // Jagged teeth (many)
                ctx.fillStyle = '#FFF';
                for(let i=0; i<8; i++) {
                    const tx = px - size*0.3 + i*size*0.1;
                    ctx.beginPath();
                    ctx.moveTo(tx, py - size*0.35);
                    ctx.lineTo(tx + size*0.05, py - size*0.15);
                    ctx.lineTo(tx + size*0.1, py - size*0.35);
                    ctx.fill();
                }
                
                // Spine (thick)
                ctx.strokeStyle = '#E8E4D9';
                ctx.lineWidth = 12 * cam.zoom;
                ctx.beginPath();
                ctx.moveTo(px, py - size*0.25);
                ctx.quadraticCurveTo(px + size*0.15, py, px, py + size*0.35);
                ctx.stroke();
                
                // Massive ribs
                ctx.lineWidth = 6 * cam.zoom;
                for(let i=0; i<5; i++) {
                    const ry = py - size*0.15 + i*size*0.18;
                    ctx.beginPath();
                    ctx.moveTo(px, ry);
                    ctx.lineTo(px - size*0.4, ry + size*0.05);
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.moveTo(px, ry);
                    ctx.lineTo(px + size*0.25, ry + size*0.05);
                    ctx.stroke();
                }
                
                // Huge tail
                ctx.lineWidth = 10 * cam.zoom;
                ctx.beginPath();
                ctx.moveTo(px, py + size*0.35);
                ctx.quadraticCurveTo(px - size*0.6, py + size*0.6, px - size*1, py + size*0.45);
                ctx.stroke();
                
                // Tiny arms (cute)
                ctx.lineWidth = 4 * cam.zoom;
                ctx.beginPath();
                ctx.moveTo(px - size*0.15, py - size*0.05);
                ctx.lineTo(px - size*0.35, py + size*0.1);
                ctx.stroke();
                
                // Label
                ctx.fillStyle = '#E8E4D9';
                ctx.font = `bold ${16*cam.zoom}px "Press Start 2P"`;
                ctx.textAlign = 'center';
                ctx.fillText('🦖 MEGA T-REX', px, py + size*0.85);
                ctx.font = `${10*cam.zoom}px monospace`;
                ctx.fillText('DO NOT FEED', px, py + size*0.95);
            }

            render() {
                const ctx = this.ctx, c = this.c, m = this.gm();
                
                // Dark background
                ctx.fillStyle = '#151520'; 
                ctx.fillRect(0, 0, c.width, c.height);

                // Kairosoft-style checkered floor
                for (let x = -14; x <= 14; x++) {
                    for (let y = -14; y <= 14; y++) {
                        const p = m.toScreen(x, y, 0);
                        const cx = (p.x - this.cam.x) * this.cam.zoom;
                        const cy = (p.y - this.cam.y) * this.cam.zoom;
                        const inZone = Object.values(ZONES).some(z => x >= z.minX && x <= z.maxX && y >= z.minY && y <= z.maxY);
                        
                        if (inZone) {
                            // Kairosoft office floor - warm wood checkers
                            ctx.fillStyle = ((x + y) % 2 === 0) ? '#C9A86C' : '#B8985C';
                        } else {
                            // Outside area - darker
                            ctx.fillStyle = ((x + y) % 2 === 0) ? '#252535' : '#202030';
                        }
                        
                        if (this.viewMode === 'topdown') { 
                            const ts = 72 * this.cam.zoom; 
                            ctx.fillRect(cx - ts/2, cy - ts/2, ts, ts);
                        } else { 
                            const tw = 52 * this.cam.zoom, th = 26 * this.cam.zoom; 
                            ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(cx+tw, cy+th); ctx.lineTo(cx, cy+th*2); ctx.lineTo(cx-tw, cy+th); ctx.closePath(); ctx.fill();
                        }
                    }
                }

                // Walls with Kairosoft style
                for (let x = -10; x <= 10; x++) { 
                    const p = m.toScreen(x, -11, 0), cx = (p.x - this.cam.x) * this.cam.zoom, cy = (p.y - this.cam.y) * this.cam.zoom; 
                    ctx.fillStyle = (x % 2 === 0) ? '#F0E6D2' : '#E6DCC2'; 
                    ctx.fillRect(cx - 36 * this.cam.zoom, cy - 85 * this.cam.zoom, 72 * this.cam.zoom, 85 * this.cam.zoom);
                }

                // Windows
                [-6, 0, 6].forEach(wx => { 
                    const p = m.toScreen(wx, -11, 0), cx = (p.x - this.cam.x) * this.cam.zoom, cy = (p.y - this.cam.y) * this.cam.zoom; 
                    ctx.fillStyle = '#87CEEB'; 
                    ctx.fillRect(cx - 32 * this.cam.zoom, cy - 70 * this.cam.zoom, 64 * this.cam.zoom, 55 * this.cam.zoom); 
                    ctx.strokeStyle = '#5c4033'; 
                    ctx.lineWidth = 4 * this.cam.zoom; 
                    ctx.strokeRect(cx - 32 * this.cam.zoom, cy - 70 * this.cam.zoom, 64 * this.cam.zoom, 55 * this.cam.zoom); 
                    ctx.beginPath(); ctx.moveTo(cx, cy - 70 * this.cam.zoom); ctx.lineTo(cx, cy - 15 * this.cam.zoom); 
                    ctx.moveTo(cx - 32 * this.cam.zoom, cy - 42 * this.cam.zoom); ctx.lineTo(cx + 32 * this.cam.zoom, cy - 42 * this.cam.zoom); 
                    ctx.stroke(); 
                });

                // Trees
                const trees = [{x: -9, y: 6}, {x: 9, y: 6}, {x: -10, y: -3}, {x: 10, y: -3}];
                trees.forEach(tree => this.drawTree(ctx, tree.x, tree.y, this.cam));

                // MEGA T-Rex (behind agents)
                this.drawMegaTRex(ctx, this.cam);

                // Server room
                const sr = m.toScreen(9, 5, 0);
                ctx.fillStyle = '#1a1a2e'; 
                ctx.fillRect((sr.x - this.cam.x) * this.cam.zoom - 65 * this.cam.zoom, (sr.y - this.cam.y) * this.cam.zoom - 55 * this.cam.zoom, 130 * this.cam.zoom, 110 * this.cam.zoom);
                for (let r = 0; r < 2; r++) { 
                    ctx.fillStyle = '#2a2a3a'; 
                    ctx.fillRect((sr.x - this.cam.x) * this.cam.zoom - 60 * this.cam.zoom + r * 65 * this.cam.zoom, (sr.y - this.cam.y) * this.cam.zoom - 50 * this.cam.zoom, 55 * this.cam.zoom, 100 * this.cam.zoom); 
                    for (let i = 0; i < 7; i++) { 
                        ctx.fillStyle = this.blink ? '#0f0' : '#050'; 
                        ctx.fillRect((sr.x - this.cam.x) * this.cam.zoom - 55 * this.cam.zoom + r * 65 * this.cam.zoom, (sr.y - this.cam.y) * this.cam.zoom - 45 * this.cam.zoom + i * 14 * this.cam.zoom, 14 * this.cam.zoom, 9 * this.cam.zoom); 
                    } 
                }
                ctx.fillStyle = '#0f0'; 
                ctx.font = `${11 * this.cam.zoom}px "Press Start 2P"`; 
                ctx.textAlign = 'center'; 
                ctx.fillText('💾 SERVER', (sr.x - this.cam.x) * this.cam.zoom, (sr.y - this.cam.y) * this.cam.zoom - 62 * this.cam.zoom);

                // Agents sorted by depth
                Array.from(this.agents.values()).sort((a, b) => (a.y + a.x) - (b.y + b.x)).forEach(a => a.render(ctx, m, this.cam, this.viewMode));
            }

            renderUI() {
                const list = document.getElementById('agentList');
                list.innerHTML = `<div style="color:#00d4ff;font-family:'Press Start 2P';font-size:0.5rem;margin-bottom:15px;">👥 CLICK TO CHAT</div>` +
                AGENT_CONFIG.map(a => {
                    const agent = this.agents.get(a.id);
                    const loaded = agent?.fullImageData?.success || agent?.spriteData?.success;
                    const isSelected = selectedAgent === a.id;
                    return `<div class="agent-card ${isSelected ? 'selected' : ''}" onclick="selectAgent('${a.id}')"><div style="width:45px;height:45px;background:${loaded ? '#2a2a3a' : '#1a1a1a'};border:2px solid ${isSelected ? '#0f0' : loaded ? '#00d4ff' : '#666'};display:flex;align-items:center;justify-content:center;font-size:1.3rem;border-radius:4px;">${loaded ? '✓' : '○'}</div><div><div style="font-weight:bold;color:${isSelected ? '#0f0' : '#fff'}">${a.name}</div><div style="font-size:0.75rem;color:#888;">${a.role}</div><div style="font-size:0.7rem;color:#00d4ff;">${a.personality}</div></div></div>`;
                }).join('');
            }
        }

        let game;
        function init() { game = new Game(); game.init(); }
        
        function selectAgent(id) {
            selectedAgent = id;
            const agent = game.agents.get(id);
            if (agent) {
                document.getElementById('chatTarget').textContent = agent.name.toUpperCase();
                document.getElementById('chatInputBox').classList.add('active');
                document.getElementById('chatInput').focus();
                game.renderUI();
            }
        }
        
        function resetCam() { game.cam.x = 0; game.cam.y = -30; game.cam.zoom = 0.9; }
        function toggleList() { document.getElementById('agentList').classList.toggle('active'); }
        function toggleView() { game.viewMode = game.viewMode === 'iso' ? 'topdown' : 'iso'; game.cam.x = 0; game.cam.y = -30; }
        function toggleChatMute() { chatMuted = !chatMuted; }
        function zoomIn() { game.cam.zoom = Math.min(2.5, game.cam.zoom * 1.15); }
        function zoomOut() { game.cam.zoom = Math.max(0.4, game.cam.zoom / 1.15); }
        
        // Enter key to send
        document.getElementById('chatInput')?.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendChat();
        });
        
        window.addEventListener('load', init);
    </script>
</body>
