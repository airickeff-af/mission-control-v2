<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏢 Game Dev Office v2.3 | Kairosoft Pixel Art</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; image-rendering: pixelated; }
        
        body {
            font-family: 'VT323', monospace;
            background: #2d1b4e;
            min-height: 100vh;
            overflow: hidden;
        }
        
        .game-header {
            background: linear-gradient(180deg, #1a0f2e 0%, #2d1b4e 100%);
            border-bottom: 4px solid #00D9FF;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .game-title {
            font-family: 'Press Start 2P', cursive;
            font-size: 12px;
            color: #00D9FF;
        }
        
        .game-stats {
            display: flex;
            gap: 15px;
        }
        
        .stat {
            background: rgba(0,0,0,0.3);
            padding: 5px 12px;
            border-radius: 4px;
            border: 2px solid #5d4b7e;
        }
        
        .stat-label { color: #b8a9d9; font-size: 10px; }
        .stat-value { color: #FFD700; font-weight: bold; }
        
        .game-container {
            display: flex;
            height: calc(100vh - 60px);
        }
        
        /* Canvas-based office for smooth pixel art */
        .office-view {
            flex: 1;
            background: #1a0f2e;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        #gameCanvas {
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }
        
        /* Chat Panel */
        .chat-panel {
            width: 320px;
            background: linear-gradient(180deg, #1a0f2e 0%, #2d1b4e 100%);
            border-left: 4px solid #00D9FF;
            display: flex;
            flex-direction: column;
        }
        
        .chat-header {
            padding: 15px;
            border-bottom: 2px solid #5d4b7e;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .chat-avatar {
            width: 50px;
            height: 50px;
            border: 3px solid #00D9FF;
            border-radius: 8px;
            overflow: hidden;
        }
        
        .chat-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .chat-title {
            font-family: 'Press Start 2P', cursive;
            color: #00D9FF;
            font-size: 10px;
        }
        
        .chat-subtitle {
            color: #b8a9d9;
            font-size: 12px;
        }
        
        .chat-messages {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .message {
            max-width: 90%;
            padding: 10px;
            border-radius: 8px;
            font-size: 14px;
        }
        
        .message.agent {
            align-self: flex-start;
            background: rgba(0, 217, 255, 0.1);
            border: 2px solid #00D9FF;
            color: #fff;
        }
        
        .message.user {
            align-self: flex-end;
            background: rgba(255, 107, 157, 0.2);
            border: 2px solid #FF69B4;
            color: #fff;
        }
        
        .chat-input-area {
            padding: 15px;
            border-top: 2px solid #5d4b7e;
        }
        
        .chat-input {
            width: 100%;
            background: #2d1b4e;
            border: 2px solid #5d4b7e;
            padding: 10px;
            color: #fff;
            font-family: 'VT323', monospace;
            font-size: 16px;
            margin-bottom: 10px;
            border-radius: 4px;
        }
        
        .chat-btn {
            width: 100%;
            background: #00D9FF;
            color: #1a0f2e;
            border: none;
            padding: 10px;
            font-family: 'Press Start 2P', cursive;
            font-size: 10px;
            cursor: pointer;
            font-weight: bold;
        }
        
        /* Instructions overlay */
        .instructions {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            padding: 10px 15px;
            border-radius: 8px;
            color: #b8a9d9;
            font-size: 12px;
            border: 2px solid #5d4b7e;
        }
    </style>
</head>
<body>
    <header class="game-header">
        <div class="game-title">🏢 GAME DEV OFFICE</div>
        <div class="game-stats">
            <div class="stat">
                <div class="stat-label">FANS</div>
                <div class="stat-value">12</div>
            </div>
            <div class="stat">
                <div class="stat-label">HYPE</div>
                <div class="stat-value">MAX!</div>
            </div>
        </div>
    </header>

    <div class="game-container">
        <div class="office-view">
            <canvas id="gameCanvas" width="800" height="600"></canvas>
            <div class="instructions">
                🖱️ Click Meebits to chat | Watch them walk around!
            </div>
        </div>

        <div class="chat-panel">
            <div class="chat-header">
                <div class="chat-avatar">
                    <img id="chatImg" src="https://api.meebits.app/v2/images/larvalabs_full/1001" alt="Nexus">
                </div>
                <div>
                    <div class="chat-title" id="chatName">NEXUS</div>
                    <div class="chat-subtitle">Click me to chat!</div>
                </div>
            </div>
            
            <div class="chat-messages" id="chatMessages">
                <div class="message agent">🎮 Welcome! The office is now rendered with smooth pixel art canvas - no more eye strain!</div>
            </div>
            
            <div class="chat-input-area">
                <input type="text" class="chat-input" id="chatInput" placeholder="Type a message..."
                       onkeypress="if(event.key==='Enter') sendMsg()">
                <button class="chat-btn" onclick="sendMsg()">SEND</button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        ctx.imageSmoothingEnabled = false;
        
        // Softer Kairosoft-style colors
        const COLORS = {
            floorLight: '#E8D4B8',
            floorDark: '#D4C4A8',
            wall: '#F5E6D3',
            wallShadow: '#C4B4A0',
            desk: '#C4956A',
            deskDark: '#A4754A',
            monitor: '#87CEEB',
            monitorFrame: '#666666',
            chair: '#6B8ECE',
            window: '#B0E0E6',
            windowFrame: '#8B7355'
        };
        
        // Isometric helpers
        function isoToScreen(ix, iy) {
            const screenX = 400 + (ix - iy) * 32;
            const screenY = 300 + (ix + iy) * 16;
            return { x: screenX, y: screenY };
        }
        
        // Draw floor tile
        function drawFloorTile(ix, iy) {
            const pos = isoToScreen(ix, iy);
            const isLight = (ix + iy) % 2 === 0;
            
            ctx.fillStyle = isLight ? COLORS.floorLight : COLORS.floorDark;
            ctx.beginPath();
            ctx.moveTo(pos.x, pos.y);
            ctx.lineTo(pos.x + 32, pos.y + 16);
            ctx.lineTo(pos.x, pos.y + 32);
            ctx.lineTo(pos.x - 32, pos.y + 16);
            ctx.closePath();
            ctx.fill();
            
            // Subtle border
            ctx.strokeStyle = 'rgba(0,0,0,0.05)';
            ctx.lineWidth = 1;
            ctx.stroke();
        }
        
        // Draw wall
        function drawWall(x, y, width, height) {
            // Wall face
            ctx.fillStyle = COLORS.wall;
            ctx.fillRect(x, y, width, height);
            
            // Shadow at bottom
            ctx.fillStyle = COLORS.wallShadow;
            ctx.fillRect(x, y + height - 10, width, 10);
            
            // Top highlight
            ctx.fillStyle = '#FFF8F0';
            ctx.fillRect(x, y, width, 4);
        }
        
        // Draw window
        function drawWindow(x, y) {
            const w = 80;
            const h = 50;
            
            // Frame
            ctx.fillStyle = COLORS.windowFrame;
            ctx.fillRect(x, y, w, h);
            
            // Glass
            ctx.fillStyle = COLORS.window;
            ctx.fillRect(x + 4, y + 4, w - 8, h - 8);
            
            // Cross
            ctx.fillStyle = COLORS.windowFrame;
            ctx.fillRect(x + w/2 - 2, y, 4, h);
            ctx.fillRect(x, y + h/2 - 2, w, 4);
        }
        
        // Draw desk
        function drawDesk(ix, iy) {
            const pos = isoToScreen(ix, iy);
            
            // Desk base
            ctx.fillStyle = COLORS.deskDark;
            ctx.beginPath();
            ctx.moveTo(pos.x - 25, pos.y + 10);
            ctx.lineTo(pos.x + 25, pos.y + 10);
            ctx.lineTo(pos.x + 25, pos.y + 25);
            ctx.lineTo(pos.x - 25, pos.y + 25);
            ctx.closePath();
            ctx.fill();
            
            // Desk top
            ctx.fillStyle = COLORS.desk;
            ctx.beginPath();
            ctx.moveTo(pos.x - 30, pos.y);
            ctx.lineTo(pos.x + 30, pos.y);
            ctx.lineTo(pos.x + 25, pos.y + 10);
            ctx.lineTo(pos.x - 25, pos.y + 10);
            ctx.closePath();
            ctx.fill();
            
            // Monitor
            const mx = pos.x;
            const my = pos.y - 15;
            
            // Monitor stand
            ctx.fillStyle = '#888';
            ctx.fillRect(mx - 3, my + 10, 6, 8);
            
            // Monitor frame
            ctx.fillStyle = COLORS.monitorFrame;
            ctx.fillRect(mx - 15, my - 10, 30, 22);
            
            // Screen
            ctx.fillStyle = COLORS.monitor;
            ctx.fillRect(mx - 12, my - 7, 24, 16);
            
            // Screen glow
            ctx.fillStyle = 'rgba(255,255,255,0.3)';
            ctx.fillRect(mx - 12, my - 7, 24, 8);
        }
        
        // Draw chair
        function drawChair(ix, iy) {
            const pos = isoToScreen(ix, iy);
            const cx = pos.x + 35;
            const cy = pos.y + 5;
            
            // Chair back
            ctx.fillStyle = COLORS.chair;
            ctx.beginPath();
            ctx.moveTo(cx, cy);
            ctx.lineTo(cx + 12, cy + 6);
            ctx.lineTo(cx + 12, cy + 20);
            ctx.lineTo(cx, cy + 15);
            ctx.closePath();
            ctx.fill();
            
            // Chair seat
            ctx.fillStyle = '#5B7EBE';
            ctx.beginPath();
            ctx.moveTo(cx, cy + 15);
            ctx.lineTo(cx + 12, cy + 20);
            ctx.lineTo(cx + 5, cy + 25);
            ctx.lineTo(cx - 7, cy + 20);
            ctx.closePath();
            ctx.fill();
        }
        
        // Draw whiteboard
        function drawWhiteboard(x, y) {
            // Board
            ctx.fillStyle = '#F5F5F5';
            ctx.fillRect(x, y, 100, 60);
            
            // Frame
            ctx.strokeStyle = '#8B7355';
            ctx.lineWidth = 3;
            ctx.strokeRect(x, y, 100, 60);
            
            // Text
            ctx.fillStyle = '#333';
            ctx.font = '10px "Press Start 2P"';
            ctx.fillText('TASKS!', x + 15, y + 35);
        }
        
        // Meebit workers
        const workers = [
            { id: 'nexus', name: 'NEXUS', x: 2, y: 2, targetX: 2, targetY: 2, meebitId: 1001, frame: 0 },
            { id: 'glasses', name: 'GLASSES', x: 6, y: 2, targetX: 6, targetY: 2, meebitId: 2001, frame: 0 },
            { id: 'pixel', name: 'PIXEL', x: 2, y: 6, targetX: 2, targetY: 6, meebitId: 4001, frame: 0 },
            { id: 'sentry', name: 'SENTRY', x: 6, y: 6, targetX: 6, targetY: 6, meebitId: 57, frame: 0 }
        ];
        
        let selectedWorker = workers[0];
        const sprites = {};
        
        // Load sprite sheets with loading tracking
        let spritesLoaded = 0;
        workers.forEach(w => {
            const img = new Image();
            img.crossOrigin = 'anonymous';
            img.onload = () => {
                spritesLoaded++;
                console.log(`Loaded ${w.name}: ${w.meebitId}`);
            };
            img.src = `https://files.meebits.app/sprites/${w.meebitId}.png`;
            sprites[w.id] = img;
        });
        
        function drawMeebit(worker) {
            const pos = isoToScreen(worker.x, worker.y);
            const sprite = sprites[worker.id];
            
            // Draw shadow first
            ctx.fillStyle = 'rgba(0,0,0,0.3)';
            ctx.beginPath();
            ctx.ellipse(pos.x, pos.y + 5, 22, 12, 0, 0, Math.PI * 2);
            ctx.fill();
            
            if (sprite && sprite.complete && sprite.naturalWidth > 0) {
                // Draw sprite frame - BIGGER
                const frameX = (Math.floor(worker.frame) % 4) * 64;
                // Use walking row if moving
                const isMoving = Math.abs(worker.x - worker.targetX) > 0.01 || Math.abs(worker.y - worker.targetY) > 0.01;
                const frameY = isMoving ? 64 : 0;
                
                ctx.drawImage(
                    sprite,
                    frameX, frameY, 64, 64,
                    pos.x - 30, pos.y - 70, 60, 60
                );
            } else {
                // Fallback - colored circle with icon
                const colors = {
                    nexus: '#FFD700',
                    glasses: '#00D9FF',
                    pixel: '#9370DB',
                    sentry: '#DC143C'
                };
                const emojis = {
                    nexus: '👑',
                    glasses: '🔍',
                    pixel: '🎨',
                    sentry: '🛡️'
                };
                
                // Circle background
                ctx.fillStyle = colors[worker.id];
                ctx.beginPath();
                ctx.arc(pos.x, pos.y - 25, 25, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = '#000';
                ctx.lineWidth = 3;
                ctx.stroke();
                
                // Emoji
                ctx.font = '24px Arial';
                ctx.textAlign = 'center';
                ctx.fillText(emojis[worker.id], pos.x, pos.y - 18);
            }
            
            // Name label
            ctx.fillStyle = 'rgba(0,0,0,0.7)';
            ctx.fillRect(pos.x - 35, pos.y + 15, 70, 18);
            ctx.fillStyle = '#FFF';
            ctx.font = 'bold 10px "Press Start 2P"';
            ctx.textAlign = 'center';
            ctx.fillText(worker.name, pos.x, pos.y + 28);
        }
        
        function drawScene() {
            // Clear
            ctx.fillStyle = '#1a0f2e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Draw floor (8x8 grid)
            for (let iy = 0; iy < 8; iy++) {
                for (let ix = 0; ix < 8; ix++) {
                    drawFloorTile(ix, iy);
                }
            }
            
            // Draw wall (back)
            drawWall(150, 50, 500, 80);
            
            // Draw windows
            drawWindow(200, 65);
            drawWindow(350, 65);
            
            // Draw whiteboard
            drawWhiteboard(520, 60);
            
            // Draw desks
            drawDesk(2, 2);
            drawDesk(6, 2);
            drawDesk(2, 6);
            drawDesk(6, 6);
            
            // Draw chairs
            drawChair(2, 2);
            drawChair(6, 2);
            drawChair(2, 6);
            drawChair(6, 6);
            
            // Draw workers
            workers.forEach(w => {
                drawMeebit(w);
                w.frame += 0.1;
            });
        }
        
        function animate() {
            drawScene();
            requestAnimationFrame(animate);
        }
        
        // Movement system
        function moveWorker(worker) {
            if (Math.abs(worker.x - worker.targetX) > 0.1 || Math.abs(worker.y - worker.targetY) > 0.1) {
                worker.x += (worker.targetX - worker.x) * 0.05;
                worker.y += (worker.targetY - worker.y) * 0.05;
            }
        }
        
        // Random walking - more frequent
        function randomWalk() {
            workers.forEach(w => {
                if (Math.random() > 0.5) { // 50% chance every 2 seconds
                    const destinations = [
                        { x: 2, y: 2 }, { x: 6, y: 2 },
                        { x: 2, y: 6 }, { x: 6, y: 6 },
                        { x: 4, y: 4 }, { x: 1, y: 4 },
                        { x: 7, y: 4 }, { x: 4, y: 1 },
                        { x: 4, y: 7 }
                    ];
                    const dest = destinations[Math.floor(Math.random() * destinations.length)];
                    w.targetX = dest.x;
                    w.targetY = dest.y;
                }
            });
        }
        
        setInterval(randomWalk, 2000); // Every 2 seconds
        
        // Update movement every frame
        function update() {
            workers.forEach(moveWorker);
        }
        
        setInterval(update, 50);
        
        // Click detection
        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            // Find closest worker
            let closest = null;
            let closestDist = Infinity;
            
            workers.forEach(w => {
                const pos = isoToScreen(w.x, w.y);
                const dist = Math.hypot(x - pos.x, y - (pos.y - 20));
                if (dist < closestDist && dist < 40) {
                    closestDist = dist;
                    closest = w;
                }
            });
            
            if (closest) {
                selectedWorker = closest;
                document.getElementById('chatImg').src = 
                    `https://api.meebits.app/v2/images/larvalabs_full/${closest.meebitId}`;
                document.getElementById('chatName').textContent = closest.name;
                addMsg('agent', `${closest.name}: Hey! I'm working at my desk! 🔥`);
            }
        });
        
        function addMsg(type, text) {
            const div = document.createElement('div');
            div.className = `message ${type}`;
            div.textContent = text;
            document.getElementById('chatMessages').appendChild(div);
            document.getElementById('chatMessages').scrollTop = 99999;
        }
        
        function sendMsg() {
            const input = document.getElementById('chatInput');
            const text = input.value.trim();
            if (!text) return;
            
            addMsg('user', text);
            input.value = '';
            
            setTimeout(() => {
                addMsg('agent', `${selectedWorker.name}: Roger that! Moving to a new spot! 💪`);
                const destinations = [
                    { x: 2, y: 2 }, { x: 6, y: 2 },
                    { x: 2, y: 6 }, { x: 6, y: 6 },
                    { x: 4, y: 4 }
                ];
                const dest = destinations[Math.floor(Math.random() * destinations.length)];
                selectedWorker.targetX = dest.x;
                selectedWorker.targetY = dest.y;
            }, 500);
        }
        
        // Start
        animate();
        
        // Welcome message
        setTimeout(() => {
            addMsg('agent', '✨ Canvas-rendered office with soft Kairosoft colors! Much easier on the eyes!');
        }, 500);
    </script>
</body>
</html>
