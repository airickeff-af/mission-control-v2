<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏢 Game Dev Office v2.0 | Kairosoft Style</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; image-rendering: pixelated; }
        
        body {
            font-family: 'VT323', monospace;
            background: #1a1a2e;
            min-height: 100vh;
            overflow: hidden;
        }
        
        /* Game Header - Stats HUD */
        .game-header {
            background: linear-gradient(180deg, #16213e 0%, #0f3460 100%);
            border-bottom: 4px solid #e94560;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .game-title {
            font-family: 'Press Start 2P', cursive;
            font-size: 12px;
            color: #fff;
            text-shadow: 2px 2px 0 #e94560;
        }
        
        .game-stats {
            display: flex;
            gap: 20px;
            font-size: 14px;
        }
        
        .stat {
            background: rgba(0,0,0,0.3);
            padding: 5px 15px;
            border-radius: 4px;
            border: 2px solid #533483;
        }
        
        .stat-label { color: #a8d8ea; font-size: 10px; font-family: 'Press Start 2P', cursive; }
        .stat-value { color: #ffd700; font-weight: bold; font-size: 16px; }
        
        /* Main Game Area */
        .game-container {
            display: flex;
            height: calc(100vh - 60px);
        }
        
        /* Isometric Office */
        .office-view {
            flex: 1;
            background: #1a1a2e;
            position: relative;
            overflow: auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .iso-container {
            position: relative;
            transform: rotateX(60deg) rotateZ(-45deg);
            transform-style: preserve-3d;
            width: 600px;
            height: 600px;
        }
        
        /* Floor Grid */
        .floor {
            position: absolute;
            width: 100%;
            height: 100%;
            background: 
                repeating-linear-gradient(
                    0deg,
                    #d4a574 0px,
                    #d4a574 40px,
                    #c49464 40px,
                    #c49464 80px
                ),
                repeating-linear-gradient(
                    90deg,
                    transparent 0px,
                    transparent 40px,
                    rgba(0,0,0,0.1) 40px,
                    rgba(0,0,0,0.1) 80px
                );
            border: 8px solid #8b6914;
            box-shadow: 
                0 0 0 4px #5c4033,
                20px 20px 60px rgba(0,0,0,0.5);
        }
        
        /* Wall */
        .wall-back {
            position: absolute;
            top: -80px;
            left: 0;
            right: 0;
            height: 80px;
            background: linear-gradient(180deg, #f5e6c8 0%, #e6d7b8 100%);
            border: 4px solid #8b7355;
            transform: translateZ(1px);
        }
        
        .wall-left {
            position: absolute;
            top: 0;
            left: -80px;
            width: 80px;
            bottom: 0;
            background: linear-gradient(90deg, #e6d7b8 0%, #d7c8a8 100%);
            border: 4px solid #8b7355;
        }
        
        /* Window */
        .window {
            position: absolute;
            width: 100px;
            height: 60px;
            background: linear-gradient(180deg, #87ceeb 0%, #b0e0e6 100%);
            border: 4px solid #5c4033;
        }
        
        .window::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 4px;
            background: #5c4033;
        }
        
        .window::after {
            content: '';
            position: absolute;
            left: 50%;
            top: 0;
            bottom: 0;
            width: 4px;
            background: #5c4033;
        }
        
        /* Whiteboard */
        .whiteboard {
            position: absolute;
            width: 120px;
            height: 80px;
            background: #f5f5f5;
            border: 4px solid #5c4033;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Press Start 2P', cursive;
            font-size: 10px;
            color: #333;
        }
        
        /* Desk */
        .desk {
            position: absolute;
            width: 100px;
            height: 80px;
        }
        
        .desk-top {
            position: absolute;
            width: 100%;
            height: 60%;
            background: linear-gradient(180deg, #deb887 0%, #cd853f 100%);
            border: 3px solid #8b4513;
            border-radius: 4px;
        }
        
        .monitor {
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            width: 50px;
            height: 35px;
            background: #f0f0f0;
            border: 3px solid #666;
            border-radius: 4px;
            box-shadow: 0 0 10px rgba(135,206,235,0.5);
        }
        
        .monitor::after {
            content: '';
            position: absolute;
            top: 5px;
            left: 5px;
            right: 5px;
            bottom: 5px;
            background: linear-gradient(180deg, #87ceeb 0%, #b0e0e6 100%);
        }
        
        .chair {
            position: absolute;
            bottom: 0;
            right: -15px;
            width: 30px;
            height: 40px;
            background: #4169e1;
            border: 2px solid #1e3a8a;
            border-radius: 4px 4px 0 0;
        }
        
        /* Meebit Worker */
        .meebit-worker {
            position: absolute;
            width: 50px;
            height: 60px;
            cursor: pointer;
            z-index: 10;
        }
        
        .meebit-worker:hover {
            transform: scale(1.1);
        }
        
        .meebit-img {
            width: 100%;
            height: 100%;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }
        
        .meebit-worker.working {
            animation: bounce 0.5s infinite;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }
        
        /* Speech Bubble */
        .speech-bubble {
            position: absolute;
            top: -35px;
            left: 50%;
            transform: translateX(-50%);
            background: #fff;
            border: 2px solid #1a1a2e;
            padding: 5px 10px;
            border-radius: 8px;
            font-family: 'Press Start 2P', cursive;
            font-size: 8px;
            color: #1a1a2e;
            white-space: nowrap;
            opacity: 0;
            transition: opacity 0.2s;
            z-index: 20;
        }
        
        .speech-bubble::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            border-left: 8px solid transparent;
            border-right: 8px solid transparent;
            border-top: 8px solid #1a1a2e;
        }
        
        .meebit-worker:hover .speech-bubble,
        .meebit-worker.speaking .speech-bubble {
            opacity: 1;
        }
        
        /* Particle Effects */
        .particle {
            position: fixed;
            pointer-events: none;
            font-size: 20px;
            animation: float-up 1.5s ease-out forwards;
            z-index: 100;
        }
        
        @keyframes float-up {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-100px); opacity: 0; }
        }
        
        /* Chat Panel */
        .chat-panel {
            width: 300px;
            background: linear-gradient(180deg, #16213e 0%, #0f3460 100%);
            border-left: 4px solid #e94560;
            display: flex;
            flex-direction: column;
        }
        
        .chat-header {
            padding: 15px;
            border-bottom: 2px solid #533483;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .chat-avatar {
            width: 50px;
            height: 50px;
            border: 3px solid #fff;
            border-radius: 8px;
            overflow: hidden;
        }
        
        .chat-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .chat-title {
            font-family: 'Press Start 2P', cursive;
            color: #fff;
            font-size: 10px;
        }
        
        .chat-subtitle {
            color: #a8d8ea;
            font-size: 12px;
        }
        
        .chat-messages {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .message {
            max-width: 90%;
            padding: 10px;
            border-radius: 8px;
            font-size: 13px;
        }
        
        .message.agent {
            align-self: flex-start;
            background: rgba(233, 69, 96, 0.2);
            border: 2px solid #e94560;
            color: #fff;
        }
        
        .message.user {
            align-self: flex-end;
            background: rgba(83, 52, 131, 0.5);
            border: 2px solid #533483;
            color: #fff;
        }
        
        .chat-input-area {
            padding: 15px;
            border-top: 2px solid #533483;
        }
        
        .chat-input {
            width: 100%;
            background: rgba(0,0,0,0.3);
            border: 2px solid #533483;
            padding: 10px;
            color: #fff;
            font-family: 'VT323', monospace;
            font-size: 16px;
            margin-bottom: 10px;
        }
        
        .chat-btn {
            width: 100%;
            background: #e94560;
            color: #fff;
            border: none;
            padding: 10px;
            font-family: 'Press Start 2P', cursive;
            font-size: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <header class="game-header">
        <div class="game-title">🏢 GAME DEV OFFICE</div>
        <div class="game-stats">
            <div class="stat">
                <div class="stat-label">BUDGET</div>
                <div class="stat-value">$20.39</div>
            </div>
            <div class="stat">
                <div class="stat-label">FANS</div>
                <div class="stat-value">12</div>
            </div>
            <div class="stat">
                <div class="stat-label">HYPE</div>
                <div class="stat-value">MAX!</div>
            </div>
        </div>
    </header>

    <div class="game-container">
        <div class="office-view">
            <div class="iso-container">
                <div class="floor">
                    <!-- Wall -->
                    <div class="wall-back"></div>
                    <div class="wall-left"></div>
                    
                    <!-- Windows -->
                    <div class="window" style="top: -60px; left: 80px;"></div>
                    <div class="window" style="top: -60px; left: 250px;"></div>
                    
                    <!-- Whiteboard -->
                    <div class="whiteboard" style="top: 30px; left: 30px;">Tasks!</div>
                    
                    <!-- Desks with Meebits -->
                    <div class="desk" style="top: 120px; left: 80px;">
                        <div class="desk-top">
                            <div class="monitor"></div>
                        </div>
                        <div class="chair"></div>
                        
                        <div class="meebit-worker" id="m1" onclick="selectAgent('nexus')" style="top: -20px; left: 25px;">
                            <img class="meebit-img" src="https://api.meebits.app/v2/images/larvalabs_full/1001" alt="Nexus" onerror="this.style.display='none'; this.parentElement.style.background='#FFD700'; this.parentElement.innerHTML='👑'">
                            <div class="speech-bubble">Work!</div>
                        </div>
                    </div>

                    <div class="desk" style="top: 120px; left: 250px;">
                        <div class="desk-top">
                            <div class="monitor"></div>
                        </div>
                        <div class="chair"></div>
                        
                        <div class="meebit-worker" id="m2" onclick="selectAgent('glasses')" style="top: -20px; left: 25px;">
                            <img class="meebit-img" src="https://api.meebits.app/v2/images/larvalabs_full/2001" alt="Glasses" onerror="this.style.display='none'; this.parentElement.style.background='#00D9FF'; this.parentElement.innerHTML='🔍'">
                            <div class="speech-bubble">Research!</div>
                        </div>
                    </div>

                    <div class="desk" style="top: 280px; left: 80px;">
                        <div class="desk-top">
                            <div class="monitor"></div>
                        </div>
                        <div class="chair"></div>
                        
                        <div class="meebit-worker" id="m3" onclick="selectAgent('pixel')" style="top: -20px; left: 25px;">
                            <img class="meebit-img" src="https://api.meebits.app/v2/images/larvalabs_full/4001" alt="Pixel" onerror="this.style.display='none'; this.parentElement.style.background='#9370DB'; this.parentElement.innerHTML='🎨'">
                            <div class="speech-bubble">Design!</div>
                        </div>
                    </div>

                    <div class="desk" style="top: 280px; left: 250px;">
                        <div class="desk-top">
                            <div class="monitor"></div>
                        </div>
                        <div class="chair"></div>
                        
                        <div class="meebit-worker" id="m4" onclick="selectAgent('sentry')" style="top: -20px; left: 25px;">
                            <img class="meebit-img" src="https://api.meebits.app/v2/images/larvalabs_full/57" alt="Sentry" onerror="this.style.display='none'; this.parentElement.style.background='#DC143C'; this.parentElement.innerHTML='🛡️'">
                            <div class="speech-bubble">Secure!</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="chat-panel">
            <div class="chat-header">
                <div class="chat-avatar">
                    <img id="chatImg" src="https://api.meebits.app/v2/images/larvalabs_full/1001" alt="Nexus">
                </div>
                <div>
                    <div class="chat-title" id="chatName">NEXUS</div>
                    <div class="chat-subtitle">Robot Director</div>
                </div>
            </div>
            
            <div class="chat-messages" id="chatMessages">
                <div class="message agent">Welcome to Game Dev Office! Click a Meebit to chat! 🔥</div>
            </div>
            
            <div class="chat-input-area">
                <input type="text" class="chat-input" id="chatInput" placeholder="Type command..."
                       onkeypress="if(event.key==='Enter') sendMsg()">
                <button class="chat-btn" onclick="sendMsg()">SEND</button>
            </div>
        </div>
    </div>

    <script>
        const agents = {
            nexus: { name: 'NEXUS', meebitId: 1001, role: 'Robot Director' },
            glasses: { name: 'GLASSES', meebitId: 2001, role: 'Researcher' },
            pixel: { name: 'PIXEL', meebitId: 4001, role: 'Designer' },
            sentry: { name: 'SENTRY', meebitId: 57, role: 'Security' }
        };
        
        let selected = agents.nexus;
        
        function selectAgent(id) {
            selected = agents[id];
            document.getElementById('chatImg').src = `https://api.meebits.app/v2/images/larvalabs_full/${selected.meebitId}`;
            document.getElementById('chatName').textContent = selected.name;
            addMsg('agent', `${selected.name} here! Ready to ${selected.role.toLowerCase()}! 💪`);
            
            // Animate
            const el = event.currentTarget;
            el.classList.add('working');
            setTimeout(() => el.classList.remove('working'), 1000);
        }
        
        function addMsg(type, text) {
            const div = document.createElement('div');
            div.className = `message ${type}`;
            div.textContent = text;
            document.getElementById('chatMessages').appendChild(div);
            document.getElementById('chatMessages').scrollTop = 99999;
        }
        
        function sendMsg() {
            const input = document.getElementById('chatInput');
            const text = input.value.trim();
            if (!text) return;
            
            addMsg('user', text);
            input.value = '';
            
            setTimeout(() => {
                addMsg('agent', `${selected.name}: Roger that! On it! 🔥`);
            }, 500);
        }
        
        // Random animations
        setInterval(() => {
            const workers = document.querySelectorAll('.meebit-worker');
            const random = workers[Math.floor(Math.random() * workers.length)];
            random.classList.add('working');
            random.classList.add('speaking');
            
            setTimeout(() => {
                random.classList.remove('working');
                random.classList.remove('speaking');
            }, 1500);
        }, 3000);
    </script>
</body>
</html>
