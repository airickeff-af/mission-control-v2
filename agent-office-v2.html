<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏢 Game Dev Office v2.2 | Meebits Walking!</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; image-rendering: pixelated; }
        
        body {
            font-family: 'VT323', monospace;
            background: #1a1a2e;
            min-height: 100vh;
            overflow: hidden;
        }
        
        .game-header {
            background: linear-gradient(180deg, #16213e 0%, #0f3460 100%);
            border-bottom: 4px solid #e94560;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .game-title {
            font-family: 'Press Start 2P', cursive;
            font-size: 12px;
            color: #fff;
            text-shadow: 2px 2px 0 #e94560;
        }
        
        .game-stats {
            display: flex;
            gap: 20px;
        }
        
        .stat {
            background: rgba(0,0,0,0.3);
            padding: 5px 15px;
            border-radius: 4px;
            border: 2px solid #533483;
        }
        
        .stat-label { color: #a8d8ea; font-size: 10px; font-family: 'Press Start 2P', cursive; }
        .stat-value { color: #ffd700; font-weight: bold; font-size: 16px; }
        
        .game-container {
            display: flex;
            height: calc(100vh - 60px);
        }
        
        .office-view {
            flex: 1;
            background: #1a1a2e;
            position: relative;
            overflow: hidden;
        }
        
        .iso-world {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotateX(60deg) rotateZ(-45deg);
            transform-style: preserve-3d;
            width: 800px;
            height: 800px;
        }
        
        .floor {
            position: absolute;
            width: 100%;
            height: 100%;
            background: 
                repeating-linear-gradient(
                    0deg,
                    #d4a574 0px,
                    #d4a574 40px,
                    #c49464 40px,
                    #c49464 80px
                ),
                repeating-linear-gradient(
                    90deg,
                    transparent 0px,
                    transparent 40px,
                    rgba(0,0,0,0.1) 40px,
                    rgba(0,0,0,0.1) 80px
                );
            border: 8px solid #8b6914;
            box-shadow: 0 0 0 4px #5c4033;
        }
        
        .wall-back {
            position: absolute;
            top: -80px;
            left: 0;
            right: 0;
            height: 80px;
            background: linear-gradient(180deg, #f5e6c8 0%, #e6d7b8 100%);
            border: 4px solid #8b7355;
        }
        
        .wall-left {
            position: absolute;
            top: 0;
            left: -80px;
            width: 80px;
            bottom: 0;
            background: linear-gradient(90deg, #e6d7b8 0%, #d7c8a8 100%);
            border: 4px solid #8b7355;
        }
        
        .window {
            position: absolute;
            width: 100px;
            height: 60px;
            background: linear-gradient(180deg, #87ceeb 0%, #b0e0e6 100%);
            border: 4px solid #5c4033;
        }
        
        .window::before, .window::after {
            content: '';
            position: absolute;
            background: #5c4033;
        }
        
        .window::before { top: 50%; left: 0; right: 0; height: 4px; }
        .window::after { left: 50%; top: 0; bottom: 0; width: 4px; }
        
        .whiteboard {
            position: absolute;
            width: 120px;
            height: 80px;
            background: #f5f5f5;
            border: 4px solid #5c4033;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Press Start 2P', cursive;
            font-size: 10px;
            color: #333;
        }
        
        /* Walkable Tile Grid */
        .tile {
            position: absolute;
            width: 40px;
            height: 40px;
            border: 1px solid rgba(0,0,0,0.1);
        }
        
        .tile:hover {
            background: rgba(255,255,255,0.2);
        }
        
        /* Desk */
        .desk {
            position: absolute;
            width: 80px;
            height: 60px;
            z-index: 5;
        }
        
        .desk-visual {
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, #deb887 0%, #cd853f 100%);
            border: 3px solid #8b4513;
            border-radius: 4px;
        }
        
        .desk-visual::before {
            content: '';
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 30px;
            background: #f0f0f0;
            border: 2px solid #666;
            box-shadow: 0 0 8px rgba(135,206,235,0.5);
        }
        
        /* Meebit Worker with Sprite Sheet */
        .meebit-worker {
            position: absolute;
            width: 64px;
            height: 64px;
            z-index: 10;
            transition: transform 0.1s linear;
        }
        
        .meebit-sprite {
            width: 100%;
            height: 100%;
            background-size: 256px 256px;
            image-rendering: pixelated;
        }
        
        /* Animation states using sprite sheet rows */
        .meebit-sprite.idle {
            animation: anim-idle 0.8s steps(4) infinite;
        }
        
        .meebit-sprite.walk-down {
            animation: anim-walk-down 0.6s steps(4) infinite;
        }
        
        .meebit-sprite.walk-up {
            animation: anim-walk-up 0.6s steps(4) infinite;
        }
        
        .meebit-sprite.walk-left {
            animation: anim-walk-left 0.6s steps(4) infinite;
        }
        
        .meebit-sprite.walk-right {
            animation: anim-walk-right 0.6s steps(4) infinite;
        }
        
        @keyframes anim-idle {
            0% { background-position: 0 0; }
            100% { background-position: -256px 0; }
        }
        
        @keyframes anim-walk-down {
            0% { background-position: 0 -64px; }
            100% { background-position: -256px -64px; }
        }
        
        @keyframes anim-walk-up {
            0% { background-position: 0 -128px; }
            100% { background-position: -256px -128px; }
        }
        
        @keyframes anim-walk-left {
            0% { background-position: 0 -192px; }
            100% { background-position: -256px -192px; }
        }
        
        @keyframes anim-walk-right {
            0% { background-position: 0 0; transform: scaleX(-1); }
            100% { background-position: -256px 0; transform: scaleX(-1); }
        }
        
        /* Speech Bubble */
        .speech-bubble {
            position: absolute;
            top: -30px;
            left: 50%;
            transform: translateX(-50%);
            background: #fff;
            border: 2px solid #1a1a2e;
            padding: 4px 8px;
            border-radius: 8px;
            font-family: 'Press Start 2P', cursive;
            font-size: 8px;
            color: #1a1a2e;
            white-space: nowrap;
            opacity: 0;
            z-index: 20;
            pointer-events: none;
        }
        
        .meebit-worker.speaking .speech-bubble {
            opacity: 1;
            animation: pop-in 0.3s ease-out;
        }
        
        @keyframes pop-in {
            0% { transform: translateX(-50%) scale(0); }
            50% { transform: translateX(-50%) scale(1.2); }
            100% { transform: translateX(-50%) scale(1); }
        }
        
        .speech-bubble::after {
            content: '';
            position: absolute;
            bottom: -6px;
            left: 50%;
            transform: translateX(-50%);
            border-left: 6px solid transparent;
            border-right: 6px solid transparent;
            border-top: 6px solid #1a1a2e;
        }
        
        /* Chat Panel */
        .chat-panel {
            width: 300px;
            background: linear-gradient(180deg, #16213e 0%, #0f3460 100%);
            border-left: 4px solid #e94560;
            display: flex;
            flex-direction: column;
        }
        
        .chat-header {
            padding: 15px;
            border-bottom: 2px solid #533483;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .chat-avatar {
            width: 50px;
            height: 50px;
            border: 3px solid #fff;
            border-radius: 8px;
            overflow: hidden;
        }
        
        .chat-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .chat-title {
            font-family: 'Press Start 2P', cursive;
            color: #fff;
            font-size: 10px;
        }
        
        .chat-subtitle {
            color: #a8d8ea;
            font-size: 12px;
        }
        
        .chat-messages {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .message {
            max-width: 90%;
            padding: 10px;
            border-radius: 8px;
            font-size: 13px;
        }
        
        .message.agent {
            align-self: flex-start;
            background: rgba(233, 69, 96, 0.2);
            border: 2px solid #e94560;
            color: #fff;
        }
        
        .message.user {
            align-self: flex-end;
            background: rgba(83, 52, 131, 0.5);
            border: 2px solid #533483;
            color: #fff;
        }
        
        .chat-input-area {
            padding: 15px;
            border-top: 2px solid #533483;
        }
        
        .chat-input {
            width: 100%;
            background: rgba(0,0,0,0.3);
            border: 2px solid #533483;
            padding: 10px;
            color: #fff;
            font-family: 'VT323', monospace;
            font-size: 16px;
            margin-bottom: 10px;
        }
        
        .chat-btn {
            width: 100%;
            background: #e94560;
            color: #fff;
            border: none;
            padding: 10px;
            font-family: 'Press Start 2P', cursive;
            font-size: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <header class="game-header">
        <div class="game-title">🏢 GAME DEV OFFICE v2.2</div>
        <div class="game-stats">
            <div class="stat">
                <div class="stat-label">BUDGET</div>
                <div class="stat-value">$20.39</div>
            </div>
            <div class="stat">
                <div class="stat-label">FANS</div>
                <div class="stat-value">12</div>
            </div>
            <div class="stat">
                <div class="stat-label">HYPE</div>
                <div class="stat-value">MAX!</div>
            </div>
        </div>
    </header>

    <div class="game-container">
        <div class="office-view" id="officeView">
            <div class="iso-world" id="isoWorld">
                <div class="floor">
                    <div class="wall-back"></div>
                    <div class="wall-left"></div>
                    
                    <div class="window" style="top: -60px; left: 100px;"></div>
                    <div class="window" style="top: -60px; left: 300px;"></div>
                    
                    <div class="whiteboard" style="top: 50px; left: 50px;">Tasks!</div>
                    
                    <!-- Desks -->
                    <div class="desk" style="top: 150px; left: 100px;" data-desk="1">
                        <div class="desk-visual"></div>
                    </div>
                    
                    <div class="desk" style="top: 150px; left: 300px;" data-desk="2">
                        <div class="desk-visual"></div>
                    </div>
                    
                    <div class="desk" style="top: 350px; left: 100px;" data-desk="3">
                        <div class="desk-visual"></div>
                    </div>
                    
                    <div class="desk" style="top: 350px; left: 300px;" data-desk="4">
                        <div class="desk-visual"></div>
                    </div>

                    <!-- Meebit Workers -->
                    <div class="meebit-worker" id="worker-nexus" data-desk="1"
                         style="top: 130px; left: 110px;">
                        <div class="meebit-sprite idle" 
                             style="background-image: url('https://files.meebits.app/sprites/1001.png');"></div>
                        <div class="speech-bubble">Work!</div>
                    </div>

                    <div class="meebit-worker" id="worker-glasses" data-desk="2"
                         style="top: 130px; left: 310px;">
                        <div class="meebit-sprite idle"
                             style="background-image: url('https://files.meebits.app/sprites/2001.png');"></div>
                        <div class="speech-bubble">Research!</div>
                    </div>

                    <div class="meebit-worker" id="worker-pixel" data-desk="3"
                         style="top: 330px; left: 110px;">
                        <div class="meebit-sprite idle"
                             style="background-image: url('https://files.meebits.app/sprites/4001.png');"></div>
                        <div class="speech-bubble">Design!</div>
                    </div>

                    <div class="meebit-worker" id="worker-sentry" data-desk="4"
                         style="top: 330px; left: 310px;">
                        <div class="meebit-sprite idle"
                             style="background-image: url('https://files.meebits.app/sprites/57.png');"></div>
                        <div class="speech-bubble">Secure!</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="chat-panel">
            <div class="chat-header">
                <div class="chat-avatar">
                    <img id="chatImg" src="https://api.meebits.app/v2/images/larvalabs_full/1001" alt="Nexus">
                </div>
                <div>
                    <div class="chat-title" id="chatName">NEXUS</div>
                    <div class="chat-subtitle">Robot Director | Walking around!</div>
                </div>
            </div>
            
            <div class="chat-messages" id="chatMessages">
                <div class="message agent">🔥 Meebits are WALKING! Using sprite sheets from meebco-api for 4-directional movement!</div>
            </div>
            
            <div class="chat-input-area">
                <input type="text" class="chat-input" id="chatInput" placeholder="Click a Meebit or type..."
                       onkeypress="if(event.key==='Enter') sendMsg()">
                <button class="chat-btn" onclick="sendMsg()">SEND</button>
            </div>
        </div>
    </div>

    <script>
        // Worker definitions
        const workers = {
            nexus: { 
                id: 'worker-nexus', 
                name: 'NEXUS', 
                meebitId: 1001,
                homeDesk: { x: 110, y: 130 },
                currentPos: { x: 110, y: 130 },
                target: null,
                isMoving: false
            },
            glasses: { 
                id: 'worker-glasses', 
                name: 'GLASSES', 
                meebitId: 2001,
                homeDesk: { x: 310, y: 130 },
                currentPos: { x: 310, y: 130 },
                target: null,
                isMoving: false
            },
            pixel: { 
                id: 'worker-pixel', 
                name: 'PIXEL', 
                meebitId: 4001,
                homeDesk: { x: 110, y: 330 },
                currentPos: { x: 110, y: 330 },
                target: null,
                isMoving: false
            },
            sentry: { 
                id: 'worker-sentry', 
                name: 'SENTRY', 
                meebitId: 57,
                homeDesk: { x: 310, y: 330 },
                currentPos: { x: 310, y: 330 },
                target: null,
                isMoving: false
            }
        };
        
        let selectedWorker = workers.nexus;
        
        // Walking destinations (office hotspots)
        const destinations = [
            { x: 110, y: 130, name: 'Desk 1' },
            { x: 310, y: 130, name: 'Desk 2' },
            { x: 110, y: 330, name: 'Desk 3' },
            { x: 310, y: 330, name: 'Desk 4' },
            { x: 200, y: 230, name: 'Center' },
            { x: 450, y: 200, name: 'Vending' },
            { x: 50, y: 200, name: 'Whiteboard' }
        ];
        
        function getDirection(from, to) {
            const dx = to.x - from.x;
            const dy = to.y - from.y;
            
            if (Math.abs(dx) > Math.abs(dy)) {
                return dx > 0 ? 'right' : 'left';
            } else {
                return dy > 0 ? 'down' : 'up';
            }
        }
        
        function moveWorker(workerId, targetX, targetY) {
            const worker = workers[workerId];
            if (worker.isMoving) return;
            
            worker.isMoving = true;
            worker.target = { x: targetX, y: targetY };
            
            const el = document.getElementById(worker.id);
            const sprite = el.querySelector('.meebit-sprite');
            
            // Calculate direction
            const direction = getDirection(worker.currentPos, worker.target);
            
            // Set walking animation
            sprite.className = `meebit-sprite walk-${direction}`;
            
            // Animate position
            const duration = 2000;
            const startX = worker.currentPos.x;
            const startY = worker.currentPos.y;
            const startTime = Date.now();
            
            function animate() {
                const elapsed = Date.now() - startTime;
                const progress = Math.min(elapsed / duration, 1);
                
                const currentX = startX + (targetX - startX) * progress;
                const currentY = startY + (targetY - startY) * progress;
                
                el.style.left = currentX + 'px';
                el.style.top = currentY + 'px';
                
                worker.currentPos = { x: currentX, y: currentY };
                
                if (progress < 1) {
                    requestAnimationFrame(animate);
                } else {
                    // Arrived
                    worker.isMoving = false;
                    worker.target = null;
                    sprite.className = 'meebit-sprite idle';
                    el.classList.add('speaking');
                    
                    setTimeout(() => el.classList.remove('speaking'), 1500);
                }
            }
            
            animate();
        }
        
        function randomWalk() {
            const workerIds = Object.keys(workers);
            const randomWorkerId = workerIds[Math.floor(Math.random() * workerIds.length)];
            const worker = workers[randomWorkerId];
            
            if (worker.isMoving) return;
            
            // Pick random destination
            const dest = destinations[Math.floor(Math.random() * destinations.length)];
            
            // 50% chance to go back home
            if (Math.random() > 0.5) {
                moveWorker(randomWorkerId, worker.homeDesk.x, worker.homeDesk.y);
            } else {
                moveWorker(randomWorkerId, dest.x, dest.y);
            }
        }
        
        // Start random walking
        setInterval(randomWalk, 3000);
        
        // Click to select/chat
        Object.keys(workers).forEach(id => {
            const el = document.getElementById(workers[id].id);
            el.addEventListener('click', () => {
                selectedWorker = workers[id];
                document.getElementById('chatImg').src = `https://api.meebits.app/v2/images/larvalabs_full/${selectedWorker.meebitId}`;
                document.getElementById('chatName').textContent = selectedWorker.name;
                addMsg('agent', `${selectedWorker.name} here! I'm at ${selectedWorker.currentPos.x}, ${selectedWorker.currentPos.y}! 💪`);
                
                el.classList.add('speaking');
                setTimeout(() => el.classList.remove('speaking'), 1500);
            });
        });
        
        function addMsg(type, text) {
            const div = document.createElement('div');
            div.className = `message ${type}`;
            div.textContent = text;
            document.getElementById('chatMessages').appendChild(div);
            document.getElementById('chatMessages').scrollTop = 99999;
        }
        
        function sendMsg() {
            const input = document.getElementById('chatInput');
            const text = input.value.trim();
            if (!text) return;
            
            addMsg('user', text);
            input.value = '';
            
            setTimeout(() => {
                addMsg('agent', `${selectedWorker.name}: Roger! Moving to new location! 🔥`);
                // Move to random spot
                const dest = destinations[Math.floor(Math.random() * destinations.length)];
                moveWorker(Object.keys(workers).find(k => workers[k] === selectedWorker), dest.x, dest.y);
            }, 500);
        }
        
        // Initial greeting
        setTimeout(() => {
            addMsg('agent', '🎮 Watch the Meebits walk around the office! They use real sprite sheets from the MeebCo API!');
        }, 1000);
    </script>
</body>
</html>
