            async loadSprite(id) {
                return new Promise((resolve, reject) => {
                    const img = new Image();
                    img.crossOrigin = 'anonymous';
                    img.onload = () => resolve(img);
                    img.onerror = () => reject(new Error(`Failed to load sprite for Meebit ${id}`));
                    img.src = `${this.baseUrl}/${id}.png`;

            spriteConfig: {

                frameHeight: 128,

            getFrameCoords(direction, frameNum) {
                const { frameWidth, frameHeight, framesPerRow } = this.spriteConfig;
                const row = direction;
                const col = frameNum % framesPerRow;
                return {
                    sx: col * frameWidth,
                    sy: row * frameHeight,
                    sw: frameWidth,
                    sh: frameHeight
                };
            },

        // ============================================
        // SPRITE SHEET LOADER
        // ============================================
        class SpriteSheet {
            constructor(image, config) {
                this.image = image;
                this.config = config;
                this.frameWidth = config.frameWidth;
                this.frameHeight = config.frameHeight;
                this.framesPerRow = config.framesPerRow;
            }

            // Get frame coordinates for direction and frame number
            getFrame(direction, frameNum) {
                const row = direction;
                const col = frameNum % this.framesPerRow;
                return {
                    sx: col * this.frameWidth,
                    sy: row * this.frameHeight,
                    sw: this.frameWidth,
                    sh: this.frameHeight
                };
            }

            // Draw a specific frame
            draw(ctx, x, y, width, height, direction, frameNum) {
                const frame = this.getFrame(direction, frameNum);
                ctx.drawImage(
                    this.image,
                    frame.sx, frame.sy, frame.sw, frame.sh,
                    x - width / 2, y - height, width, height
                );
            }
        }

        // ============================================
        // UTILITY FUNCTIONS
        // ============================================
        function loadImage(src) {
            return new Promise((resolve) => {
                const img = new Image();
                img.crossOrigin = 'anonymous';
                img.onload = () => resolve({ img, success: true });
                img.onerror = () => resolve({ img: null, success: false, error: true });
                img.src = src;
            });
        }

        function addToChat(name, text, color = '#00d4ff') {
            const historyEl = document.getElementById('chatHistory');
            const msg = document.createElement('div');
            msg.className = 'chat-message';
            msg.innerHTML = `<span style="color:${color}">${name}:</span> ${text}`;
            historyEl.insertBefore(msg, historyEl.firstChild);
            while (historyEl.children.length > 15) historyEl.removeChild(historyEl.lastChild);
        }

        function getTimeOfDay() {
            const hour = new Date().getHours();
            if (hour >= 6 && hour < 9) return { name: 'DAWN', icon: '🌅', class: 'time-dawn', overlay: 'rgba(255,200,100,0.15)' };
            if (hour >= 9 && hour < 17) return { name: 'DAY', icon: '☀️', class: 'time-day', overlay: 'rgba(0,0,0,0)' };
            if (hour >= 17 && hour < 20) return { name: 'DUSK', icon: '🌇', class: 'time-dusk', overlay: 'rgba(200,100,50,0.2)' };
            return { name: 'NIGHT', icon: '🌙', class: 'time-night', overlay: 'rgba(50,50,100,0.35)' };
        }

        function updateTimeDisplay() {
            const time = getTimeOfDay();
            const now = new Date();
            document.getElementById('timeIcon').textContent = time.icon;
            document.getElementById('timeLabel').textContent = time.name;
            document.getElementById('timeLabel').className = time.class;
            document.getElementById('timeValue').textContent = now.toLocaleTimeString('en-US', {hour:'2-digit',minute:'2-digit'});
            return time;

        // ============================================
        // SMART AI AGENT CLASS
        // ============================================
        class SmartAgent {
            constructor(config, spriteSheet, relationships) {
                this.config = config;
                this.spriteSheet = spriteSheet;
                this.relationships = relationships;
                
                // Position
                this.x = config.x || 0;
                this.y = config.y || 0;
                this.tx = this.x;
                this.ty = this.y;
                
                // Animation
                this.direction = DIRECTIONS.DOWN;
                this.frame = 0;
                this.animTimer = 0;
                this.isMoving = false;
                
                // AI State
                this.state = 'idle'; // idle, working, walking, socializing, resting
                this.stateTimer = 0;
                this.energy = 80 + Math.random() * 20;
                this.happiness = 70 + Math.random() * 30;
                this.productivity = 60 + Math.random() * 40;
                this.socialBattery = 50 + Math.random() * 50;
                
                // Memory
                this.memory = {
                    lastChatted: {},
                    conversations: [],
                    achievements: [],
                    mood: 'neutral'
                };
                
                // Speech
                this.speech = null;
                this.speechTimer = 0;
                this.chatCooldown = 0;
                
                // Current activity
                this.currentTask = null;
                this.taskProgress = 0;
            }

            getDirection(dx, dy) {
                if (Math.abs(dx) > Math.abs(dy)) {
                    return dx > 0 ? DIRECTIONS.RIGHT : DIRECTIONS.LEFT;
                } else {
                    return dy > 0 ? DIRECTIONS.DOWN : DIRECTIONS.UP;
                }
            }

            getRelationshipWith(otherId) {
                return this.relationships[otherId] || 50; // 0-100 scale, 50 is neutral
            }

            updateRelationship(otherId, delta) {
                this.relationships[otherId] = Math.max(0, Math.min(100, (this.relationships[otherId] || 50) + delta));
            }

            pickDialogue(type, context = {}) {
                const dialogues = DIALOGUES[type];
                if (!dialogues || !dialogues[this.config.id]) {
                    // Fall back to generic
                    const generic = ["Interesting...", "I see.", "Hmm.", "Proceeding."];
                    return generic[Math.floor(Math.random() * generic.length)];
                }
                const options = dialogues[this.config.id];
                return options[Math.floor(Math.random() * options.length)];
            }

            speak(text, duration = 4000) {
                this.speech = text;
                this.speechTimer = duration;
                addToChat(this.config.name, text, this.config.color);
            }

            update(dt, allAgents, particles) {
                this.animTimer += dt;
                this.stateTimer += dt;
                this.chatCooldown -= dt;
                
                // Energy decay
                if (this.state === 'working') {
                    this.energy -= dt * 0.002;
                    this.productivity = Math.min(100, this.productivity + dt * 0.001);
                } else if (this.state === 'idle') {
                    this.energy = Math.min(100, this.energy + dt * 0.003);
                }
                
                // Update mood based on stats
                if (this.energy < 30) this.memory.mood = 'tired';
                else if (this.happiness > 80) this.memory.mood = 'excited';
                else if (this.productivity > 80) this.memory.mood = 'inspired';
                else this.memory.mood = 'neutral';

                // Animation frame update
                if (this.animTimer > SPRITE_CONFIG.animSpeed) {
                    this.animTimer = 0;
                    this.frame = (this.frame + 1) % SPRITE_CONFIG.framesPerRow;
                }

                // State machine
                switch (this.state) {
                    case 'idle':
                        this.handleIdleState(dt, allAgents);
                        break;
                    case 'working':
                        this.handleWorkingState(dt, allAgents);
                        break;
                    case 'walking':
                        this.handleWalkingState(dt);
                        break;
                    case 'socializing':
                        this.handleSocializingState(dt, allAgents);
                        break;
                    case 'resting':
                        this.handleRestingState(dt);
                        break;
                }

                // Clear speech
                if (this.speechTimer > 0) {
                    this.speechTimer -= dt;
                    if (this.speechTimer <= 0) this.speech = null;
                }
            }

            handleIdleState(dt, allAgents) {
                // Random chance to start working
                if (Math.random() < 0.01 && this.energy > 40) {
                    this.state = 'working';
                    this.stateTimer = 0;
                    this.currentTask = this.config.skills[Math.floor(Math.random() * this.config.skills.length)];
                    this.speak(this.pickDialogue('working'));
                    return;
                }

                // Random chance to walk somewhere
                if (Math.random() < 0.005) {
                    this.startWalking();
                    return;
                }

                // Social interaction check
                if (this.chatCooldown <= 0 && this.socialBattery > 20) {
                    const nearby = this.findNearbyAgents(allAgents, 3);
                    if (nearby.length > 0 && Math.random() < 0.02) {
                        this.startSocializing(nearby[0]);
                    }
                }

                // Random chat when idle
                if (this.chatCooldown <= 0 && Math.random() < 0.008) {
                    this.speak(this.pickDialogue('greeting'));
                    this.chatCooldown = 8000 + Math.random() * 7000;
                }
            }

            handleWorkingState(dt, allAgents) {
                this.taskProgress += dt * 0.0001;
                
                // Finish work after some time
                if (this.stateTimer > 10000 + Math.random() * 10000 || this.energy < 20) {
                    this.taskProgress = 0;
                    this.state = 'idle';
                    this.stateTimer = 0;
                    this.speak("Task complete! ✅");
                    
                    // Chance to start conversation after work
                    const nearby = this.findNearbyAgents(allAgents, 4);
                    if (nearby.length > 0 && Math.random() < 0.3) {
                        setTimeout(() => this.startSocializing(nearby[0]), 1000);
                    }
                }
            }

            handleWalkingState(dt) {
                const dx = this.tx - this.x;
                const dy = this.ty - this.y;
                const dist = Math.hypot(dx, dy);

                if (dist < 0.1) {
                    this.x = this.tx;
                    this.y = this.ty;
                    this.isMoving = false;
                    this.state = 'idle';
                    this.stateTimer = 0;
                    this.frame = 0; // Reset to standing frame
                } else {
                    const speed = 0.025;
                    this.x += (dx / dist) * speed;
                    this.y += (dy / dist) * speed;
                    this.direction = this.getDirection(dx, dy);
                    this.isMoving = true;
                }
            }

            handleSocializingState(dt, allAgents) {
                // Socializing consumes social battery but increases happiness
                this.socialBattery -= dt * 0.01;
                this.happiness = Math.min(100, this.happiness + dt * 0.005);

                if (this.stateTimer > 5000 || this.socialBattery < 10) {
                    this.state = 'idle';
                    this.stateTimer = 0;
                }
            }

            handleRestingState(dt) {
                this.energy = Math.min(100, this.energy + dt * 0.01);
                if (this.energy > 80) {
                    this.state = 'idle';
                    this.stateTimer = 0;
                    this.speak("Refreshed and ready! ☕");
                }
            }

            startWalking() {
                const zone = ZONES[this.config.id];
                this.tx = zone.minX + Math.random() * (zone.maxX - zone.minX);
                this.ty = zone.minY + Math.random() * (zone.maxY - zone.minY);
                this.state = 'walking';
                this.isMoving = true;
            }

            startSocializing(otherAgent) {
                this.state = 'socializing';
                this.stateTimer = 0;
                
                // Generate context-aware dialogue
                const rel = this.getRelationshipWith(otherAgent.config.id);
                let dialogueType = 'social';
                
                if (rel > 70) {
                    this.speak(this.pickDialogue('social', {type: 'compliment'}));
                } else if (rel < 30) {
                    this.speak(this.pickDialogue('reacting', {type: 'neutral'}));
                } else {
                    const types = ['compliment', 'question', 'random'];
                    const type = types[Math.floor(Math.random() * types.length)];
                    this.speak(DIALOGUES.social[type][Math.floor(Math.random() * DIALOGUES.social[type].length)]);
                }
                
                // Update relationship
                this.updateRelationship(otherAgent.config.id, 5);
                otherAgent.updateRelationship(this.config.id, 5);
                
                this.chatCooldown = 10000;
            }

            findNearbyAgents(allAgents, radius) {
                return Array.from(allAgents.values()).filter(a => {
                    if (a === this) return false;
                    const dist = Math.hypot(a.x - this.x, a.y - this.y);
                    return dist < radius;
                });
            }

            render(ctx, math, cam, vm) {
                const pos = math.toScreen(this.x, this.y, 0);
                const px = (pos.x - cam.x) * cam.zoom;
                const py = (pos.y - cam.y) * cam.zoom;
                const size = 100 * cam.zoom;

                // Shadow
                ctx.fillStyle = 'rgba(0,0,0,0.4)';
                ctx.beginPath();
                ctx.ellipse(px, py + size * 0.45, size * 0.3, size * 0.08, 0, 0, Math.PI * 2);
                ctx.fill();

                // Render sprite sheet frame
                if (this.spriteSheet && this.spriteSheet.image) {
                    // Use frame 0 when idle, animate when moving
                    const frameNum = this.isMoving ? this.frame : 0;
                    this.spriteSheet.draw(ctx, px, py + size * 0.35, size, size, this.direction, frameNum);
                } else {
                    // Fallback
                    ctx.fillStyle = this.config.color;
                    ctx.fillRect(px - size/2, py - size, size, size);
                }

                // Name tag with role
                ctx.fillStyle = 'rgba(0,0,0,0.85)';
                ctx.fillRect(px - 55, py + size * 0.05, 110, 22);
                ctx.fillStyle = this.config.color;
                ctx.font = 'bold 11px monospace';
                ctx.textAlign = 'center';
                ctx.fillText(this.config.name, px, py + size * 0.05 + 10);
                ctx.fillStyle = '#888';
                ctx.font = '9px monospace';
                ctx.fillText(this.config.role, px, py + size * 0.05 + 19);

                // State indicator
                const stateEmojis = {
                    idle: this.config.emoji,
                    working: '💻',
                    walking: '🚶',
                    socializing: '💬',
                    resting: '☕'
                };
                ctx.font = `${16 * cam.zoom}px serif`;
                ctx.fillText(stateEmojis[this.state] || this.config.emoji, px + size * 0.5, py - size * 0.6);

                // Progress bar if working
                if (this.state === 'working' && this.currentTask) {
                    ctx.fillStyle = '#333';
                    ctx.fillRect(px - 40, py - size * 0.7, 80, 6);
                    ctx.fillStyle = this.config.color;
                    ctx.fillRect(px - 40, py - size * 0.7, 80 * Math.min(1, this.taskProgress), 6);
                }

                // Speech bubble
                if (this.speech) {
                    this.renderSpeechBubble(ctx, px, py - size * 1.1, this.speech, cam.zoom);
                }
            }

            renderSpeechBubble(ctx, x, y, text, zoom) {
                ctx.font = `bold ${Math.max(10, 11 * zoom)}px monospace`;
                const maxWidth = 120 * zoom;
                const lines = this.wrapText(ctx, text, maxWidth);
                const lineHeight = 14 * zoom;
                const padding = 10 * zoom;
                const boxWidth = Math.min(maxWidth + padding * 2, 200 * zoom);
                const boxHeight = lines.length * lineHeight + padding * 2;

                // Draw bubble
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.roundRect(x - boxWidth/2, y - boxHeight, boxWidth, boxHeight, 8 * zoom);
                ctx.fill();
                ctx.strokeStyle = '#000';
                ctx.lineWidth = 2 * zoom;
                ctx.stroke();

                // Draw text
                ctx.fillStyle = '#000';
                ctx.textAlign = 'center';
                lines.forEach((line, i) => {
                    ctx.fillText(line, x, y - boxHeight + padding + (i + 1) * lineHeight);
                });

                // Draw tail
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.moveTo(x - 5 * zoom, y);
                ctx.lineTo(x + 5 * zoom, y);
                ctx.lineTo(x, y + 10 * zoom);
                ctx.fill();
                ctx.stroke();
            }

            wrapText(ctx, text, maxWidth) {
                const words = text.split(' ');
                const lines = [];
                let currentLine = words[0];

                for (let i = 1; i < words.length; i++) {
                    const width = ctx.measureText(currentLine + ' ' + words[i]).width;
                    if (width < maxWidth) {
                        currentLine += ' ' + words[i];
                    } else {
                        lines.push(currentLine);
                        currentLine = words[i];
                    }
                }
                lines.push(currentLine);
                return lines;
            }
        }

        // ============================================
        // BYTE THE CYBER-CORGI (With animations)
        // ============================================
        class Byte {
            constructor(sprites) {
                this.sprites = sprites;
                this.x = -8;
                this.y = 4;
                this.bedX = -8;
                this.bedY = 4;
                this.state = 'sleep'; // sleep, idle, wander, play
                this.stateTimer = 0;
                this.targetX = this.x;
                this.targetY = this.y;
                this.direction = DIRECTIONS.DOWN;
                this.frame = 0;
                this.animTimer = 0;
                this.happiness = 100;
            }

            update(dt) {
                this.animTimer += dt;
                this.stateTimer += dt;

                if (this.animTimer > 150) {
                    this.animTimer = 0;
                    this.frame = (this.frame + 1) % 4;
                }

                switch (this.state) {
                    case 'sleep':
                        if (this.stateTimer > 10000 + Math.random() * 5000) {
                            this.state = 'idle';
                            this.stateTimer = 0;
                        }
                        break;
                    case 'idle':
                        if (this.stateTimer > 3000 + Math.random() * 3000) {
                            if (Math.random() < 0.6) {
                                this.startWandering();
                            } else {
                                this.state = 'sleep';
                                this.stateTimer = 0;
                            }
                        }
                        break;
                    case 'wander':
                        const dx = this.targetX - this.x;
                        const dy = this.targetY - this.y;
                        const dist = Math.hypot(dx, dy);
                        if (dist < 0.1) {
                            this.state = 'idle';
                            this.stateTimer = 0;
                        } else {
                            this.x += (dx / dist) * 0.02;
                            this.y += (dy / dist) * 0.02;
                            this.direction = dx > 0 ? DIRECTIONS.RIGHT : dx < 0 ? DIRECTIONS.LEFT : dy > 0 ? DIRECTIONS.DOWN : DIRECTIONS.UP;
                        }
                        break;
                    case 'play':
                        if (this.stateTimer > 5000) {
                            this.state = 'idle';
                            this.stateTimer = 0;
                        }
                        break;
                }
            }

            startWandering() {
                this.targetX = -10 + Math.random() * 5;
                this.targetY = 2 + Math.random() * 5;
                this.state = 'wander';
            }

            interact() {
                this.state = 'play';
                this.stateTimer = 0;
                this.happiness = Math.min(100, this.happiness + 10);
                addToChat('Byte', 'Woof! 🐶 *tail wagging*', '#D2691E');
            }

            render(ctx, math, cam) {
                const pos = math.toScreen(this.x, this.y, 0);
                const px = (pos.x - cam.x) * cam.zoom;
                const py = (pos.y - cam.y) * cam.zoom;
                const size = 50 * cam.zoom;

                // Bed
                if (this.state === 'sleep' || Math.hypot(this.x - this.bedX, this.y - this.bedY) < 1) {
                    ctx.fillStyle = '#4a3728';
                    ctx.fillRect(px - size * 0.6, py - size * 0.3, size * 1.2, size * 0.6);
                    ctx.fillStyle = '#6b4423';
                    ctx.fillRect(px - size * 0.5, py - size * 0.2, size, size * 0.4);
                }

                // Byte sprite (using simple shapes for now - can be upgraded to sprite sheet)
                ctx.fillStyle = '#D2691E';
                ctx.beginPath();
                ctx.arc(px, py - size * 0.3, size * 0.35, 0, Math.PI * 2);
                ctx.fill();
                
                // Ears
                ctx.fillStyle = '#8B4513';
                ctx.beginPath();
                ctx.ellipse(px - size * 0.25, py - size * 0.5, size * 0.12, size * 0.2, -0.3, 0, Math.PI * 2);
                ctx.ellipse(px + size * 0.25, py - size * 0.5, size * 0.12, size * 0.2, 0.3, 0, Math.PI * 2);
                ctx.fill();

                // Eyes
                ctx.fillStyle = this.state === 'sleep' ? '#333' : '#FFF';
                if (this.state === 'sleep') {
                    ctx.beginPath();
                    ctx.moveTo(px - size * 0.15, py - size * 0.35);
                    ctx.lineTo(px - size * 0.05, py - size * 0.32);
                    ctx.moveTo(px + size * 0.15, py - size * 0.35);
                    ctx.lineTo(px + size * 0.05, py - size * 0.32);
                    ctx.stroke();
                } else {
                    ctx.beginPath();
                    ctx.arc(px - size * 0.1, py - size * 0.35, size * 0.08, 0, Math.PI * 2);
                    ctx.arc(px + size * 0.1, py - size * 0.35, size * 0.08, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = '#000';
                    ctx.beginPath();
                    ctx.arc(px - size * 0.1, py - size * 0.35, size * 0.04, 0, Math.PI * 2);
                    ctx.arc(px + size * 0.1, py - size * 0.35, size * 0.04, 0, Math.PI * 2);
                    ctx.fill();
                }

                // Name
                ctx.fillStyle = '#00d4ff';
                ctx.fillRect(px - 25, py + size * 0.15, 50, 14);
                ctx.fillStyle = '#000';
                ctx.font = 'bold 10px monospace';
                ctx.textAlign = 'center';
                ctx.fillText('BYTE', px, py + size * 0.25);

                // Zzz if sleeping
                if (this.state === 'sleep' && Math.random() < 0.02) {
                    ctx.fillStyle = '#00d4ff';
                    ctx.font = `${12 * cam.zoom}px monospace`;
                    ctx.fillText('Z', px + size * 0.3, py - size * 0.6);
                }
            }
        }

        // ============================================
        // MAIN GAME CLASS
        // ============================================
        class Game {
            constructor() {
                this.c = document.getElementById('gameCanvas');
                this.ctx = this.c.getContext('2d');
                this.agents = new Map();
                this.agentRelationships = new Map();
                this.byte = null;
                this.cam = { x: 0, y: -30, zoom: 0.9 };
                this.viewMode = 'iso';
                this.lastTime = 0;
                this.timeOfDay = getTimeOfDay();
                
                this.iso = { 
                    toScreen: (x, y, z) => ({ 
                        x: (x - y) * 52 + this.c.width / 2, 
                        y: (x + y) * 26 - z * 26 + this.c.height / 2.3 
                    }) 
                };
                this.td = { 
                    toScreen: (x, y, z) => ({ 
                        x: x * 72 + this.c.width / 2, 
                        y: y * 72 + this.c.height / 2 - z * 32 
                    }) 
                };
                
                this.setupInput();
                this.resize();
                window.addEventListener('resize', () => this.resize());
                
                setInterval(() => { this.timeOfDay = updateTimeDisplay(); }, 60000);
            }

            resize() { 
                this.c.width = window.innerWidth; 
                this.c.height = window.innerHeight - 60; 
            }

            gm() { return this.viewMode === 'iso' ? this.iso : this.td; }

            setupInput() {
                let dragging = false, lx, ly;
                
                this.c.addEventListener('mousedown', e => {
                    const r = this.c.getBoundingClientRect();
                    const mx = e.clientX - r.left;
                    const my = e.clientY - r.top;
                    
                    // Check Byte click
                    if (this.byte) {
                        const pos = this.gm().toScreen(this.byte.x, this.byte.y, 0);
                        const bx = (pos.x - this.cam.x) * this.cam.zoom;
                        const by = (pos.y - this.cam.y) * this.cam.zoom;
                        if (Math.hypot(mx - bx, my - by) < 40 * this.cam.zoom) {
                            this.byte.interact();
                            return;
                        }
                    }
                    
                    // Check agent click
                    for (const [id, agent] of this.agents) {
                        const p = this.gm().toScreen(agent.x, agent.y, 0);
                        const px = (p.x - this.cam.x) * this.cam.zoom;
                        const py = (p.y - this.cam.y) * this.cam.zoom;
                        if (Math.hypot(mx - px, my - (py - 50 * this.cam.zoom)) < 50 * this.cam.zoom) {
                            this.showAgentStats(agent);
                            return;
                        }
                    }
                    
                    dragging = true;
                    lx = e.clientX;
                    ly = e.clientY;
                    this.c.style.cursor = 'grabbing';
                });
                
                this.c.addEventListener('mousemove', e => {
                    if (!dragging) return;
                    this.cam.x -= (e.clientX - lx) / this.cam.zoom;
                    this.cam.y -= (e.clientY - ly) / this.cam.zoom;
                    lx = e.clientX;
                    ly = e.clientY;
                });
                
                this.c.addEventListener('mouseup', () => { 
                    dragging = false; 
                    this.c.style.cursor = 'grab'; 
                });
                
                this.c.addEventListener('wheel', e => { 
                    e.preventDefault(); 
                    this.cam.zoom = Math.max(0.4, Math.min(2.5, this.cam.zoom * (e.deltaY > 0 ? 0.9 : 1.1))); 
                }, { passive: false });
            }

            async init() {
                const loadingText = document.getElementById('loadingText');
                const loadingDetail = document.getElementById('loadingDetail');
                const progressBar = document.getElementById('progress');
                let loaded = 0;
                
                // Calculate total items to load
                const totalAgents = AGENT_CONFIG.length;
                const total = totalAgents + 1; // +1 for Byte

                // Initialize relationships matrix
                for (const config of AGENT_CONFIG) {
                    const relationships = {};
                    for (const other of AGENT_CONFIG) {
                        if (other.id !== config.id) {
                            // Base relationship on personality compatibility
                            relationships[other.id] = 40 + Math.random() * 40;
                        }
                    }
                    this.agentRelationships.set(config.id, relationships);
                }

                // Load Meebit metadata AND sprites from official API
                for (const config of AGENT_CONFIG) {
                    loadingText.textContent = `Loading ${config.name}...`;
                    loadingDetail.textContent = `Fetching Meebit #${config.meebitId} metadata...`;
                    
                    let metadata = null;
                    let spriteData = null;
                    
                    try {
                        // Fetch full metadata
                        metadata = await Meebco.get(config.meebitId);
                        loadingDetail.textContent = `Loading sprite sheet for ${metadata.type} #${config.meebitId}...`;
                    } catch (err) {
                        console.warn(`Failed to fetch metadata for ${config.name}:`, err);
                        metadata = { 
                            id: config.meebitId, 
                            type: config.type,
                            attributes: [],
                            sprite_sheet: `${Meebco.baseUrl}/${config.meebitId}.png`
                        };
                    }
                    
                    // Load sprite sheet using metadata.sprite_sheet URL
                    const spriteUrl = metadata.sprite_sheet || `${Meebco.baseUrl}/${config.meebitId}.png`;
                    loadingDetail.textContent = `Loading sprite sheet: ${spriteUrl.slice(0, 50)}...`;
                    
                    try {
                        spriteData = await loadImage(spriteUrl);
                    } catch (err) {
                        console.warn(`Failed to load sprite from ${spriteUrl} for ${config.name}:`, err);
                        // Fallback to direct URL
                        spriteData = await loadImage(`${Meebco.baseUrl}/${config.meebitId}.png`);
                    }

                    const spriteSheet = spriteData.success ? new SpriteSheet(spriteData.img, SPRITE_CONFIG) : null;
                    
                    // Merge metadata with config
                    const enrichedConfig = {
                        ...config,
                        meebitType: metadata.type,
                        meebitAttributes: metadata.attributes || [],
                        meebitImage: metadata.image,
                        meebitVrm: metadata.vrm,
                        spriteSheetUrl: metadata.sprite_sheet,
                        externalUrl: metadata.external_url
                    };
                    
                    const agent = new SmartAgent(enrichedConfig, spriteSheet, this.agentRelationships.get(config.id));
                    agent.meebitData = metadata; // Store full metadata
                    this.agents.set(config.id, agent);
                    
                    loaded++;
                    progressBar.style.width = `${(loaded / total) * 100}%`;
                }

                // Initialize Byte
                loadingText.textContent = 'Waking up Byte...';
                loadingDetail.textContent = '';
                this.byte = new Byte({});
                loaded++;
                progressBar.style.width = '100%';
                
                setTimeout(() => {
                    document.getElementById('loading').classList.add('hidden');
                    updateTimeDisplay();
                    this.renderUI();
                    this.start();
                }, 500);
            }

            start() {
                const loop = (now) => {
                    const dt = now - this.lastTime;
                    this.lastTime = now;
                    
                    // Update all agents
                    this.agents.forEach(agent => agent.update(dt, this.agents, null));
                    if (this.byte) this.byte.update(dt);
                    
                    this.render();
                    requestAnimationFrame(loop);
                };
                requestAnimationFrame(loop);
            }

            render() {
                const ctx = this.ctx;
                const c = this.c;
                const m = this.gm();
                
                // Clear
                ctx.fillStyle = '#151520';
                ctx.fillRect(0, 0, c.width, c.height);

                // Render grid floor
                for (let x = -14; x <= 14; x++) {
                    for (let y = -14; y <= 14; y++) {
                        const p = m.toScreen(x, y, 0);
                        const cx = (p.x - this.cam.x) * this.cam.zoom;
                        const cy = (p.y - this.cam.y) * this.cam.zoom;
                        
                        const inOffice = x >= -10 && x <= 10 && y >= -10 && y <= 10;
                        const isGym = y > 6 && x >= -8 && x <= 8;
                        
                        if (isGym) ctx.fillStyle = ((x + y) % 2 === 0) ? '#2a4a3a' : '#253a2f';
                        else if (inOffice) ctx.fillStyle = ((x + y) % 2 === 0) ? '#C9A86C' : '#B8985C';
                        else ctx.fillStyle = ((x + y) % 2 === 0) ? '#252535' : '#202030';
                        
                        if (this.viewMode === 'topdown') {
                            const ts = 72 * this.cam.zoom;
                            ctx.fillRect(cx - ts/2, cy - ts/2, ts, ts);
                        } else {
                            const tw = 52 * this.cam.zoom;
                            const th = 26 * this.cam.zoom;
                            ctx.beginPath();
                            ctx.moveTo(cx, cy);
                            ctx.lineTo(cx + tw, cy + th);
                            ctx.lineTo(cx, cy + th * 2);
                            ctx.lineTo(cx - tw, cy + th);
                            ctx.closePath();
                            ctx.fill();
                        }
                    }
                }

                // Render walls
                for (let x = -10; x <= 10; x++) {
                    const p = m.toScreen(x, -11, 0);
                    const cx = (p.x - this.cam.x) * this.cam.zoom;
                    const cy = (p.y - this.cam.y) * this.cam.zoom;
                    ctx.fillStyle = (x % 2 === 0) ? '#F0E6D2' : '#E6DCC2';
                    ctx.fillRect(cx - 36 * this.cam.zoom, cy - 85 * this.cam.zoom, 72 * this.cam.zoom, 85 * this.cam.zoom);
                }

                // Render windows
                [-6, 0, 6].forEach(wx => {
                    const p = m.toScreen(wx, -11, 0);
                    const cx = (p.x - this.cam.x) * this.cam.zoom;
                    const cy = (p.y - this.cam.y) * this.cam.zoom;
                    
                    const skyColor = this.timeOfDay.name === 'DAY' ? '#87CEEB' : 
                                    this.timeOfDay.name === 'NIGHT' ? '#191970' : '#FF9966';
                    ctx.fillStyle = skyColor;
                    ctx.fillRect(cx - 32 * this.cam.zoom, cy - 70 * this.cam.zoom, 64 * this.cam.zoom, 55 * this.cam.zoom);
                    
                    ctx.strokeStyle = '#5c4033';
                    ctx.lineWidth = 4 * this.cam.zoom;
                    ctx.strokeRect(cx - 32 * this.cam.zoom, cy - 70 * this.cam.zoom, 64 * this.cam.zoom, 55 * this.cam.zoom);
                    ctx.beginPath();
                    ctx.moveTo(cx, cy - 70 * this.cam.zoom);
                    ctx.lineTo(cx, cy - 15 * this.cam.zoom);
                    ctx.moveTo(cx - 32 * this.cam.zoom, cy - 42 * this.cam.zoom);
                    ctx.lineTo(cx + 32 * this.cam.zoom, cy - 42 * this.cam.zoom);
                    ctx.stroke();
                });

                // Render entities sorted by depth
                const entities = [
                    ...Array.from(this.agents.values()).map(a => ({ type: 'agent', obj: a, y: a.y + a.x })),
                    this.byte ? { type: 'byte', obj: this.byte, y: this.byte.y + this.byte.x } : null
                ].filter(e => e).sort((a, b) => a.y - b.y);

                entities.forEach(e => {
                    if (e.type === 'agent') e.obj.render(ctx, m, this.cam, this.viewMode);
                    else if (e.type === 'byte') e.obj.render(ctx, m, this.cam);
                });

                // Time overlay
                ctx.fillStyle = this.timeOfDay.overlay;
                ctx.fillRect(0, 0, c.width, c.height);
            }

            renderUI() {
                const list = document.getElementById('agentList');
                list.innerHTML = `<div style="color:#00d4ff;font-family:'Press Start 2P';font-size:0.5rem;margin-bottom:15px;">👥 SMART AGENTS</div>` +
                    Array.from(this.agents.values()).map(a => {
                        const hasSprite = a.spriteSheet && a.spriteSheet.image;
                        const meebitType = a.config.meebitType || 'Unknown';
                        return `<div class="agent-card" onclick="findAgent('${a.config.id}')">` +
                            `<div style="width:45px;height:45px;background:${hasSprite ? '#2a2a3a' : '#1a1a1a'};border:2px solid ${a.config.color};display:flex;align-items:center;justify-content:center;font-size:1.3rem;border-radius:4px;">${a.config.emoji}</div>` +
                            `<div style="flex:1;">` +
                                `<div style="font-weight:bold;color:#fff">${a.config.name}</div>` +
                                `<div style="font-size:0.75rem;color:#888;">${a.config.role} • ${meebitType}</div>` +
                                `<div style="font-size:0.65rem;color:${a.energy > 50 ? '#0f0' : '#f00'};">⚡${Math.round(a.energy)}% | 😊${Math.round(a.happiness)}%</div>` +
                            `</div>` +
                            `<div style="font-size:0.6rem;color:#666;">${a.state}</div>` +
                        `</div>`;
                    }).join('') +
                    `<div class="agent-card" onclick="findByte()">` +
                        `<div style="width:45px;height:45px;background:#D2691E;border:2px solid #00d4ff;display:flex;align-items:center;justify-content:center;font-size:1.3rem;border-radius:4px;">🐶</div>` +
                        `<div><div style="font-weight:bold;color:#fff">Byte</div><div style="font-size:0.75rem;color:#888;">Cyber-Corgi</div></div>` +
                    `</div>`;
            }

            showAgentStats(agent) {
                const stats = document.getElementById('agentStats');
                const content = document.getElementById('statsContent');
                
                // Find best relationship
                let bestFriend = null;
                let bestRel = 0;
                for (const [id, val] of Object.entries(agent.relationships)) {
                    if (val > bestRel) {
                        bestRel = val;
                        bestFriend = id;
                    }
                }
                
                // Build Meebit traits display
                let traitsHtml = '';
                if (agent.meebitData && agent.meebitData.attributes) {
                    const traits = agent.meebitData.attributes.slice(0, 3);
                    traitsHtml = traits.map(attr => 
                        `<div style="font-size:0.65rem;color:#666;display:inline-block;margin:2px 4px 2px 0;padding:2px 6px;background:#1a1a1a;border-radius:3px;">${attr.trait_type}: <span style="color:#888;">${attr.value}</span></div>`
                    ).join('');
                }
                
                const meebitType = agent.config.meebitType || agent.meebitData?.type || 'Unknown';
                const meebitId = agent.config.meebitId;
                
                content.innerHTML = `
                    <div style="text-align:center;margin-bottom:15px;">
                        <div style="font-size:2rem;">${agent.config.emoji}</div>
                        <div style="font-size:1.2rem;color:${agent.config.color};font-weight:bold;">${agent.config.name}</div>
                        <div style="font-size:0.9rem;color:#888;">${agent.config.role}</div>
                        <div style="font-size:0.65rem;color:#666;margin-top:5px;">
                            Meebit #${meebitId} • ${meebitType}
                        </div>
                        ${traitsHtml ? `<div style="margin-top:5px;">${traitsHtml}</div>` : ''}
                    </div>
                    <div style="margin-bottom:8px;">
                        <div style="display:flex;justify-content:space-between;font-size:0.8rem;">
                            <span>⚡ Energy</span>
                            <span>${Math.round(agent.energy)}%</span>
                        </div>
                        <div class="stat-bar"><div class="stat-fill" style="width:${agent.energy}%;background:${agent.energy > 50 ? '#22c55e' : '#ff4444'};"></div></div>
                    </div>
                    <div style="margin-bottom:8px;">
                        <div style="display:flex;justify-content:space-between;font-size:0.8rem;">
                            <span>😊 Happiness</span>
                            <span>${Math.round(agent.happiness)}%</span>
                        </div>
                        <div class="stat-bar"><div class="stat-fill" style="width:${agent.happiness}%;background:#ff6b9d;"></div></div>
                    </div>
                    <div style="margin-bottom:8px;">
                        <div style="display:flex;justify-content:space-between;font-size:0.8rem;">
                            <span>📈 Productivity</span>
                            <span>${Math.round(agent.productivity)}%</span>
                        </div>
                        <div class="stat-bar"><div class="stat-fill" style="width:${agent.productivity}%;background:#00d4ff;"></div></div>
                    </div>
                    <div style="margin-bottom:8px;">
                        <div style="display:flex;justify-content:space-between;font-size:0.8rem;">
                            <span>💬 Social Battery</span>
                            <span>${Math.round(agent.socialBattery)}%</span>
                        </div>
                        <div class="stat-bar"><div class="stat-fill" style="width:${agent.socialBattery}%;background:#ffd700;"></div></div>
                    </div>
                    <div style="margin-top:15px;padding-top:10px;border-top:1px solid #333;">
                        <div style="font-size:0.75rem;color:#888;margin-bottom:5px;">Current State: <span style="color:${agent.config.color};">${agent.state.toUpperCase()}</span></div>
                        <div style="font-size:0.75rem;color:#888;margin-bottom:5px;">Mood: ${agent.memory.mood}</div>
                        ${bestFriend ? `<div style="font-size:0.75rem;color:#888;">Best Friend: ${this.agents.get(bestFriend)?.config.name} (${Math.round(bestRel)}%)</div>` : ''}
                        ${agent.config.externalUrl ? `<a href="${agent.config.externalUrl}" target="_blank" style="font-size:0.65rem;color:#00d4ff;text-decoration:none;display:block;margin-top:8px;">🔗 View on OpenSea →</a>` : ''}
                    </div>
                `;
                
                stats.classList.add('active');
                setTimeout(() => stats.classList.remove('active'), 8000);
            }
        }

        // Global game instance
        let game;

        // Control functions
        function init() { game = new Game(); game.init(); }
        function resetCam() { game.cam.x = 0; game.cam.y = -30; game.cam.zoom = 0.9; }
        function toggleList() { document.getElementById('agentList').classList.toggle('active'); }
        function toggleView() { 
            game.viewMode = game.viewMode === 'iso' ? 'topdown' : 'iso'; 
            game.cam.x = 0; 
            game.cam.y = -30; 
        }
        function toggleRelWeb() {
            const web = document.getElementById('relWeb');
            const content = document.getElementById('relContent');
            
            if (!web.classList.contains('active')) {
                // Build relationship summary
                let html = '';
                for (const [id, agent] of game.agents) {
                    const topRels = Object.entries(agent.relationships)
                        .sort((a, b) => b[1] - a[1])
                        .slice(0, 2);
                    
                    if (topRels.length > 0) {
                        html += `<div style="margin-bottom:8px;font-size:0.75rem;">`;
                        html += `<span style="color:${agent.config.color};">${agent.config.name}</span> likes: `;
                        html += topRels.map(([fid, val]) => {
                            const fname = game.agents.get(fid)?.config.name || fid;
                            return `<span style="color:${val > 70 ? '#0f0' : val > 40 ? '#ff0' : '#f00'};">${fname}</span>`;
                        }).join(', ');
                        html += `</div>`;
                    }
                }
                content.innerHTML = html || 'No relationships yet...';
            }
            
            web.classList.toggle('active');
        }
        function findByte() { 
            if (game.byte) {
                const pos = game.gm().toScreen(game.byte.x, game.byte.y, 0);
                game.cam.x = pos.x - game.c.width / 2 / game.cam.zoom;
                game.cam.y = pos.y - game.c.height / 2 / game.cam.zoom;
                game.byte.interact();
            }
        }
        function findAgent(id) {
            const agent = game.agents.get(id);
            if (agent) {
                const pos = game.gm().toScreen(agent.x, agent.y, 0);
                game.cam.x = pos.x - game.c.width / 2 / game.cam.zoom;
                game.cam.y = pos.y - game.c.height / 2 / game.cam.zoom;
                game.showAgentStats(agent);
            }
        }
        function zoomIn() { game.cam.zoom = Math.min(2.5, game.cam.zoom * 1.15); }
        function zoomOut() { game.cam.zoom = Math.max(0.4, game.cam.zoom / 1.15); }

        window.addEventListener('load', init);
    </script>
</body>
</html>
