        // ============================================
        // DAY/NIGHT CYCLE
        // ============================================
        let gameTime = 12 * 60; // Minutes since midnight (start at noon)
        const TIME_SPEED = 0.5; // Game minutes per real second
        
        function getTimeOfDay() {
            const hour = Math.floor(gameTime / 60);
            const minute = Math.floor(gameTime % 60);
            const timeString = `${hour.toString().padStart(2, '0')}:${minute.toString().padStart(2, '0')}`;
            
            if (hour >= 6 && hour < 9) return { 
                name: 'DAWN', icon: '🌅', timeString, 
                skyColor: '#FF9966', ambient: 0.4, 
                lightColor: 0xffaa66, fogColor: 0x332211 
            };
            if (hour >= 9 && hour < 17) return { 
                name: 'DAY', icon: '☀️', timeString,
                skyColor: '#87CEEB', ambient: 0.8,
                lightColor: 0xffffff, fogColor: 0x87CEEB 
            };
            if (hour >= 17 && hour < 20) return { 
                name: 'DUSK', icon: '🌇', timeString,
                skyColor: '#FF6B35', ambient: 0.5,
                lightColor: 0xff6633, fogColor: 0x442211 
            };
            return { 
                name: 'NIGHT', icon: '🌙', timeString,
                skyColor: '#191970', ambient: 0.2,
                lightColor: 0x6666ff, fogColor: 0x0a0a20 
            };
        }

        function updateTimeDisplay() {

            return time;

        // ============================================
        // VRM AGENT WITH ANIMATIONS
        // ============================================
        class VRMAgent {
            constructor(config, vrmUrl) {
                this.config = config;
                this.vrm = null;
                this.vrmUrl = vrmUrl;
                this.mixer = null;
                this.currentAction = null;
                this.position = new THREE.Vector3(
                    (Math.random() - 0.5) * 20,
                    0,
                    (Math.random() - 0.5) * 20
                );
                this.targetPosition = this.position.clone();
                this.rotation = 0;
                this.animState = ANIM_STATES.IDLE;
                this.stateTimer = 0;
                this.energy = 100;
            }

            async load(scene) {
                return new Promise((resolve, reject) => {
                    const loader = new THREE.VRMLoader();
                    loader.load(this.vrmUrl, (vrm) => {
                        this.vrm = vrm;
                        this.vrm.scene.position.copy(this.position);
                        this.vrm.scene.scale.set(1.2, 1.2, 1.2);
                        
                        // Setup animations
                        this.setupAnimations();
                        
                        scene.add(this.vrm.scene);
                        resolve();
                    }, undefined, reject);
                });
            }

            setupAnimations() {
                // Create procedural animations based on VRM bones
                if (!this.vrm) return;
                
                // Set initial pose
                this.vrm.humanoid.getNormalizedBoneNode('leftUpperArm').rotation.z = 0.3;
                this.vrm.humanoid.getNormalizedBoneNode('rightUpperArm').rotation.z = -0.3;
            }

            playAnimation(state) {
                if (this.animState === state) return;
                this.animState = state;
                
                if (!this.vrm) return;
                
                // Apply pose based on animation state
                const humanoid = this.vrm.humanoid;
                
                switch (state) {
                    case ANIM_STATES.IDLE:
                        this.setPose('idle');
                        break;
                    case ANIM_STATES.WALK:
                        this.setPose('walk');
                        break;
                    case ANIM_STATES.WORK_DESK:
                        this.setPose('typing');
                        break;
                    case ANIM_STATES.WORK_STANDING:
                        this.setPose('standing_work');
                        break;
                    case ANIM_STATES.EXERCISE_TREADMILL:
                        this.setPose('running');
                        break;
                    case ANIM_STATES.EXERCISE_WEIGHTS:
                        this.setPose('lifting');
                        break;
                    case ANIM_STATES.REST_SIT:
                        this.setPose('sitting');
                        break;
                    case ANIM_STATES.SOCIAL_TALK:
                        this.setPose('talking');
                        break;
                    case ANIM_STATES.CELEBRATE:
                        this.setPose('celebrating');
                        break;
                }
            }

            setPose(poseName) {
                if (!this.vrm) return;
                const h = this.vrm.humanoid;
                const time = Date.now() * 0.001;
                
                switch (poseName) {
                    case 'idle':
                        h.getNormalizedBoneNode('leftUpperArm').rotation.z = 0.1 + Math.sin(time) * 0.05;
                        h.getNormalizedBoneNode('rightUpperArm').rotation.z = -0.1 - Math.sin(time) * 0.05;
                        h.getNormalizedBoneNode('spine').rotation.x = 0;
                        break;
                    case 'walk':
                        const walkCycle = time * 5;
                        h.getNormalizedBoneNode('leftUpperLeg').rotation.x = Math.sin(walkCycle) * 0.5;
                        h.getNormalizedBoneNode('rightUpperLeg').rotation.x = Math.sin(walkCycle + Math.PI) * 0.5;
                        h.getNormalizedBoneNode('leftUpperArm').rotation.x = Math.sin(walkCycle + Math.PI) * 0.3;
                        h.getNormalizedBoneNode('rightUpperArm').rotation.x = Math.sin(walkCycle) * 0.3;
                        break;
                    case 'typing':
                        const typeSpeed = time * 10;
                        h.getNormalizedBoneNode('leftUpperArm').rotation.x = -0.5 + Math.sin(typeSpeed) * 0.1;
                        h.getNormalizedBoneNode('rightUpperArm').rotation.x = -0.5 + Math.sin(typeSpeed + 1) * 0.1;
                        h.getNormalizedBoneNode('spine').rotation.x = 0.2;
                        break;
                    case 'standing_work':
                        h.getNormalizedBoneNode('leftUpperArm').rotation.x = -0.8 + Math.sin(time * 2) * 0.1;
                        h.getNormalizedBoneNode('rightUpperArm').rotation.x = -0.5;
                        break;
                    case 'running':
                        const runCycle = time * 8;
                        h.getNormalizedBoneNode('leftUpperLeg').rotation.x = Math.sin(runCycle) * 0.8;
                        h.getNormalizedBoneNode('rightUpperLeg').rotation.x = Math.sin(runCycle + Math.PI) * 0.8;
                        h.getNormalizedBoneNode('leftUpperArm').rotation.x = Math.sin(runCycle + Math.PI) * 0.6;
                        h.getNormalizedBoneNode('rightUpperArm').rotation.x = Math.sin(runCycle) * 0.6;
                        h.getNormalizedBoneNode('spine').rotation.x = 0.1;
                        break;
                    case 'lifting':
                        const liftCycle = time * 2;
                        h.getNormalizedBoneNode('leftUpperArm').rotation.x = -1.5 + Math.sin(liftCycle) * 0.3;
                        h.getNormalizedBoneNode('rightUpperArm').rotation.x = -1.5 + Math.sin(liftCycle) * 0.3;
                        h.getNormalizedBoneNode('spine').rotation.x = 0.1;
                        break;
                    case 'sitting':
                        h.getNormalizedBoneNode('leftUpperLeg').rotation.x = -1.2;
                        h.getNormalizedBoneNode('rightUpperLeg').rotation.x = -1.2;
                        h.getNormalizedBoneNode('leftUpperArm').rotation.x = -0.3;
                        h.getNormalizedBoneNode('rightUpperArm').rotation.x = -0.3;
                        h.getNormalizedBoneNode('spine').rotation.x = 0.1;
                        break;
                    case 'talking':
                        h.getNormalizedBoneNode('leftUpperArm').rotation.z = 0.5 + Math.sin(time * 3) * 0.2;
                        h.getNormalizedBoneNode('rightUpperArm').rotation.z = -0.3;
                        break;
                    case 'celebrating':
                        const celebrateCycle = time * 6;
                        h.getNormalizedBoneNode('leftUpperArm').rotation.z = 2.5 + Math.sin(celebrateCycle) * 0.3;
                        h.getNormalizedBoneNode('rightUpperArm').rotation.z = -2.5 - Math.sin(celebrateCycle) * 0.3;
                        h.getNormalizedBoneNode('spine').rotation.x = -0.2;
                        break;
                }
                
                this.vrm.update(time);
            }

            update(dt, time) {
                this.stateTimer += dt;
                
                // Update animation
                this.setPose(this.getPoseFromState());
                
                // Movement
                const dist = this.position.distanceTo(this.targetPosition);
                if (dist > 0.1) {
                    const dir = new THREE.Vector3().subVectors(this.targetPosition, this.position).normalize();
                    this.position.add(dir.multiplyScalar(0.05));
                    this.vrm.scene.position.copy(this.position);
                    
                    // Face movement direction
                    this.rotation = Math.atan2(dir.x, dir.z);
                    this.vrm.scene.rotation.y = this.rotation;
                    
                    if (this.animState !== ANIM_STATES.WALK && this.animState !== ANIM_STATES.RUN) {
                        this.playAnimation(ANIM_STATES.WALK);
                    }
                } else if (this.animState === ANIM_STATES.WALK || this.animState === ANIM_STATES.RUN) {
                    this.playAnimation(ANIM_STATES.IDLE);
                }
            }

            getPoseFromState() {
                const stateMap = {
                    [ANIM_STATES.IDLE]: 'idle',
                    [ANIM_STATES.WALK]: 'walk',
                    [ANIM_STATES.RUN]: 'walk',
                    [ANIM_STATES.WORK_DESK]: 'typing',
                    [ANIM_STATES.WORK_STANDING]: 'standing_work',
                    [ANIM_STATES.EXERCISE_TREADMILL]: 'running',
                    [ANIM_STATES.EXERCISE_WEIGHTS]: 'lifting',
                    [ANIM_STATES.REST_SIT]: 'sitting',
                    [ANIM_STATES.SOCIAL_TALK]: 'talking',
                    [ANIM_STATES.CELEBRATE]: 'celebrating'
                };
                return stateMap[this.animState] || 'idle';
            }

            goTo(x, z, onArrive) {
                this.targetPosition.set(x, 0, z);
                this.onArrive = onArrive;
            }
        }

        // ============================================
        // SMART AGENT (2D SPRITE VERSION)
        // ============================================
        class SpriteAgent {
            constructor(config, assets) {
                this.config = config;
                this.assets = assets;
                this.x = (Math.random() - 0.5) * 10;
                this.y = (Math.random() - 0.5) * 10;
                this.tx = this.x;
                this.ty = this.y;
                this.state = ANIM_STATES.IDLE;
                this.animState = ANIM_STATES.IDLE;
                this.stateTimer = 0;
                this.energy = 100;
                this.happiness = 80;
                this.frame = 0;
                this.direction = 0;
                this.isMoving = false;
                this.currentFurniture = null;
                this.speech = null;
                this.speechTimer = 0;
            }

            update(dt, allAgents, furniture, timeOfDay) {
                this.stateTimer += dt;
                this.frame = (this.frame + 1) % 8;
                
                // Energy management
                if (this.animState === ANIM_STATES.WORK_DESK || 
                    this.animState === ANIM_STATES.WORK_STANDING ||
                    this.animState === ANIM_STATES.EXERCISE_TREADMILL ||
                    this.animState === ANIM_STATES.EXERCISE_WEIGHTS) {
                    this.energy -= dt * 0.008;
                } else if (this.animState === ANIM_STATES.REST_SIT || 
                           this.animState === ANIM_STATES.REST_SLEEP) {
                    this.energy = Math.min(100, this.energy + dt * 0.01);
                }
                
                // AI Behavior
                this.handleBehavior(dt, allAgents, furniture, timeOfDay);
                
                // Movement
                if (this.isMoving) {
                    const dx = this.tx - this.x;
                    const dy = this.ty - this.y;
                    const dist = Math.hypot(dx, dy);
                    
                    if (dist < 0.1) {
                        this.x = this.tx;
                        this.y = this.ty;
                        this.isMoving = false;
                        if (this.targetFurniture) {
                            this.startUsingFurniture(this.targetFurniture);
                        }
                    } else {
                        this.x += (dx / dist) * 0.03;
                        this.y += (dy / dist) * 0.03;
                        this.direction = Math.abs(dx) > Math.abs(dy) 
                            ? (dx > 0 ? 3 : 2) : (dy > 0 ? 0 : 1);
                        this.animState = ANIM_STATES.WALK;
                    }
                }
                
                if (this.speechTimer > 0) {
                    this.speechTimer -= dt;
                    if (this.speechTimer <= 0) this.speech = null;
                }
            }

            handleBehavior(dt, allAgents, furniture, timeOfDay) {
                if (this.isMoving || this.animState !== ANIM_STATES.IDLE) return;
                
                // Low energy = rest
                if (this.energy < 25 && Math.random() < 0.02) {
                    const restSpot = furniture.find(f => f.workType === 'rest' || f.workType === 'break');
                    if (restSpot) this.goToFurniture(restSpot);
                    return;
                }
                
                // Time-based behaviors
                const hour = gameTime / 60;
                
                if (hour >= 12 && hour < 13 && Math.random() < 0.01) {
                    // Lunch time - go to break area
                    const breakSpot = furniture.find(f => f.workType === 'break');
                    if (breakSpot) this.goToFurniture(breakSpot);
                    return;
                }
                
                if ((hour >= 7 && hour < 9) || (hour >= 17 && hour < 19)) {
                    // Gym time! 
                    if (Math.random() < 0.015) {
                        const gym = furniture.find(f => f.workType === 'exercise');
                        if (gym) this.goToFurniture(gym);
                        return;
                    }
                }
                
                // Work at preferred furniture
                if (Math.random() < 0.008) {
                    const pref = furniture.find(f => this.config.preferredFurniture.includes(f.id));
                    if (pref) this.goToFurniture(pref);
                    return;
                }
                
                // Socialize
                if (Math.random() < 0.005) {
                    const nearby = Array.from(allAgents.values()).filter(a => {
                        if (a === this) return false;
                        return Math.hypot(a.x - this.x, a.y - this.y) < 5;
                    });
                    if (nearby.length > 0) {
                        this.startSocializing(nearby[0]);
                    }
                }
            }

            goToFurniture(furniture) {
                this.tx = furniture.x + (Math.random() - 0.5) * 0.5;
                this.ty = furniture.y + (Math.random() - 0.5) * 0.5;
                this.targetFurniture = furniture;
                this.isMoving = true;
                this.speak(`Going to ${furniture.label}`);
            }

            startUsingFurniture(furniture) {
                this.currentFurniture = furniture;
                this.animState = furniture.animState || ANIM_STATES.WORK_DESK;
                const interaction = furniture.interactions[Math.floor(Math.random() * furniture.interactions.length)];
                this.speak(`${interaction.charAt(0).toUpperCase() + interaction.slice(1)}...`);
                
                // Stop after some time
                setTimeout(() => {
                    this.animState = ANIM_STATES.IDLE;
                    this.currentFurniture = null;
                    this.happiness += 5;
                }, 5000 + Math.random() * 5000);
            }

            startSocializing(other) {
                this.animState = ANIM_STATES.SOCIAL_TALK;
                this.speak("Hey there! 👋");
                setTimeout(() => {
                    this.animState = ANIM_STATES.IDLE;
                    this.happiness = Math.min(100, this.happiness + 10);
                }, 3000);
            }

            speak(text) {
                this.speech = text;
                this.speechTimer = 4000;
                addToChat(this.config.name, text, this.config.color);
            }

            render(ctx, math, cam, timeOfDay) {
                const pos = math.toScreen(this.x, this.y, 0);
                const px = (pos.x - cam.x) * cam.zoom;
                const py = (pos.y - cam.y) * cam.zoom;
                const size = 85 * cam.zoom;

                // Shadow
                ctx.fillStyle = 'rgba(0,0,0,0.3)';
                ctx.beginPath();
                ctx.ellipse(px, py + size * 0.4, size * 0.25, size * 0.06, 0, 0, Math.PI * 2);
                ctx.fill();

                // Render sprite with animation
                if (this.assets.sprite) {
                    const img = this.assets.sprite;
                    const frameWidth = 128;
                    const frameHeight = 128;
                    const col = this.frame % 8;
                    const row = this.direction;
                    const sx = col * frameWidth;
                    const sy = row * frameHeight;
                    ctx.drawImage(img, sx, sy, frameWidth, frameHeight,
                        px - size/2, py - size * 0.9, size, size);
                } else {
                    ctx.font = `${size * 0.7}px serif`;
                    ctx.textAlign = 'center';
                    ctx.fillText(this.config.emoji, px, py - size * 0.3);
                }

                // Animation indicator
                if (this.animState !== ANIM_STATES.IDLE && this.animState !== ANIM_STATES.WALK) {
                    ctx.fillStyle = this.config.color;
                    ctx.beginPath();
                    ctx.arc(px, py - size, 6, 0, Math.PI * 2);
                    ctx.fill();
                }

                // Name tag
                ctx.fillStyle = 'rgba(0,0,0,0.9)';
                ctx.fillRect(px - 50, py + size * 0.1, 100, 16);
                ctx.fillStyle = this.config.color;
                ctx.font = 'bold 9px monospace';
                ctx.textAlign = 'center';
                ctx.fillText(this.config.name, px, py + size * 0.16);

                // State emoji
                const stateEmojis = {
                    [ANIM_STATES.IDLE]: this.config.emoji,
                    [ANIM_STATES.WALK]: '🚶',
                    [ANIM_STATES.WORK_DESK]: '💻',
                    [ANIM_STATES.WORK_STANDING]: '🎨',
                    [ANIM_STATES.EXERCISE_TREADMILL]: '🏃',
                    [ANIM_STATES.EXERCISE_WEIGHTS]: '🏋️',
                    [ANIM_STATES.REST_SIT]: '☕',
                    [ANIM_STATES.SOCIAL_TALK]: '💬',
                    [ANIM_STATES.CELEBRATE]: '🎉'
                };
                ctx.font = `${12 * cam.zoom}px serif`;
                ctx.fillText(stateEmojis[this.animState] || this.config.emoji, px + size * 0.35, py - size * 0.6);

                // Speech
                if (this.speech) {
                    this.renderSpeech(ctx, px, py - size * 0.9, this.speech, cam.zoom);
                }
            }

            renderSpeech(ctx, x, y, text, zoom) {
                ctx.font = `bold ${9 * zoom}px monospace`;
                const width = Math.min(ctx.measureText(text).width + 12, 130 * zoom);
                ctx.fillStyle = '#fff';
                ctx.fillRect(x - width/2, y - 18, width, 18);
                ctx.strokeStyle = '#000';
                ctx.lineWidth = 1;
                ctx.strokeRect(x - width/2, y - 18, width, 18);
                ctx.fillStyle = '#000';
                ctx.textAlign = 'center';
                ctx.fillText(text, x, y - 6);
            }
        }

        // ============================================
        // MAIN GAME
        // ============================================
        class Game {
            constructor() {
                this.c = document.getElementById('gameCanvas');
                this.ctx = this.c.getContext('2d');
                this.agents = new Map();
                this.vrmAgents = new Map();
                this.cam = { x: 0, y: -100, zoom: 0.8 };
                this.viewMode = 'iso';
                this.lastTime = 0;
                
                this.iso = { 
                    toScreen: (x, y, z) => ({ 
                        x: (x - y) * 52 + this.c.width / 2, 
                        y: (x + y) * 26 - z * 26 + this.c.height / 2.3 
                    }) 
                };
                this.td = { 
                    toScreen: (x, y, z) => ({ 
                        x: x * 72 + this.c.width / 2, 
                        y: y * 72 + this.c.height / 2 - z * 32 
                    }) 
                };
                
                this.setupInput();
                this.resize();
                window.addEventListener('resize', () => this.resize());
            }
            
            resize() { 
                this.c.width = window.innerWidth; 
                this.c.height = window.innerHeight - 60;
                const vrmCanvas = document.getElementById('vrmCanvas');
                vrmCanvas.width = window.innerWidth;
                vrmCanvas.height = window.innerHeight - 60;
            }
            
            gm() { return this.viewMode === 'iso' ? this.iso : this.td; }
            
            setupInput() {
                let dragging = false, lx, ly;
                this.c.addEventListener('mousedown', e => {
                    const r = this.c.getBoundingClientRect();
                    dragging = true;
                    lx = e.clientX;
                    ly = e.clientY;
                });
                this.c.addEventListener('mousemove', e => {
                    if (!dragging) return;
                    this.cam.x -= (e.clientX - lx) / this.cam.zoom;
                    this.cam.y -= (e.clientY - ly) / this.cam.zoom;
                    lx = e.clientX;
                    ly = e.clientY;
                });
                this.c.addEventListener('mouseup', () => dragging = false);
                this.c.addEventListener('wheel', e => { 
                    e.preventDefault(); 
                    this.cam.zoom = Math.max(0.4, Math.min(2.5, this.cam.zoom * (e.deltaY > 0 ? 0.9 : 1.1))); 
                }, { passive: false });
            }
            
            async init() {
                const progress = document.getElementById('progress');
                const loadingText = document.getElementById('loadingText');
                
                // Load sprite agents
                for (let i = 0; i < AGENTS.length; i++) {
                    const config = AGENTS[i];
                    loadingText.textContent = `Loading ${config.name}...`;
                    
                    const assets = { sprite: null };
                    try {
                        const img = new Image();
                        img.src = `${ASSET_BASE}${config.id}-sprite.png`;
                        await new Promise((resolve, reject) => {
                            img.onload = resolve;
                            img.onerror = reject;
                            setTimeout(reject, 3000);
                        });
                        assets.sprite = img;
                    } catch (e) {}
                    
                    this.agents.set(config.id, new SpriteAgent(config, assets));
                    progress.style.width = `${((i + 1) / AGENTS.length) * 50}%`;
                }
                
                setTimeout(() => {
                    document.getElementById('loading').classList.add('hidden');
                    this.renderUI();
                    this.start();
                }, 500);
            }
            
            start() {
                const loop = (now) => {
                    const dt = now - this.lastTime;
                    this.lastTime = now;
                    
                    // Update time
                    gameTime += (dt / 1000) * TIME_SPEED;
                    if (gameTime >= 24 * 60) gameTime = 0;
                    const timeOfDay = updateTimeDisplay();
                    
                    // Update VRM agents
                    if (renderMode === 'vrm' || renderMode === 'hybrid') {
                        this.vrmAgents.forEach(agent => agent.update(dt, now));
                    }
                    
                    // Update sprite agents
                    if (renderMode !== 'vrm') {
                        this.agents.forEach(a => a.update(dt, this.agents, FURNITURE, timeOfDay));
                        this.render(timeOfDay);
                    }
                    
                    // Update animation indicator
                    this.updateAnimIndicator();
                    
                    requestAnimationFrame(loop);
                };
                requestAnimationFrame(loop);
            }
            
            render(timeOfDay) {
                const ctx = this.ctx;
                const c = this.c;
                const m = this.gm();
                
                // Background with time of day
                ctx.fillStyle = timeOfDay.name === 'NIGHT' ? '#0a0a15' : 
                               timeOfDay.name === 'DUSK' ? '#1a1510' : '#151520';
                ctx.fillRect(0, 0, c.width, c.height);
                
                // Floor with lighting
                for (let x = -15; x <= 15; x++) {
                    for (let y = -15; y <= 15; y++) {
                        const p = m.toScreen(x, y, 0);
                        const cx = (p.x - this.cam.x) * this.cam.zoom;
                        const cy = (p.y - this.cam.y) * this.cam.zoom;
                        const inOffice = x >= -10 && x <= 10 && y >= -10 && y <= 10;
                        
                        // Day/night affects floor color
                        let baseColor = inOffice ? '#C9A86C' : '#252535';
                        if (timeOfDay.name === 'NIGHT') {
                            baseColor = inOffice ? '#5a5040' : '#151520';
                        } else if (timeOfDay.name === 'DUSK') {
                            baseColor = inOffice ? '#8a7050' : '#1a1510';
                        }
                        
                        ctx.fillStyle = ((x + y) % 2 === 0) ? baseColor : 
                            (inOffice ? '#B8985C' : '#202030');
                        if (timeOfDay.name === 'NIGHT') {
                            ctx.fillStyle = ((x + y) % 2 === 0) ? baseColor : '#4a4030';
                        }
                        
                        const tw = 52 * this.cam.zoom;
                        const th = 26 * this.cam.zoom;
                        ctx.beginPath();
                        ctx.moveTo(cx, cy);
                        ctx.lineTo(cx + tw, cy + th);
                        ctx.lineTo(cx, cy + th * 2);
                        ctx.lineTo(cx - tw, cy + th);
                        ctx.closePath();
                        ctx.fill();
                    }
                }
                
                // Furniture with lighting
                FURNITURE.forEach(f => this.renderFurniture(ctx, m, f, timeOfDay));
                
                // Agents sorted by depth
                const entities = Array.from(this.agents.values())
                    .map(a => ({ obj: a, y: a.y + a.x }))
                    .sort((a, b) => a.y - b.y);
                
                entities.forEach(e => e.obj.render(ctx, m, this.cam, timeOfDay));
            }
            
            renderFurniture(ctx, m, f, timeOfDay) {
                const p = m.toScreen(f.x, f.y, 0);
                const px = (p.x - this.cam.x) * this.cam.zoom;
                const py = (p.y - this.cam.y) * this.cam.zoom;
                const w = f.id === 'trex' ? 60 : 25;
                const width = w * this.cam.zoom;
                
                // Furniture glow at night
                if (timeOfDay.name === 'NIGHT' && (f.blink || f.workType === 'server')) {
                    ctx.shadowColor = f.color;
                    ctx.shadowBlur = 20;
                } else {
                    ctx.shadowBlur = 0;
                }
                
                ctx.fillStyle = f.color;
                ctx.beginPath();
                ctx.ellipse(px, py, width, width * 0.6, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = '#000';
                ctx.lineWidth = 1;
                ctx.stroke();
                
                ctx.shadowBlur = 0;
                
                // Emoji
                ctx.font = `${16 * this.cam.zoom}px serif`;
                ctx.textAlign = 'center';
                ctx.fillText(f.emoji, px, py + 4);
            }
            
            renderUI() {
                const list = document.getElementById('agentList');
                list.innerHTML = `<div style="color:#00d4ff;font-family:'Press Start 2P';font-size:0.5rem;margin-bottom:15px;">👥 AGENTS</div>` +
                    Array.from(this.agents.values()).map(a => 
                        `<div class="agent-card" onclick="findAgent('${a.config.id}')">` +
                            `<div style="width:40px;height:40px;border:2px solid ${a.config.color};display:flex;align-items:center;justify-content:center;border-radius:4px;">${a.config.emoji}</div>` +
                            `<div style="flex:1;">` +
                                `<div style="font-weight:bold;">${a.config.name}</div>` +
                                `<div style="font-size:0.7rem;color:#888;">${a.config.role}</div>` +
                                `<div style="font-size:0.6rem;color:${a.energy > 50 ? '#0f0' : '#f00'};">⚡${Math.round(a.energy)}% | ${a.animState}</div>` +
                            `</div>` +
                        `</div>`
                    ).join('');
            }
            
            updateAnimIndicator() {
                const activeAnims = [];
                this.agents.forEach(a => {
                    if (a.animState !== ANIM_STATES.IDLE && a.animState !== ANIM_STATES.WALK) {
                        const animName = a.animState.replace(/_/g, ' ').toLowerCase();
                        activeAnims.push(`${a.config.name}: ${animName}`);
                    }
                });
                
                document.getElementById('animList').innerHTML = activeAnims.length > 0 
                    ? activeAnims.join('<br>')
                    : 'No active animations';
            }
        }

        // ============================================
        // CONTROLS
        // ============================================
        let renderMode = 'sprites';
        let game;
        let vrmScene = null;

        async function setMode(mode) {
            renderMode = mode;
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            
            if (mode === 'vrm') {
                document.getElementById('gameCanvas').style.display = 'none';
                document.getElementById('vrmCanvas').style.display = 'block';
                await initVRMScene();
            } else {
                document.getElementById('gameCanvas').style.display = 'block';
                document.getElementById('vrmCanvas').style.display = 'none';
            }
            addToChat('System', `Mode: ${mode.toUpperCase()}`, '#00d4ff');
        }

        async function initVRMScene() {
            if (vrmScene) return;
            
            const canvas = document.getElementById('vrmCanvas');
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a1a2e);
            scene.fog = new THREE.Fog(0x1a1a2e, 20, 100);
            
            const camera = new THREE.PerspectiveCamera(45, canvas.width / canvas.height, 0.1, 1000);
            camera.position.set(0, 15, 40);
            
            const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
            renderer.setSize(canvas.width, canvas.height);
            renderer.shadowMap.enabled = true;
            
            // Lights
            const ambient = new THREE.AmbientLight(0xffffff, 0.5);
            scene.add(ambient);
            const dir = new THREE.DirectionalLight(0xffffff, 0.8);
            dir.position.set(10, 20, 10);
            dir.castShadow = true;
            scene.add(dir);
            
            // Floor
            const floor = new THREE.Mesh(
                new THREE.PlaneGeometry(100, 100),
                new THREE.MeshStandardMaterial({ color: 0xC9A86C })
            );
            floor.rotation.x = -Math.PI / 2;
            floor.receiveShadow = true;
            scene.add(floor);
            
            vrmScene = { scene, camera, renderer, ambient, dir };
            
            // Load VRM agents
            for (const config of AGENTS.slice(0, 3)) { // Load first 3 for performance
                const vrmAgent = new VRMAgent(config, `${ASSET_BASE}${config.id}.vrm`);
                try {
                    await vrmAgent.load(scene);
                    game.vrmAgents.set(config.id, vrmAgent);
                } catch (e) {
                    console.warn(`Failed to load VRM for ${config.id}:`, e);
                }
            }
            
            animateVRM();
        }

        function animateVRM() {
            if (renderMode !== 'vrm' && renderMode !== 'hybrid') return;
            requestAnimationFrame(animateVRM);
            
            // Update lighting based on time
            const time = getTimeOfDay();
            if (vrmScene) {
                vrmScene.ambient.intensity = time.ambient;
                vrmScene.dir.color.setHex(time.lightColor);
                vrmScene.scene.fog.color.setHex(time.fogColor);
                vrmScene.scene.background.setHex(time.fogColor);
            }
            
            vrmScene.renderer.render(vrmScene.scene, vrmScene.camera);
        }

        function addToChat(name, text, color) {
            const history = document.getElementById('chatHistory');
            const msg = document.createElement('div');
            msg.style.cssText = 'margin-bottom:6px;padding:6px;background:rgba(255,255,255,0.1);border-radius:4px;';
            msg.innerHTML = `<span style="color:${color}">${name}:</span> ${text}`;
            history.insertBefore(msg, history.firstChild);
            while (history.children.length > 15) history.removeChild(history.lastChild);
        }

        function init() { game = new Game(); game.init(); }
        function resetCam() { game.cam.x = 0; game.cam.y = -100; game.cam.zoom = 0.8; }
        function toggleList() { document.getElementById('agentList').classList.toggle('active'); }
        function toggleView() { game.viewMode = game.viewMode === 'iso' ? 'topdown' : 'iso'; }
        function toggleTime() { gameTime = (gameTime + 6 * 60) % (24 * 60); }
        function findByte() { /* TODO */ }
        function findAgent(id) {
            const agent = game.agents.get(id);
            if (agent) {
                game.cam.x = game.iso.toScreen(agent.x, agent.y, 0).x - game.c.width/2/game.cam.zoom;
                game.cam.y = game.iso.toScreen(agent.x, agent.y, 0).y - game.c.height/2/game.cam.zoom;
            }
        }

        window.addEventListener('load', init);
    </script>
