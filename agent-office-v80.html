        const SPRITE_CONFIG = { frameWidth: 128, frameHeight: 128, framesPerRow: 8, rows: 4, animSpeed: 100 };
        const DIRECTIONS = { DOWN: 0, UP: 1, LEFT: 2, RIGHT: 3 };

        class SpriteSheet {
            constructor(image, config) {
                this.image = image;
                this.config = config;
            }
            draw(ctx, x, y, width, height, direction, frameNum) {
                const row = direction;
                const col = frameNum % this.config.framesPerRow;
                const sx = col * this.config.frameWidth;
                const sy = row * this.config.frameHeight;
                ctx.drawImage(this.image, sx, sy, this.config.frameWidth, this.config.frameHeight,
                    x - width / 2, y - height, width, height);
            }
        }

        // ============================================
        // KAIROSOFT STYLE GENERATIVE AGENTS
        // ============================================
        class KairosoftAgent {
            constructor(config) {
                this.config = config;
                this.bodyColor = this.generateBodyColor();
                this.hairColor = this.generateHairColor();
                this.shirtColor = config.color;
            }
            
            generateBodyColor() {
                const skins = ['#ffdbac', '#f1c27d', '#e0ac69', '#8d5524', '#c68642'];
                return skins[Math.floor(Math.random() * skins.length)];
            }
            
            generateHairColor() {
                const hairs = ['#000000', '#4a3000', '#8b4513', '#ffd700', '#ff6b9d', '#00d4ff'];
                return hairs[Math.floor(Math.random() * hairs.length)];
            }
            
            draw(ctx, x, y, size, direction, frameNum) {
                const px = x;
                const py = y;
                const s = size;
                
                // Chibi body proportions (Kairosoft style)
                // Head (big)
                ctx.fillStyle = this.bodyColor;
                ctx.beginPath();
                ctx.arc(px, py - s * 0.6, s * 0.35, 0, Math.PI * 2);
                ctx.fill();
                
                // Hair
                ctx.fillStyle = this.hairColor;
                ctx.beginPath();
                ctx.arc(px, py - s * 0.7, s * 0.3, Math.PI, 0);
                ctx.fill();
                
                // Eyes (simple dots)
                ctx.fillStyle = '#000';
                const eyeOffset = direction === DIRECTIONS.LEFT ? -0.1 : direction === DIRECTIONS.RIGHT ? 0.1 : 0;
                ctx.fillRect(px - s * 0.1 + eyeOffset * s, py - s * 0.65, s * 0.06, s * 0.08);
                ctx.fillRect(px + s * 0.05 + eyeOffset * s, py - s * 0.65, s * 0.06, s * 0.08);
                
                // Body (small)
                ctx.fillStyle = this.shirtColor;
                ctx.fillRect(px - s * 0.2, py - s * 0.35, s * 0.4, s * 0.35);
                
                // Arms (animation based on frame)
                const armSwing = Math.sin(frameNum * 0.5) * 0.1;
                ctx.fillStyle = this.shirtColor;
                ctx.fillRect(px - s * 0.3, py - s * 0.3 + armSwing * s, s * 0.08, s * 0.2);
                ctx.fillRect(px + s * 0.22, py - s * 0.3 - armSwing * s, s * 0.08, s * 0.2);
                
                // Legs
                ctx.fillStyle = '#333';
                const legSwing = Math.sin(frameNum * 0.5) * 0.15;
                ctx.fillRect(px - s * 0.15 + legSwing * s, py - s * 0.05, s * 0.1, s * 0.25);
                ctx.fillRect(px + s * 0.05 - legSwing * s, py - s * 0.05, s * 0.1, s * 0.25);
            }
        }

                this.config = config;
                this.spriteSheet = spriteSheet;
                this.kairosoft = new KairosoftAgent(config);
                this.x = (Math.random() - 0.5) * 8;
                this.y = (Math.random() - 0.5) * 8;
                this.tx = this.x;
                this.ty = this.y;
                this.direction = DIRECTIONS.DOWN;
                this.frame = 0;
                this.animTimer = 0;
                this.isMoving = false;
                this.state = 'idle';
                this.stateTimer = 0;
                this.energy = 80 + Math.random() * 20;
                this.happiness = 70 + Math.random() * 30;
                this.currentFurniture = null;
                this.speech = null;
                this.speechTimer = 0;
                this.chatCooldown = 0;
            }

            update(dt, allAgents, furniture) {
                this.animTimer += dt;
                this.stateTimer += dt;
                this.chatCooldown -= dt;
                
                if (this.animTimer > SPRITE_CONFIG.animSpeed) {
                    this.animTimer = 0;
                    this.frame = (this.frame + 1) % SPRITE_CONFIG.framesPerRow;
                }
                
                // Simple AI: Wander or interact with furniture
                if (this.state === 'idle') {
                    if (Math.random() < 0.005) {
                        this.startWalking();
                    } else if (Math.random() < 0.002 && furniture) {
                        this.interactWithFurniture(furniture);
                    }
                } else if (this.state === 'walking') {
                    this.handleWalking(dt);
                } else if (this.state === 'using_furniture') {
                    if (this.stateTimer > 5000 + Math.random() * 5000) {
                        this.state = 'idle';
                        this.currentFurniture = null;
                    }
                }
                
                if (this.speechTimer > 0) {
                    this.speechTimer -= dt;
                    if (this.speechTimer <= 0) this.speech = null;
                }
            }
            
            startWalking() {
                this.tx = (Math.random() - 0.5) * 16;
                this.ty = (Math.random() - 0.5) * 16;
                this.state = 'walking';
                this.isMoving = true;
            }
            
            handleWalking(dt) {
                const dx = this.tx - this.x;
                const dy = this.ty - this.y;
                const dist = Math.hypot(dx, dy);
                
                if (dist < 0.1) {
                    this.x = this.tx;
                    this.y = this.ty;
                    this.isMoving = false;
                    this.state = 'idle';
                    this.frame = 0;
                } else {
                    const speed = 0.025;
                    this.x += (dx / dist) * speed;
                    this.y += (dy / dist) * speed;
                    this.direction = Math.abs(dx) > Math.abs(dy) 
                        ? (dx > 0 ? DIRECTIONS.RIGHT : DIRECTIONS.LEFT)
                        : (dy > 0 ? DIRECTIONS.DOWN : DIRECTIONS.UP);
                }
            }
            
            interactWithFurniture(furniture) {
                const interactive = furniture.filter(f => f.interactive);
                if (interactive.length === 0) return;
                const target = interactive[Math.floor(Math.random() * interactive.length)];
                this.tx = target.x;
                this.ty = target.y;
                this.state = 'walking';
                this.isMoving = true;
                this.targetFurniture = target;
                
                // Will use furniture when arriving
                setTimeout(() => {
                    if (this.targetFurniture) {
                        this.currentFurniture = this.targetFurniture;
                        this.state = 'using_furniture';
                        this.stateTimer = 0;
                        this.speak(`Using ${this.currentFurniture.label}...`);
                    }
                }, 2000);
            }
            
            speak(text) {
                this.speech = text;
                this.speechTimer = 4000;
                addToChat(this.config.name, text, this.config.color);
            }

            render(ctx, math, cam) {
                const pos = math.toScreen(this.x, this.y, 0);
                const px = (pos.x - cam.x) * cam.zoom;
                const py = (pos.y - cam.y) * cam.zoom;
                const size = 80 * cam.zoom;

                // Shadow
                ctx.fillStyle = 'rgba(0,0,0,0.3)';
                ctx.beginPath();
                ctx.ellipse(px, py + size * 0.4, size * 0.25, size * 0.06, 0, 0, Math.PI * 2);
                ctx.fill();

                // Render based on mode
                if (renderMode === 'sprites' && this.spriteSheet && this.spriteSheet.image) {
                    const frameNum = this.isMoving ? this.frame : 0;
                    this.spriteSheet.draw(ctx, px, py + size * 0.3, size, size, this.direction, frameNum);
                } else if (renderMode === 'kairo') {
                    this.kairosoft.draw(ctx, px, py + size * 0.3, size, this.direction, this.frame);
                } else {
                    // VRM mode fallback or simple emoji
                    ctx.font = `${size}px serif`;
                    ctx.textAlign = 'center';
                    ctx.fillText(this.config.emoji, px, py);
                }

                // Name tag
                ctx.fillStyle = 'rgba(0,0,0,0.8)';
                ctx.fillRect(px - 50, py + size * 0.1, 100, 18);
                ctx.fillStyle = this.config.color;
                ctx.font = 'bold 10px monospace';
                ctx.textAlign = 'center';
                ctx.fillText(this.config.name, px, py + size * 0.1 + 10);

                // State indicator
                const stateEmoji = {
                    idle: this.config.emoji, walking: '🚶', 
                    using_furniture: this.currentFurniture?.emoji || '🪑'
                }[this.state] || this.config.emoji;
                ctx.font = `${14 * cam.zoom}px serif`;
                ctx.fillText(stateEmoji, px + size * 0.4, py - size * 0.5);

                // Speech bubble
                if (this.speech) {
                    this.renderSpeech(ctx, px, py - size * 0.8, this.speech, cam.zoom);
                }
            }
            
            renderSpeech(ctx, x, y, text, zoom) {
                ctx.font = `bold ${10 * zoom}px monospace`;
                const width = Math.min(ctx.measureText(text).width + 16, 140 * zoom);
                const height = 20 * zoom;
                
                ctx.fillStyle = '#fff';
                ctx.fillRect(x - width/2, y - height, width, height);
                ctx.strokeStyle = '#000';
                ctx.lineWidth = 1 * zoom;
                ctx.strokeRect(x - width/2, y - height, width, height);
                
                ctx.fillStyle = '#000';
                ctx.textAlign = 'center';
                ctx.fillText(text, x, y - height/2 + 3);
            }
        }

        // ============================================
        // BYTE THE CYBER-CORGI
        // ============================================
        class Byte {
            constructor() {
                this.x = -8;
                this.y = 4;
                this.state = 'sleep';
                this.stateTimer = 0;
                this.targetX = this.x;
                this.targetY = this.y;
                this.frame = 0;
                this.animTimer = 0;
            }
            
            update(dt) {
                this.animTimer += dt;
                if (this.animTimer > 150) {
                    this.animTimer = 0;
                    this.frame = (this.frame + 1) % 4;
                }
                
                this.stateTimer += dt;
                if (this.state === 'sleep' && this.stateTimer > 10000) {
                    this.state = 'idle';
                    this.stateTimer = 0;
                } else if (this.state === 'idle' && this.stateTimer > 3000) {
                    if (Math.random() < 0.6) {
                        this.targetX = -10 + Math.random() * 5;
                        this.targetY = 2 + Math.random() * 5;
                        this.state = 'wander';
                    } else {
                        this.state = 'sleep';
                    }
                    this.stateTimer = 0;
                } else if (this.state === 'wander') {
                    const dx = this.targetX - this.x;
                    const dy = this.targetY - this.y;
                    const dist = Math.hypot(dx, dy);
                    if (dist < 0.1) {
                        this.state = 'idle';
                    } else {
                        this.x += (dx / dist) * 0.02;
                        this.y += (dy / dist) * 0.02;
                    }
                }
            }
            
            render(ctx, math, cam) {
                const pos = math.toScreen(this.x, this.y, 0);
                const px = (pos.x - cam.x) * cam.zoom;
                const py = (pos.y - cam.y) * cam.zoom;
                const size = 40 * cam.zoom;
                
                // Dog bed
                if (this.state === 'sleep') {
                    ctx.fillStyle = '#4a3728';
                    ctx.fillRect(px - size, py - size * 0.2, size * 2, size * 0.6);
                }
                
                // Simple corgi shape
                ctx.fillStyle = '#D2691E';
                ctx.beginPath();
                ctx.arc(px, py - size * 0.3, size * 0.4, 0, Math.PI * 2);
                ctx.fill();
                
                // Sleeping or awake eyes
                if (this.state === 'sleep') {
                    ctx.strokeStyle = '#333';
                    ctx.beginPath();
                    ctx.moveTo(px - size * 0.15, py - size * 0.35);
                    ctx.lineTo(px - size * 0.05, py - size * 0.32);
                    ctx.stroke();
                } else {
                    ctx.fillStyle = '#fff';
                    ctx.beginPath();
                    ctx.arc(px - size * 0.1, py - size * 0.35, size * 0.1, 0, Math.PI * 2);
                    ctx.arc(px + size * 0.1, py - size * 0.35, size * 0.1, 0, Math.PI * 2);
                    ctx.fill();
                }
                
                // Name
                ctx.fillStyle = '#00d4ff';
                ctx.fillRect(px - 25, py + size * 0.2, 50, 14);
                ctx.fillStyle = '#000';
                ctx.font = 'bold 10px monospace';
                ctx.textAlign = 'center';
                ctx.fillText('BYTE', px, py + size * 0.3);
            }
        }

        // ============================================
        // VRM 3D SCENE
        // ============================================
        let vrmScene = null;
        function initVRMScene() {
            if (vrmScene) return;
            
            const canvas = document.getElementById('vrmCanvas');
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a1a2e);
            
            const camera = new THREE.PerspectiveCamera(45, canvas.width / canvas.height, 0.1, 1000);
            camera.position.set(0, 15, 30);
            camera.lookAt(0, 0, 0);
            
            const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
            renderer.setSize(canvas.width, canvas.height);
            
            // Lighting
            const ambient = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambient);
            const dir = new THREE.DirectionalLight(0xffffff, 0.8);
            dir.position.set(10, 20, 10);
            scene.add(dir);
            
            // Floor
            const floorGeo = new THREE.PlaneGeometry(40, 40);
            const floorMat = new THREE.MeshStandardMaterial({ color: 0xC9A86C });
            const floor = new THREE.Mesh(floorGeo, floorMat);
            floor.rotation.x = -Math.PI / 2;
            scene.add(floor);
            
            // Grid
            const grid = new THREE.GridHelper(40, 40, 0x888888, 0x888888);
            grid.position.y = 0.01;
            scene.add(grid);
            
            vrmScene = { scene, camera, renderer };
            animateVRM();
        }
        
        function animateVRM() {
            if (renderMode !== 'vrm') return;
            requestAnimationFrame(animateVRM);
            if (vrmScene) {
                vrmScene.renderer.render(vrmScene.scene, vrmScene.camera);
            }
        }

        // ============================================
        // MAIN GAME
        // ============================================
        class Game {
            constructor() {
                this.c = document.getElementById('gameCanvas');
                this.ctx = this.c.getContext('2d');
                this.agents = new Map();
                this.byte = null;
                this.cam = { x: 0, y: -30, zoom: 0.9 };
                this.viewMode = 'iso';
                this.lastTime = 0;
                this.timeOfDay = { name: 'DAY', icon: '☀️', overlay: 'rgba(0,0,0,0)' };
                
                this.iso = { 
                    toScreen: (x, y, z) => ({ 
                        x: (x - y) * 52 + this.c.width / 2, 
                        y: (x + y) * 26 - z * 26 + this.c.height / 2.3 
                    }) 
                };
                this.td = { 
                    toScreen: (x, y, z) => ({ 
                        x: x * 72 + this.c.width / 2, 
                        y: y * 72 + this.c.height / 2 - z * 32 
                    }) 
                };
                
                this.setupInput();
                this.resize();
                window.addEventListener('resize', () => this.resize());
            }
            
            resize() { 
                this.c.width = window.innerWidth; 
                this.c.height = window.innerHeight - 60;
                const vrmCanvas = document.getElementById('vrmCanvas');
                vrmCanvas.width = window.innerWidth;
                vrmCanvas.height = window.innerHeight - 60;
            }
            
            gm() { return this.viewMode === 'iso' ? this.iso : this.td; }
            
            setupInput() {
                let dragging = false, lx, ly;
                this.c.addEventListener('mousedown', e => {
                    const r = this.c.getBoundingClientRect();
                    const mx = e.clientX - r.left;
                    const my = e.clientY - r.top;
                    
                    // Check furniture click
                    for (const f of FURNITURE) {
                        const p = this.gm().toScreen(f.x, f.y, 0);
                        const fx = (p.x - this.cam.x) * this.cam.zoom;
                        const fy = (p.y - this.cam.y) * this.cam.zoom;
                        if (Math.hypot(mx - fx, my - fy) < 50 * this.cam.zoom) {
                            showFurnitureTooltip(f, e.clientX, e.clientY);
                            return;
                        }
                    }
                    
                    dragging = true;
                    lx = e.clientX;
                    ly = e.clientY;
                });
                
                this.c.addEventListener('mousemove', e => {
                    if (!dragging) return;
                    this.cam.x -= (e.clientX - lx) / this.cam.zoom;
                    this.cam.y -= (e.clientY - ly) / this.cam.zoom;
                    lx = e.clientX;
                    ly = e.clientY;
                });
                
                this.c.addEventListener('mouseup', () => dragging = false);
                
                this.c.addEventListener('wheel', e => { 
                    e.preventDefault(); 
                    this.cam.zoom = Math.max(0.4, Math.min(2.5, this.cam.zoom * (e.deltaY > 0 ? 0.9 : 1.1))); 
                }, { passive: false });
            }
            
            async init() {
                const loadingText = document.getElementById('loadingText');
                const progressBar = document.getElementById('progress');
                
                for (let i = 0; i < AGENT_CONFIG.length; i++) {
                    const config = AGENT_CONFIG[i];
                    loadingText.textContent = `Loading ${config.name}...`;
                    
                    let spriteData = null;
                    try {
                        const img = await Meebco.loadSprite(config.meebitId);
                        spriteData = { image: img };
                    } catch (e) {
                        spriteData = null;
                    }
                    
                    const spriteSheet = spriteData ? new SpriteSheet(spriteData.image, SPRITE_CONFIG) : null;
                    this.agents.set(config.id, new SmartAgent(config, spriteSheet));
                    progressBar.style.width = `${((i + 1) / AGENT_CONFIG.length) * 100}%`;
                }
                
                this.byte = new Byte();
                
                setTimeout(() => {
                    document.getElementById('loading').classList.add('hidden');
                    this.renderUI();
                    this.start();
                }, 500);
            }
            
            start() {
                const loop = (now) => {
                    const dt = now - this.lastTime;
                    this.lastTime = now;
                    
                    if (renderMode !== 'vrm') {
                        this.agents.forEach(a => a.update(dt, this.agents, FURNITURE));
                        if (this.byte) this.byte.update(dt);
                        this.render();
                    }
                    requestAnimationFrame(loop);
                };
                requestAnimationFrame(loop);
            }
            
            render() {
                if (renderMode === 'vrm') return;
                
                const ctx = this.ctx;
                const c = this.c;
                const m = this.gm();
                
                // Clear
                ctx.fillStyle = renderMode === 'kairo' ? '#e8d5b5' : '#151520';
                ctx.fillRect(0, 0, c.width, c.height);
                
                // Grid floor
                this.renderFloor(ctx, m);
                
                // Furniture (sorted by depth)
                const sortedFurniture = [...FURNITURE].sort((a, b) => (a.y + a.x) - (b.y + b.x));
                for (const f of sortedFurniture) {
                    this.renderFurniture(ctx, m, f);
                }
                
                // Agents sorted by depth
                const entities = [
                    ...Array.from(this.agents.values()).map(a => ({ type: 'agent', obj: a, y: a.y + a.x })),
                    this.byte ? { type: 'byte', obj: this.byte, y: this.byte.y + this.byte.x } : null
                ].filter(e => e).sort((a, b) => a.y - b.y);
                
                for (const e of entities) {
                    if (e.type === 'agent') e.obj.render(ctx, m, this.cam);
                    else if (e.type === 'byte') e.obj.render(ctx, m, this.cam);
                }
            }
            
            renderFloor(ctx, m) {
                for (let x = -14; x <= 14; x++) {
                    for (let y = -14; y <= 14; y++) {
                        const p = m.toScreen(x, y, 0);
                        const cx = (p.x - this.cam.x) * this.cam.zoom;
                        const cy = (p.y - this.cam.y) * this.cam.zoom;
                        
                        const inOffice = x >= -10 && x <= 10 && y >= -10 && y <= 10;
                        const isGym = y > 6 && x >= -8 && x <= 8;
                        
                        if (renderMode === 'kairo') {
                            ctx.fillStyle = isGym ? '#90EE90' : inOffice ? '#F5DEB3' : '#D2B48C';
                            const ts = 72 * this.cam.zoom;
                            ctx.fillRect(cx - ts/2, cy - ts/2, ts, ts);
                            ctx.strokeStyle = '#C19A6B';
                            ctx.lineWidth = 0.5;
                            ctx.strokeRect(cx - ts/2, cy - ts/2, ts, ts);
                        } else {
                            if (isGym) ctx.fillStyle = ((x + y) % 2 === 0) ? '#2a4a3a' : '#253a2f';
                            else if (inOffice) ctx.fillStyle = ((x + y) % 2 === 0) ? '#C9A86C' : '#B8985C';
                            else ctx.fillStyle = ((x + y) % 2 === 0) ? '#252535' : '#202030';
                            
                            const tw = 52 * this.cam.zoom;
                            const th = 26 * this.cam.zoom;
                            ctx.beginPath();
                            ctx.moveTo(cx, cy);
                            ctx.lineTo(cx + tw, cy + th);
                            ctx.lineTo(cx, cy + th * 2);
                            ctx.lineTo(cx - tw, cy + th);
                            ctx.closePath();
                            ctx.fill();
                        }
                    }
                }
            }
            
            renderFurniture(ctx, m, f) {
                const p = m.toScreen(f.x, f.y, 0);
                const px = (p.x - this.cam.x) * this.cam.zoom;
                const py = (p.y - this.cam.y) * this.cam.zoom;
                const w = f.w * 40 * this.cam.zoom;
                const h = f.h * 40 * this.cam.zoom;
                
                // Draw furniture
                if (renderMode === 'kairo') {
                    // Pixel art style
                    ctx.fillStyle = f.color;
                    ctx.fillRect(px - w/2, py - h/2, w, h);
                    ctx.strokeStyle = '#000';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(px - w/2, py - h/2, w, h);
                } else {
                    // Isometric style
                    ctx.fillStyle = f.color;
                    ctx.beginPath();
                    ctx.ellipse(px, py, w/2, h/2, 0, 0, Math.PI * 2);
                    ctx.fill();
                }
                
                // Emoji label
                ctx.font = `${20 * this.cam.zoom}px serif`;
                ctx.textAlign = 'center';
                ctx.fillText(f.emoji, px, py + 5);
                
                // Blinking effect for electronics
                if (f.blink && Math.random() < 0.05) {
                    ctx.fillStyle = `rgba(0, 255, 0, ${Math.random() * 0.5})`;
                    ctx.fillRect(px - w/4, py - h/4, w/2, h/2);
                }
            }
            
            renderUI() {
                const list = document.getElementById('agentList');
                list.innerHTML = `<div style="color:#00d4ff;font-family:'Press Start 2P';font-size:0.5rem;margin-bottom:15px;">👥 AGENTS</div>` +
                    Array.from(this.agents.values()).map(a => 
                        `<div class="agent-card" onclick="findAgent('${a.config.id}')">` +
                            `<div style="width:40px;height:40px;border:2px solid ${a.config.color};display:flex;align-items:center;justify-content:center;border-radius:4px;">${a.config.emoji}</div>` +
                            `<div><div style="font-weight:bold;">${a.config.name}</div><div style="font-size:0.7rem;color:#888;">${a.config.role}</div></div>` +
                        `</div>`
                    ).join('');
            }
        }

        // ============================================
        // UTILS
        // ============================================
        function addToChat(name, text, color) {
            const historyEl = document.getElementById('chatHistory');
            const msg = document.createElement('div');
            msg.className = 'chat-message';
            msg.innerHTML = `<span style="color:${color}">${name}:</span> ${text}`;
            historyEl.insertBefore(msg, historyEl.firstChild);
            while (historyEl.children.length > 15) historyEl.removeChild(historyEl.lastChild);
        }
        
        function showFurnitureTooltip(f, x, y) {
            const tip = document.getElementById('furnitureTooltip');
            tip.innerHTML = `<strong>${f.emoji} ${f.label}</strong><br><span style="color:#888;">Type: ${f.type}</span>`;
            tip.style.left = x + 10 + 'px';
            tip.style.top = y + 10 + 'px';
            tip.style.display = 'block';
            setTimeout(() => tip.style.display = 'none', 3000);
        }

        // ============================================
        // CONTROLS
        // ============================================
        let game;
        function init() { game = new Game(); game.init(); }
        function resetCam() { game.cam.x = 0; game.cam.y = -30; game.cam.zoom = 0.9; }
        function toggleList() { document.getElementById('agentList').classList.toggle('active'); }
        function toggleView() { game.viewMode = game.viewMode === 'iso' ? 'topdown' : 'iso'; }
        function findByte() { 
            game.cam.x = game.iso.toScreen(game.byte.x, game.byte.y, 0).x - game.c.width/2/game.cam.zoom;
            game.cam.y = game.iso.toScreen(game.byte.x, game.byte.y, 0).y - game.c.height/2/game.cam.zoom;
        }
        function findAgent(id) {
            const agent = game.agents.get(id);
            if (agent) {
                game.cam.x = game.iso.toScreen(agent.x, agent.y, 0).x - game.c.width/2/game.cam.zoom;
                game.cam.y = game.iso.toScreen(agent.x, agent.y, 0).y - game.c.height/2/game.cam.zoom;
            }
        }
        function zoomIn() { game.cam.zoom = Math.min(2.5, game.cam.zoom * 1.15); }
        function zoomOut() { game.cam.zoom = Math.max(0.4, game.cam.zoom / 1.15); }

        window.addEventListener('load', init);
    </script>
