<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>🏢 Agent Office v4.0 | KAIROSOFT STYLE</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0a0a0f; --accent: #00d4ff; --green: #22c55e; }
        * { margin: 0; padding: 0; box-sizing: border-box; image-rendering: pixelated; }
        body { font-family: 'VT323', monospace; background: var(--bg); color: #fff; overflow: hidden; }
        .header { background: linear-gradient(180deg, #1a0f2e, #2d1b4e); border-bottom: 4px solid var(--accent); padding: 0 1rem; height: 60px; display: flex; justify-content: space-between; align-items: center; position: fixed; top: 0; left: 0; right: 0; z-index: 1000; }
        .logo { display: flex; align-items: center; gap: 10px; }
        .logo-icon { width: 40px; height: 40px; background: var(--accent); border: 3px solid #fff; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; box-shadow: 3px 3px 0 rgba(0,0,0,0.3); }
        .logo h1 { font-family: 'Press Start 2P'; font-size: 0.55rem; color: var(--accent); text-shadow: 2px 2px 0 #000; }
        #gameCanvas { position: fixed; top: 60px; left: 0; right: 0; bottom: 0; cursor: grab; }
        #gameCanvas:active { cursor: grabbing; }
        .ui-panel { position: fixed; bottom: 20px; left: 20px; display: flex; gap: 8px; z-index: 100; }
        .btn { padding: 12px 16px; background: linear-gradient(180deg, #2d1b4e, #1a0f2e); border: 3px solid var(--accent); border-radius: 4px; font-family: 'Press Start 2P'; font-size: 0.4rem; color: #fff; cursor: pointer; box-shadow: 3px 3px 0 rgba(0,0,0,0.3); }
        .btn:hover { transform: translate(-2px, -2px); background: var(--accent); color: #000; }
        .stats { position: fixed; top: 70px; right: 20px; background: rgba(0,0,0,0.9); border: 3px solid var(--accent); border-radius: 8px; padding: 12px; font-family: 'Press Start 2P'; font-size: 0.45rem; }
        .agent-list { position: fixed; top: 60px; right: -300px; width: 280px; height: calc(100% - 60px); background: rgba(10,10,15,0.98); border-left: 3px solid var(--accent); transition: right 0.3s; z-index: 99; overflow-y: auto; padding: 15px; }
        .agent-list.active { right: 0; }
        .agent-card { display: flex; align-items: center; gap: 10px; padding: 10px; margin-bottom: 8px; background: #1a1a2e; border-radius: 6px; cursor: pointer; }
        .agent-card:hover { background: rgba(0,212,255,0.2); }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo">
            <div class="logo-icon">🏢</div>
            <h1>AGENT OFFICE v4.0</h1>
        </div>
        <div style="font-size:0.7rem;">🟢 11 AGENTS ACTIVE</div>
    </header>
    
    <canvas id="gameCanvas"></canvas>
    
    <div class="ui-panel">
        <button class="btn" onclick="resetCam()">🎯 RESET</button>
        <button class="btn" onclick="toggleList()">👥 TEAM</button>
        <button class="btn" onclick="toggleView()">🔲 ISO</button>
        <button class="btn" onclick="zoomIn()">➕ ZOOM</button>
        <button class="btn" onclick="zoomOut()">➖ ZOOM</button>
    </div>
    
    <div class="stats">
        <div>AGENTS: 11</div>
        <div>VIEW: <span id="viewLabel">ISO</span></div>
        <div>ZOOM: <span id="zoomLabel">100%</span></div>
    </div>
    
    <div class="agent-list" id="agentList"></div>

    <script>
        // Agent definitions with Kairosoft-style colors
        const AGENTS = [
            { id: 'nexus', name: 'Nexus', role: 'Director', color: '#00d4ff', hair: '#FFD700', shirt: '#1a1a2e', x: 0, y: 0 },
            { id: 'glasses', name: 'Glasses', role: 'Research', color: '#3b82f6', hair: '#4a3728', shirt: '#3b82f6', x: -3, y: -2 },
            { id: 'quill', name: 'Quill', role: 'Writer', color: '#ec4899', hair: '#8B4513', shirt: '#ec4899', x: 3, y: -2 },
            { id: 'pixel', name: 'Pixel', role: 'Artist', color: '#a855f7', hair: '#32CD32', shirt: '#a855f7', x: -5, y: 0 },
            { id: 'gary', name: 'Gary', role: 'Marketing', color: '#f59e0b', hair: '#000', shirt: '#f59e0b', x: 5, y: 0 },
            { id: 'larry', name: 'Larry', role: 'Social', color: '#06b6d4', hair: '#FFD700', shirt: '#06b6d4', x: -3, y: 2 },
            { id: 'sentry', name: 'Sentry', role: 'Engineer', color: '#ef4444', hair: '#8B0000', shirt: '#ef4444', x: 3, y: 2 },
            { id: 'audit', name: 'Audit', role: 'QA', color: '#8b5cf6', hair: '#4B0082', shirt: '#8b5cf6', x: -6, y: -4 },
            { id: 'cipher', name: 'Cipher', role: 'Security', color: '#6366f1', hair: '#000', shirt: '#6366f1', x: 6, y: -4 },
            { id: 'limitless', name: 'Limitless', role: 'Trader', color: '#22c55e', hair: '#006400', shirt: '#22c55e', x: 0, y: -5 },
            { id: 'olivia', name: 'Olivia', role: 'Sales', color: '#10b981', hair: '#8B4513', shirt: '#10b981', x: 0, y: 4 }
        ];

        // Zones for each agent
        const ZONES = {
            nexus: { minX: -1, maxX: 1, minY: -1, maxY: 1 },
            glasses: { minX: -5, maxX: -2, minY: -4, maxY: -1 },
            quill: { minX: 2, maxX: 5, minY: -4, maxY: -1 },
            pixel: { minX: -7, maxX: -4, minY: -2, maxY: 2 },
            gary: { minX: 4, maxX: 7, minY: -2, maxY: 2 },
            larry: { minX: -5, maxX: -2, minY: 1, maxY: 4 },
            sentry: { minX: 2, maxX: 5, minY: 1, maxY: 4 },
            audit: { minX: -8, maxX: -5, minY: -6, maxY: -3 },
            cipher: { minX: 5, maxX: 8, minY: -6, maxY: -3 },
            limitless: { minX: -2, maxX: 2, minY: -7, maxY: -4 },
            olivia: { minX: -2, maxX: 2, minY: 3, maxY: 6 }
        };

        // Generate Meebit-style sprite using canvas
        function generateMeebitSprite(agent, scale = 1) {
            const c = document.createElement('canvas');
            c.width = 64 * scale; c.height = 80 * scale;
            const ctx = c.getContext('2d');
            
            const s = scale;
            
            // Body (voxel style)
            ctx.fillStyle = agent.shirt;
            ctx.fillRect(16*s, 32*s, 32*s, 32*s);
            // Body shading
            ctx.fillStyle = 'rgba(0,0,0,0.2)';
            ctx.fillRect(44*s, 32*s, 4*s, 32*s);
            ctx.fillRect(16*s, 60*s, 32*s, 4*s);
            
            // Head
            ctx.fillStyle = '#fdbf60'; // skin
            ctx.fillRect(16*s, 8*s, 32*s, 28*s);
            // Head shading
            ctx.fillStyle = 'rgba(0,0,0,0.15)';
            ctx.fillRect(44*s, 8*s, 4*s, 28*s);
            ctx.fillRect(16*s, 32*s, 32*s, 4*s);
            
            // Hair
            ctx.fillStyle = agent.hair;
            ctx.fillRect(16*s, 4*s, 32*s, 12*s);
            ctx.fillRect(12*s, 8*s, 4*s, 20*s);
            ctx.fillRect(48*s, 8*s, 4*s, 20*s);
            
            // Eyes
            ctx.fillStyle = '#000';
            ctx.fillRect(22*s, 20*s, 6*s, 6*s);
            ctx.fillRect(36*s, 20*s, 6*s, 6*s);
            // Eye shine
            ctx.fillStyle = '#fff';
            ctx.fillRect(24*s, 21*s, 2*s, 2*s);
            ctx.fillRect(38*s, 21*s, 2*s, 2*s);
            
            // Arms
            ctx.fillStyle = agent.shirt;
            ctx.fillRect(4*s, 36*s, 12*s, 24*s);
            ctx.fillRect(48*s, 36*s, 12*s, 24*s);
            // Hands
            ctx.fillStyle = '#fdbf60';
            ctx.fillRect(4*s, 56*s, 12*s, 8*s);
            ctx.fillRect(48*s, 56*s, 12*s, 8*s);
            
            // Legs
            ctx.fillStyle = '#333'; // pants
            ctx.fillRect(20*s, 64*s, 10*s, 16*s);
            ctx.fillRect(34*s, 64*s, 10*s, 16*s);
            
            // Shoes
            ctx.fillStyle = '#000';
            ctx.fillRect(18*s, 76*s, 14*s, 4*s);
            ctx.fillRect(32*s, 76*s, 14*s, 4*s);
            
            return c;
        }

        // Agent class
        class Agent {
            constructor(data) {
                Object.assign(this, data);
                this.tx = data.x; this.ty = data.y;
                this.activity = 'idle';
                this.idleTimer = 0;
                this.speech = null;
                this.speechTimer = 0;
                this.dir = 'down';
                this.frame = 0;
                this.animTimer = 0;
                this.sprite = generateMeebitSprite(this, 2);
            }
            
            update(dt, all) {
                this.animTimer += dt;
                if (this.animTimer > 200) { this.animTimer = 0; this.frame = (this.frame + 1) % 4; }
                
                if (this.activity === 'idle') {
                    this.idleTimer += dt;
                    if (this.idleTimer > 2000 + Math.random() * 4000) this.startWalk();
                } else if (this.activity === 'walking') {
                    const dx = this.tx - this.x, dy = this.ty - this.y, dist = Math.hypot(dx, dy);
                    if (dist < 0.1) { this.x = this.tx; this.y = this.ty; this.activity = 'idle'; this.idleTimer = 0; }
                    else { const s = 2 * dt * 0.001; this.x += (dx / dist) * s; this.y += (dy / dist) * s; }
                }
                
                if (this.speech) { this.speechTimer -= dt; if (this.speechTimer <= 0) this.speech = null; }
                
                if (this.activity === 'idle' && Math.random() < 0.003) {
                    const nearby = all.filter(a => a.id !== this.id && a.activity === 'idle' && Math.hypot(a.x - this.x, a.y - this.y) < 2);
                    if (nearby.length) {
                        const p = nearby[0];
                        this.activity = 'talking'; p.activity = 'talking';
                        const chats = ['Hey!', 'How\'s it?', 'Almost done!', 'Nice!', 'Coffee?', 'Deploy?'];
                        this.speech = chats[Math.floor(Math.random() * chats.length)]; this.speechTimer = 3000;
                        p.speech = chats[Math.floor(Math.random() * chats.length)]; p.speechTimer = 3000;
                        setTimeout(() => { this.activity = 'idle'; p.activity = 'idle'; }, 3000);
                    }
                }
            }
            
            startWalk() {
                const z = ZONES[this.id];
                this.tx = z.minX + Math.random() * (z.maxX - z.minX);
                this.ty = z.minY + Math.random() * (z.maxY - z.minY);
                this.activity = 'walking';
                const dx = this.tx - this.x, dy = this.ty - this.y;
                this.dir = Math.abs(dx) > Math.abs(dy) ? (dx > 0 ? 'right' : 'left') : (dy > 0 ? 'down' : 'up');
            }
            
            render(ctx, math, cam, vm) {
                const pos = math.toScreen(this.x, this.y, 0);
                const px = (pos.x - cam.x) * cam.zoom, py = (pos.y - cam.y) * cam.zoom;
                const s = 64 * cam.zoom;
                
                // Shadow
                ctx.fillStyle = 'rgba(0,0,0,0.3)';
                ctx.beginPath();
                ctx.ellipse(px, py + s * 0.45, s * 0.4, s * 0.12, 0, 0, Math.PI * 2);
                ctx.fill();
                
                // Bob when walking
                let bob = 0;
                if (this.activity === 'walking') bob = Math.sin(this.frame * Math.PI / 2) * 4 * cam.zoom;
                
                // Draw sprite
                ctx.drawImage(this.sprite, px - s/2, py - s + bob, s, s * 1.25);
                
                // Name
                ctx.fillStyle = 'rgba(0,0,0,0.7)';
                ctx.fillRect(px - 40, py + s * 0.5, 80, 18);
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 11px monospace';
                ctx.textAlign = 'center';
                ctx.fillText(this.name, px, py + s * 0.5 + 13);
                
                // Speech
                if (this.speech) {
                    const bx = px, by = py - s * 0.8;
                    ctx.fillStyle = '#fff';
                    ctx.beginPath(); ctx.roundRect(bx - 50, by - 15, 100, 26, 10); ctx.fill();
                    ctx.strokeStyle = '#000'; ctx.lineWidth = 2; ctx.stroke();
                    ctx.fillStyle = '#000'; ctx.font = 'bold 11px monospace';
                    ctx.fillText(this.speech, bx, by + 4);
                    // Tail
                    ctx.beginPath(); ctx.moveTo(bx - 5, by + 11); ctx.lineTo(bx + 5, by + 11); ctx.lineTo(bx, by + 18); ctx.fill();
                }
            }
        }

        // Game class
        class Game {
            constructor() {
                this.c = document.getElementById('gameCanvas');
                this.ctx = this.c.getContext('2d');
                this.agents = new Map();
                this.cam = { x: 0, y: 0, zoom: 1.0 };
                this.viewMode = 'iso';
                this.lastTime = 0;
                this.blink = false;
                
                this.iso = { toScreen: (x,y,z) => ({ x: (x-y)*50 + this.c.width/2, y: (x+y)*25 - z*25 + this.c.height/2.5 }) };
                this.td = { toScreen: (x,y,z) => ({ x: x*70 + this.c.width/2, y: y*70 + this.c.height/2 - z*30 }) };
                
                this.setupInput();
                this.resize();
                window.addEventListener('resize', () => this.resize());
                
                // Create agents
                AGENTS.forEach(d => this.agents.set(d.id, new Agent(d)));
                this.renderUI();
            }
            
            resize() { this.c.width = window.innerWidth; this.c.height = window.innerHeight - 60; }
            
            setupInput() {
                let d = false, lx, ly;
                this.c.addEventListener('mousedown', e => {
                    const r = this.c.getBoundingClientRect();
                    const mx = e.clientX - r.left, my = e.clientY - r.top;
                    let cl = null;
                    for (const a of this.agents.values()) {
                        const p = this.gm().toScreen(a.x, a.y, 0);
                        const px = (p.x - this.cam.x) * this.cam.zoom, py = (p.y - this.cam.y) * this.cam.zoom;
                        if (Math.hypot(mx - px, my - (py - 30*this.cam.zoom)) < 40*this.cam.zoom) { cl = a; break; }
                    }
                    if (cl) focusAgent(cl.id);
                    else { d = true; lx = e.clientX; ly = e.clientY; this.c.style.cursor = 'grabbing'; }
                });
                this.c.addEventListener('mousemove', e => {
                    if (!d) return;
                    this.cam.x -= (e.clientX - lx) / this.cam.zoom;
                    this.cam.y -= (e.clientY - ly) / this.cam.zoom;
                    lx = e.clientX; ly = e.clientY;
                });
                this.c.addEventListener('mouseup', () => { d = false; this.c.style.cursor = 'grab'; });
                this.c.addEventListener('wheel', e => { e.preventDefault(); this.cam.zoom = Math.max(0.4, Math.min(2.5, this.cam.zoom * (e.deltaY > 0 ? 0.9 : 1.1))); document.getElementById('zoomLabel').textContent = Math.round(this.cam.zoom * 100) + '%'; }, { passive: false });
            }
            
            gm() { return this.viewMode === 'iso' ? this.iso : this.td; }
            
            start() {
                const loop = (n) => {
                    const dt = n - this.lastTime; this.lastTime = n;
                    this.blink = Math.sin(n / 150) > 0;
                    this.agents.forEach(a => a.update(dt, Array.from(this.agents.values())));
                    this.render();
                    requestAnimationFrame(loop);
                };
                requestAnimationFrame(loop);
            }
            
            render() {
                const ctx = this.ctx, c = this.c, m = this.gm();
                ctx.fillStyle = '#0a0a0f'; ctx.fillRect(0, 0, c.width, c.height);
                
                // Floor
                for (let x = -10; x <= 10; x++) {
                    for (let y = -10; y <= 10; y++) {
                        const p = m.toScreen(x, y, 0), cx = (p.x - this.cam.x) * this.cam.zoom, cy = (p.y - this.cam.y) * this.cam.zoom;
                        const inZone = Object.values(ZONES).some(z => x >= z.minX && x <= z.maxX && y >= z.minY && y <= z.maxY);
                        ctx.fillStyle = inZone ? ((x+y)%2 ? '#C4A77D' : '#D4B88D') : '#1a1a2e';
                        if (this.viewMode === 'topdown') { const ts = 70 * this.cam.zoom; ctx.fillRect(cx - ts/2, cy - ts/2, ts, ts); ctx.strokeStyle = '#000'; ctx.lineWidth = 0.5; ctx.strokeRect(cx - ts/2, cy - ts/2, ts, ts); }
                        else { const tw = 50 * this.cam.zoom, th = 25 * this.cam.zoom; ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(cx + tw, cy + th); ctx.lineTo(cx, cy + th*2); ctx.lineTo(cx - tw, cy + th); ctx.closePath(); ctx.fill(); }
                    }
                }
                
                // Walls
                for (let x = -8; x <= 8; x++) { const p = m.toScreen(x, -9, 0), cx = (p.x - this.cam.x) * this.cam.zoom, cy = (p.y - this.cam.y) * this.cam.zoom; ctx.fillStyle = (x%2) ? '#e6d7b8' : '#d7c8a8'; ctx.fillRect(cx - 35 * this.cam.zoom, cy - 80 * this.cam.zoom, 70 * this.cam.zoom, 80 * this.cam.zoom); }
                
                // Windows
                [-5, -1, 3, 7].forEach(wx => { const p = m.toScreen(wx, -9, 0), cx = (p.x - this.cam.x) * this.cam.zoom, cy = (p.y - this.cam.y) * this.cam.zoom; ctx.fillStyle = '#87CEEB'; ctx.fillRect(cx - 28 * this.cam.zoom, cy - 65 * this.cam.zoom, 56 * this.cam.zoom, 50 * this.cam.zoom); ctx.strokeStyle = '#5c4033'; ctx.lineWidth = 3 * this.cam.zoom; ctx.strokeRect(cx - 28 * this.cam.zoom, cy - 65 * this.cam.zoom, 56 * this.cam.zoom, 50 * this.cam.zoom); ctx.beginPath(); ctx.moveTo(cx, cy - 65 * this.cam.zoom); ctx.lineTo(cx, cy - 15 * this.cam.zoom); ctx.moveTo(cx - 28 * this.cam.zoom, cy - 40 * this.cam.zoom); ctx.lineTo(cx + 28 * this.cam.zoom, cy - 40 * this.cam.zoom); ctx.stroke(); });
                
                // Furniture
                const mt = m.toScreen(0, 0, 0); ctx.fillStyle = '#8B4513'; ctx.beginPath(); ctx.ellipse((mt.x - this.cam.x) * this.cam.zoom, (mt.y - this.cam.y) * this.cam.zoom, 80 * this.cam.zoom, 40 * this.cam.zoom, 0, 0, Math.PI * 2); ctx.fill(); ctx.strokeStyle = '#5D4037'; ctx.lineWidth = 3; ctx.stroke();
                const pt = m.toScreen(7, -3, 0); ctx.fillStyle = '#228B22'; ctx.fillRect((pt.x - this.cam.x) * this.cam.zoom - 70 * this.cam.zoom, (pt.y - this.cam.y) * this.cam.zoom - 35 * this.cam.zoom, 140 * this.cam.zoom, 70 * this.cam.zoom); ctx.strokeStyle = '#8B4513'; ctx.lineWidth = 8 * this.cam.zoom; ctx.strokeRect((pt.x - this.cam.x) * this.cam.zoom - 70 * this.cam.zoom, (pt.y - this.cam.y) * this.cam.zoom - 35 * this.cam.zoom, 140 * this.cam.zoom, 70 * this.cam.zoom);
                const sr = m.toScreen(7, 4, 0); ctx.fillStyle = '#1a1a2e'; ctx.fillRect((sr.x - this.cam.x) * this.cam.zoom - 60 * this.cam.zoom, (sr.y - this.cam.y) * this.cam.zoom - 50 * this.cam.zoom, 120 * this.cam.zoom, 100 * this.cam.zoom); for (let r = 0; r < 2; r++) { ctx.fillStyle = '#333'; ctx.fillRect((sr.x - this.cam.x) * this.cam.zoom - 55 * this.cam.zoom + r * 60 * this.cam.zoom, (sr.y - this.cam.y) * this.cam.zoom - 45 * this.cam.zoom, 50 * this.cam.zoom, 90 * this.cam.zoom); for (let i = 0; i < 6; i++) { ctx.fillStyle = this.blink ? '#0f0' : '#0a0'; ctx.fillRect((sr.x - this.cam.x) * this.cam.zoom - 50 * this.cam.zoom + r * 60 * this.cam.zoom, (sr.y - this.cam.y) * this.cam.zoom - 40 * this.cam.zoom + i * 14 * this.cam.zoom, 12 * this.cam.zoom, 8 * this.cam.zoom); } } ctx.fillStyle = '#0f0'; ctx.font = `${10 * this.cam.zoom}px monospace`; ctx.textAlign = 'center'; ctx.fillText('MEMORY', (sr.x - this.cam.x) * this.cam.zoom, (sr.y - this.cam.y) * this.cam.zoom - 55 * this.cam.zoom);
                
                // Agents (sorted by Y)
                Array.from(this.agents.values()).sort((a, b) => (a.y + a.x) - (b.y + b.x)).forEach(a => a.render(ctx, m, this.cam, this.viewMode));
            }
            
            renderUI() {
                const list = document.getElementById('agentList');
                list.innerHTML = AGENTS.map(a => `
                    <div class="agent-card" onclick="focusAgent('${a.id}')">
                        <div style="width:40px;height:50px;background:${a.shirt};border:2px solid ${a.color};display:flex;align-items:center;justify-content:center;font-size:1.2rem;border-radius:4px;">${a.role === 'Director' ? '👑' : a.role === 'Research' ? '🔍' : a.role === 'Writer' ? '✍️' : a.role === 'Artist' ? '🎨' : a.role === 'Marketing' ? '📢' : a.role === 'Social' ? '🐦' : a.role === 'Engineer' ? '🔧' : a.role === 'QA' ? '✅' : a.role === 'Security' ? '🔒' : a.role === 'Trader' ? '🤖' : '💼'}</div>
                        <div>
                            <div style="font-weight:bold;">${a.name}</div>
                            <div style="font-size:0.8rem;color:#888;">${a.role}</div>
                        </div>
                    </div>
                `).join('');
            }
        }

        let game;
        function init() { game = new Game(); game.start(); }
        function resetCam() { game.cam.x = 0; game.cam.y = 0; game.cam.zoom = 1.0; document.getElementById('zoomLabel').textContent = '100%'; }
        function toggleList() { document.getElementById('agentList').classList.toggle('active'); }
        function toggleView() { game.viewMode = game.viewMode === 'iso' ? 'topdown' : 'iso'; game.cam.x = 0; game.cam.y = 0; document.getElementById('viewLabel').textContent = game.viewMode === 'iso' ? 'ISO' : 'TOP'; }
        function zoomIn() { game.cam.zoom = Math.min(2.5, game.cam.zoom * 1.2); document.getElementById('zoomLabel').textContent = Math.round(game.cam.zoom * 100) + '%'; }
        function zoomOut() { game.cam.zoom = Math.max(0.4, game.cam.zoom / 1.2); document.getElementById('zoomLabel').textContent = Math.round(game.cam.zoom * 100) + '%'; }
        function focusAgent(id) { const a = game.agents.get(id); if (!a) return; game.cam.x = game.viewMode === 'topdown' ? a.x * 70 : (a.x - a.y) * 50; game.cam.y = game.viewMode === 'topdown' ? a.y * 70 : (a.x + a.y) * 25 - 80; game.cam.zoom = 2.0; }
        
        window.addEventListener('load', init);
    </script>
</body>
</html>
