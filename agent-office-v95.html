<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏢 Agent Office v9.5 | Split Sprites + Real Furniture + Fallback System</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #00d4ff; --green: #22c55e; --pink: #ff6b9d; --gold: #ffd700; }
        * { margin: 0; padding: 0; box-sizing: border-box; image-rendering: pixelated; }
        body { font-family: 'VT323', monospace; background: #0a0a15; color: #fff; overflow: hidden; }
        .header { background: linear-gradient(180deg, #2d1b4e, #1a0f2e); border-bottom: 4px solid var(--accent); padding: 0 1rem; height: 60px; display: flex; justify-content: space-between; align-items: center; position: fixed; top: 0; left: 0; right: 0; z-index: 1000; }
        #gameCanvas { position: fixed; top: 60px; left: 0; right: 0; bottom: 0; cursor: grab; background: #0a0a15; }
        .controls { position: fixed; bottom: 20px; left: 20px; display: flex; gap: 8px; z-index: 100; flex-wrap: wrap; }
        .btn { padding: 12px 16px; background: linear-gradient(180deg, #2d1b4e, #1a0f2e); border: 3px solid var(--accent); border-radius: 4px; font-family: 'Press Start 2P'; font-size: 0.4rem; color: #fff; cursor: pointer; transition: all 0.2s; }
        .btn:hover { background: var(--accent); color: #000; }
        .mode-selector { position: fixed; top: 70px; right: 20px; background: rgba(0,0,0,0.95); border: 2px solid var(--gold); border-radius: 8px; padding: 10px; z-index: 102; }
        .mode-btn { display: block; width: 100%; margin: 4px 0; padding: 8px 12px; font-family: 'Press Start 2P'; font-size: 0.35rem; background: #2a1a3a; border: 2px solid #555; color: #fff; cursor: pointer; }
        .mode-btn:hover, .mode-btn.active { background: var(--green); border-color: var(--green); }
        .loading { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: #0a0a15; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 2000; }
        .loading.hidden { opacity: 0; pointer-events: none; transition: opacity 0.5s; }
        .progress { width: 400px; height: 20px; background: #2a1b3d; border: 2px solid var(--accent); border-radius: 4px; overflow: hidden; }
        .progress-bar { height: 100%; background: linear-gradient(90deg, var(--accent), var(--green)); width: 0%; transition: width 0.3s; }
        .chat-overlay { position: fixed; top: 130px; left: 20px; max-width: 350px; max-height: 250px; overflow-y: auto; background: rgba(0,0,0,0.95); border: 2px solid var(--pink); border-radius: 8px; padding: 10px; z-index: 100; }
        .agent-list { position: fixed; top: 60px; right: -380px; width: 360px; height: calc(100% - 60px); background: rgba(10,10,15,0.98); border-left: 3px solid var(--accent); transition: right 0.3s; z-index: 99; overflow-y: auto; padding: 15px; }
        .agent-list.active { right: 0; }
        .agent-card { display: flex; align-items: center; gap: 10px; padding: 10px; margin-bottom: 8px; background: #1a1a2e; border-radius: 6px; cursor: pointer; transition: all 0.2s; border-left: 3px solid transparent; }
        .agent-card:hover { background: rgba(0,212,255,0.2); border-left-color: var(--accent); }
        .fallback-notice { position: fixed; top: 70px; left: 50%; transform: translateX(-50%); background: rgba(255,193,7,0.95); color: #000; padding: 10px 20px; border-radius: 8px; font-family: 'Press Start 2P'; font-size: 0.4rem; z-index: 103; display: none; }
    </style>
</head>
<body>
    <div class="loading" id="loading">
        <h2 style="color:#00d4ff;font-family:'Press Start 2P';margin-bottom:20px;text-align:center;">🏢 AGENT OFFICE v9.5<br>SPLIT SPRITES + REAL FURNITURE</h2>
        <div class="progress"><div class="progress-bar" id="progress"></div></div>
        <div id="loadingText" style="margin-top:15px;color:#888">Loading split sprites...</div>
        <div id="loadingDetail" style="margin-top:10px;color:#666;font-size:0.8rem;"></div>
    </div>

    <div class="fallback-notice" id="fallbackNotice">
        ⚠️ Using fallback assets - some features limited
    </div>

    <header class="header">
        <div style="display:flex;align-items:center;gap:10px;">
            <div style="width:40px;height:40px;background:#00d4ff;border:3px solid #fff;display:flex;align-items:center;justify-content:center;font-size:1.2rem;">🎮</div>
            <h1 style="font-family:'Press Start 2P';font-size:0.5rem;color:#00d4ff;">AGENT OFFICE v9.5</h1>
        </div>
        <div style="font-size:0.7rem;">🎭 Split Sprites + 🛋️ Real Furniture + 🎨 Fallback</div>
    </header>

    <div class="mode-selector">
        <div style="color:var(--gold);font-family:'Press Start 2P';font-size:0.4rem;margin-bottom:8px;">🎨 MODE</div>
        <button class="mode-btn active" onclick="setMode('sprites')">🎭 SPRITES</button>
        <button class="mode-btn" onclick="setMode('generative')">🎨 GENERATIVE</button>
    </div>

    <div class="chat-overlay" id="chatOverlay">
        <div style="color:#ff6b9d;font-weight:bold;margin-bottom:10px;">💬 LIVE CHAT</div>
        <div id="chatHistory"></div>
    </div>

    <canvas id="gameCanvas"></canvas>
    
    <div class="controls">
        <button class="btn" onclick="resetCam()">🎯 RESET</button>
        <button class="btn" onclick="toggleList()">👥 TEAM</button>
        <button class="btn" onclick="toggleView()">🔲 ISO</button>
        <button class="btn" onclick="zoomIn()">➕</button>
        <button class="btn" onclick="zoomOut()">➖</button>
    </div>
    
    <div class="agent-list" id="agentList"></div>

    <script>
        // ============================================
        // CONFIGURATION
        // ============================================
        const USE_SPLIT_SPRITES = true; // Use individual frame files
        const SPRITE_BASE = './assets/meebits-split/';
        const FALLBACK_BASE = './assets/meebits-downloaded/';
        
        const AGENTS = [
            { id: 'nexus', name: 'Nexus', role: 'Director', type: 'Human', color: '#00d4ff', emoji: '👑' },
            { id: 'glasses', name: 'Glasses', role: 'Research', type: 'Human', color: '#ff6b9d', emoji: '🔍' },
            { id: 'quill', name: 'Quill', role: 'Writer', type: 'Human', color: '#ffd700', emoji: '✍️' },
            { id: 'pixel', name: 'Pixel', role: 'Artist', type: 'Human', color: '#ff00ff', emoji: '🎨' },
            { id: 'gary', name: 'Gary', role: 'Marketing', type: 'Human', color: '#22c55e', emoji: '📈' },
            { id: 'larry', name: 'Larry', role: 'Social', type: 'Pig', color: '#ff8c00', emoji: '🐷' },
            { id: 'sentry', name: 'Sentry', role: 'Engineer', type: 'Robot', color: '#00ff00', emoji: '🤖' },
            { id: 'audit', name: 'Audit', role: 'QA', type: 'Skeleton', color: '#ffffff', emoji: '💀' },
            { id: 'cipher', name: 'Cipher', role: 'Security', type: 'Visitor', color: '#9400d3', emoji: '👽' },
            { id: 'limitless', name: 'Limitless', role: 'Trader', type: 'Robot', color: '#00ffff', emoji: '💹' },
            { id: 'olivia', name: 'Olivia', role: 'Sales', type: 'Human', color: '#ff1493', emoji: '💼' }
        ];

        const DIRECTIONS = ['down', 'up', 'left', 'right'];

        // Fully formed furniture with proper rendering
        const FURNITURE = [
            // DESKS
            { id: 'director_desk', type: 'desk', x: 0, y: 0, label: 'Director Desk', emoji: '🖥️', 
              render: (ctx, px, py, zoom) => drawDesk(ctx, px, py, zoom, '#8B4513', true) },
            { id: 'research_desk', type: 'desk', x: -4, y: -2, label: 'Research Station', emoji: '🔬',
              render: (ctx, px, py, zoom) => drawDesk(ctx, px, py, zoom, '#5c4033', true) },
            { id: 'writer_desk', type: 'desk', x: 3, y: -2, label: 'Writer Desk', emoji: '📝',
              render: (ctx, px, py, zoom) => drawDesk(ctx, px, py, zoom, '#5c4033', false) },
            { id: 'trading_desk', type: 'desk', x: 0, y: -5, label: 'Trading Station', emoji: '💹',
              render: (ctx, px, py, zoom) => drawDesk(ctx, px, py, zoom, '#00ffff', true) },
            
            // CHAIRS
            { id: 'director_chair', type: 'chair', x: 0, y: 0.8, label: 'Director Chair', emoji: '🪑',
              render: (ctx, px, py, zoom) => drawChair(ctx, px, py, zoom, '#4a3728') },
            
            // GYM
            { id: 'treadmill', type: 'gym', x: -6, y: 7, label: 'Treadmill', emoji: '🏃',
              render: (ctx, px, py, zoom) => drawTreadmill(ctx, px, py, zoom) },
            { id: 'weights', type: 'gym', x: -3, y: 8, label: 'Weight Rack', emoji: '🏋️',
              render: (ctx, px, py, zoom) => drawWeightRack(ctx, px, py, zoom) },
            { id: 'bench_press', type: 'gym', x: 0, y: 8, label: 'Bench Press', emoji: '🏋️',
              render: (ctx, px, py, zoom) => drawBenchPress(ctx, px, py, zoom) },
            
            // RECREATION
            { id: 'pool_table', type: 'game', x: 6, y: 7, label: 'Pool Table', emoji: '🎱',
              render: (ctx, px, py, zoom) => drawPoolTable(ctx, px, py, zoom) },
            { id: 'sofa', type: 'seat', x: -8, y: 5, label: 'Lounge Sofa', emoji: '🛋️',
              render: (ctx, px, py, zoom) => drawSofa(ctx, px, py, zoom) },
            
            // APPLIANCES
            { id: 'coffee_machine', type: 'appliance', x: -8, y: 3, label: 'Coffee Machine', emoji: '☕',
              render: (ctx, px, py, zoom) => drawAppliance(ctx, px, py, zoom, '#8B4513') },
            
            // SERVERS
            { id: 'server_rack', type: 'server', x: 3, y: 3, label: 'Server Rack', emoji: '🖥️',
              render: (ctx, px, py, zoom, time) => drawServerRack(ctx, px, py, zoom, time) },
            
            // ART
            { id: 'art_easel', type: 'art', x: -6, y: 0, label: 'Art Easel', emoji: '🎨',
              render: (ctx, px, py, zoom) => drawEasel(ctx, px, py, zoom) },
            
            // PET
            { id: 'dog_bed', type: 'pet', x: -8, y: 4, label: 'Byte Bed', emoji: '🛏️',
              render: (ctx, px, py, zoom) => drawDogBed(ctx, px, py, zoom) },
        ];

        // ============================================
        // FURNITURE DRAWING FUNCTIONS
        // ============================================
        function drawDesk(ctx, x, y, zoom, color, hasMonitor) {
            const w = 50 * zoom;
            const h = 30 * zoom;
            
            // Desk top (isometric)
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.moveTo(x - w, y - h/2);
            ctx.lineTo(x, y - h);
            ctx.lineTo(x + w, y - h/2);
            ctx.lineTo(x, y);
            ctx.closePath();
            ctx.fill();
            ctx.strokeStyle = '#000';
            ctx.lineWidth = 1;
            ctx.stroke();
            
            // Legs
            ctx.fillStyle = '#333';
            ctx.fillRect(x - w + 5, y - h/2, 8, h/2);
            ctx.fillRect(x + w - 15, y - h/2, 8, h/2);
            
            // Monitor
            if (hasMonitor) {
                ctx.fillStyle = '#111';
                ctx.fillRect(x - 15, y - h - 20, 30, 20);
                ctx.fillStyle = '#00d4ff';
                ctx.fillRect(x - 12, y - h - 17, 24, 14);
                // Stand
                ctx.fillStyle = '#333';
                ctx.fillRect(x - 3, y - h, 6, 10);
            }
        }

        function drawChair(ctx, x, y, zoom, color) {
            const size = 20 * zoom;
            
            // Seat
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.ellipse(x, y, size, size * 0.6, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();
            
            // Back
            ctx.fillStyle = color;
            ctx.fillRect(x - size * 0.5, y - size * 1.2, size, size * 0.8);
        }

        function drawTreadmill(ctx, x, y, zoom) {
            const w = 40 * zoom;
            const h = 70 * zoom;
            
            // Belt
            ctx.fillStyle = '#333';
            ctx.fillRect(x - w/2, y - h/2, w, h);
            
            // Side rails
            ctx.fillStyle = '#888';
            ctx.fillRect(x - w/2 - 5, y - h/2, 5, h);
            ctx.fillRect(x + w/2, y - h/2, 5, h);
            
            // Console
            ctx.fillStyle = '#111';
            ctx.fillRect(x - 15, y - h/2 - 25, 30, 25);
            ctx.fillStyle = '#0f0';
            ctx.font = `${8 * zoom}px monospace`;
            ctx.fillText('0.0', x - 8, y - h/2 - 10);
        }

        function drawWeightRack(ctx, x, y, zoom) {
            const w = 35 * zoom;
            const h = 50 * zoom;
            
            // Rack
            ctx.fillStyle = '#555';
            ctx.fillRect(x - w/2, y - h/2, 5, h);
            ctx.fillRect(x + w/2 - 5, y - h/2, 5, h);
            
            // Weights (circles)
            const colors = ['#f00', '#0f0', '#00f', '#ff0'];
            for (let i = 0; i < 4; i++) {
                ctx.fillStyle = colors[i];
                ctx.beginPath();
                ctx.arc(x - w/2 + 10, y - h/2 + 15 + i * 12, 6 * zoom, 0, Math.PI * 2);
                ctx.arc(x + w/2 - 10, y - h/2 + 15 + i * 12, 6 * zoom, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function drawBenchPress(ctx, x, y, zoom) {
            const w = 60 * zoom;
            
            // Bench
            ctx.fillStyle = '#654321';
            ctx.fillRect(x - w/2, y - 10, w, 15);
            
            // Bar
            ctx.fillStyle = '#silver';
            ctx.fillRect(x - w/2, y - 25, w, 5);
            
            // Weights on bar
            ctx.fillStyle = '#333';
            ctx.beginPath();
            ctx.arc(x - w/2 + 5, y - 22, 12 * zoom, 0, Math.PI * 2);
            ctx.arc(x + w/2 - 5, y - 22, 12 * zoom, 0, Math.PI * 2);
            ctx.fill();
            
            // Rack stands
            ctx.fillStyle = '#555';
            ctx.fillRect(x - w/2 + 10, y - 25, 5, 25);
            ctx.fillRect(x + w/2 - 15, y - 25, 5, 25);
        }

        function drawPoolTable(ctx, x, y, zoom) {
            const w = 80 * zoom;
            const h = 50 * zoom;
            
            // Table
            ctx.fillStyle = '#228B22';
            ctx.beginPath();
            ctx.ellipse(x, y, w/2, h/2, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = '#8B4513';
            ctx.lineWidth = 8 * zoom;
            ctx.stroke();
            
            // Pockets
            ctx.fillStyle = '#000';
            [-1, 1].forEach(dx => {
                [-1, 1].forEach(dy => {
                    ctx.beginPath();
                    ctx.arc(x + dx * w/2 * 0.8, y + dy * h/2 * 0.8, 6 * zoom, 0, Math.PI * 2);
                    ctx.fill();
                });
            });
            
            // Center pocket
            ctx.beginPath();
            ctx.arc(x, y - h/2 * 0.9, 6 * zoom, 0, Math.PI * 2);
            ctx.arc(x, y + h/2 * 0.9, 6 * zoom, 0, Math.PI * 2);
            ctx.fill();
        }

        function drawSofa(ctx, x, y, zoom) {
            const w = 70 * zoom;
            const h = 35 * zoom;
            
            // Base
            ctx.fillStyle = '#8B4513';
            ctx.fillRect(x - w/2, y, w, h);
            
            // Back
            ctx.fillStyle = '#654321';
            ctx.fillRect(x - w/2, y - 20, w, 20);
            
            // Cushions
            ctx.fillStyle = '#A0522D';
            ctx.fillRect(x - w/2 + 5, y + 5, w/2 - 10, h - 10);
            ctx.fillRect(x + 5, y + 5, w/2 - 10, h - 10);
        }

        function drawAppliance(ctx, x, y, zoom, color) {
            const w = 25 * zoom;
            const h = 35 * zoom;
            
            // Body
            ctx.fillStyle = color;
            ctx.fillRect(x - w/2, y - h, w, h);
            
            // Detail
            ctx.fillStyle = '#333';
            ctx.fillRect(x - w/2 + 5, y - h + 10, w - 10, 15);
        }

        function drawServerRack(ctx, x, y, zoom, time) {
            const w = 30 * zoom;
            const h = 80 * zoom;
            
            // Frame
            ctx.fillStyle = '#333';
            ctx.fillRect(x - w/2, y - h, w, h);
            
            // Blinking lights
            for (let i = 0; i < 5; i++) {
                const blink = Math.sin(time * 0.01 + i) > 0;
                ctx.fillStyle = blink ? '#0f0' : '#050';
                ctx.beginPath();
                ctx.arc(x - w/2 + 8, y - h + 15 + i * 15, 4 * zoom, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.fillStyle = !blink ? '#f00' : '#500';
                ctx.beginPath();
                ctx.arc(x + w/2 - 8, y - h + 15 + i * 15, 4 * zoom, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function drawEasel(ctx, x, y, zoom) {
            const h = 70 * zoom;
            
            // Legs
            ctx.strokeStyle = '#8B4513';
            ctx.lineWidth = 4 * zoom;
            ctx.beginPath();
            ctx.moveTo(x - 20, y);
            ctx.lineTo(x, y - h);
            ctx.lineTo(x + 20, y);
            ctx.moveTo(x - 15, y - 20);
            ctx.lineTo(x + 15, y - 20);
            ctx.stroke();
            
            // Canvas
            ctx.fillStyle = '#fff';
            ctx.fillRect(x - 15, y - h + 10, 30, 40);
            // Some "art"
            ctx.fillStyle = '#ff00ff';
            ctx.fillRect(x - 10, y - h + 20, 20, 5);
            ctx.fillStyle = '#00d4ff';
            ctx.fillRect(x - 10, y - h + 30, 15, 5);
        }

        function drawDogBed(ctx, x, y, zoom) {
            const w = 40 * zoom;
            const h = 30 * zoom;
            
            // Bed
            ctx.fillStyle = '#D2691E';
            ctx.beginPath();
            ctx.ellipse(x, y, w/2, h/2, 0, 0, Math.PI * 2);
            ctx.fill();
            
            // Cushion
            ctx.fillStyle = '#8B4513';
            ctx.beginPath();
            ctx.ellipse(x, y - 2, w/3, h/3, 0, 0, Math.PI * 2);
            ctx.fill();
        }

        // ============================================
        // AGENT WITH SPLIT SPRITES + FALLBACK
        // ============================================
        class Agent {
            constructor(config) {
                this.config = config;
                this.x = (Math.random() - 0.5) * 10;
                this.y = (Math.random() - 0.5) * 10;
                this.tx = this.x;
                this.ty = this.y;
                this.frame = 0;
                this.direction = 0; // 0=down, 1=up, 2=left, 3=right
                this.isMoving = false;
                this.speech = null;
                this.speechTimer = 0;
                this.energy = 100;
                
                // Sprite storage
                this.sprites = new Map(); // direction -> [frames]
                this.useFallback = false;
            }

            async loadSprites() {
                const dirNames = ['down', 'up', 'left', 'right'];
                
                // Try split sprites first
                if (USE_SPLIT_SPRITES) {
                    for (let d = 0; d < 4; d++) {
                        const frames = [];
                        for (let f = 0; f < 8; f++) {
                            const img = new Image();
                            img.src = `${SPRITE_BASE}${this.config.id}/${dirNames[d]}-${f}.png`;
                            try {
                                await new Promise((resolve, reject) => {
                                    img.onload = resolve;
                                    img.onerror = reject;
                                    setTimeout(reject, 3000);
                                });
                                frames.push(img);
                            } catch (e) {
                                break;
                            }
                        }
                        if (frames.length === 8) {
                            this.sprites.set(d, frames);
                        }
                    }
                }
                
                // If split sprites failed, try full sheet
                if (this.sprites.size === 0) {
                    console.log(`${this.config.id}: Using sprite sheet fallback`);
                    this.useFallback = true;
                    const img = new Image();
                    img.src = `${FALLBACK_BASE}${this.config.id}-sprite.png`;
                    try {
                        await new Promise((resolve, reject) => {
                            img.onload = resolve;
                            img.onerror = reject;
                            setTimeout(reject, 3000);
                        });
                        this.fallbackSprite = img;
                    } catch (e) {
                        console.warn(`${this.config.id}: No sprites available`);
                    }
                }
            }

            update(dt) {
                if (this.isMoving) {
                    this.frame = (this.frame + 1) % 8;
                    
                    const dx = this.tx - this.x;
                    const dy = this.ty - this.y;
                    const dist = Math.hypot(dx, dy);
                    
                    if (dist < 0.1) {
                        this.x = this.tx;
                        this.y = this.ty;
                        this.isMoving = false;
                        this.frame = 0;
                    } else {
                        this.x += (dx / dist) * 0.03;
                        this.y += (dy / dist) * 0.03;
                        
                        // Update direction
                        if (Math.abs(dx) > Math.abs(dy)) {
                            this.direction = dx > 0 ? 3 : 2;
                        } else {
                            this.direction = dy > 0 ? 0 : 1;
                        }
                    }
                } else {
                    this.frame = 0;
                    
                    // Random wander
                    if (Math.random() < 0.01) {
                        this.tx = (Math.random() - 0.5) * 14;
                        this.ty = (Math.random() - 0.5) * 14;
                        this.isMoving = true;
                    }
                }
                
                if (this.speechTimer > 0) {
                    this.speechTimer -= dt;
                    if (this.speechTimer <= 0) this.speech = null;
                }
            }

            render(ctx, math, cam) {
                const pos = math.toScreen(this.x, this.y, 0);
                const px = (pos.x - cam.x) * cam.zoom;
                const py = (pos.y - cam.y) * cam.zoom;
                const size = 90 * cam.zoom;

                // Shadow
                ctx.fillStyle = 'rgba(0,0,0,0.3)';
                ctx.beginPath();
                ctx.ellipse(px, py + size * 0.4, size * 0.25, size * 0.06, 0, 0, Math.PI * 2);
                ctx.fill();

                // Render sprite
                if (!this.useFallback && this.sprites.has(this.direction)) {
                    const frames = this.sprites.get(this.direction);
                    const img = frames[this.frame % frames.length];
                    ctx.drawImage(img, px - size/2, py - size * 0.9, size, size);
                } else if (this.useFallback && this.fallbackSprite) {
                    // Fallback: use sprite sheet
                    const frameWidth = 128;
                    const frameHeight = 128;
                    const col = this.frame % 8;
                    const row = this.direction;
                    ctx.drawImage(this.fallbackSprite, 
                        col * frameWidth, row * frameHeight, frameWidth, frameHeight,
                        px - size/2, py - size * 0.9, size, size);
                } else {
                    // Generative fallback
                    this.renderGenerative(ctx, px, py, size);
                }

                // Name
                ctx.fillStyle = 'rgba(0,0,0,0.9)';
                ctx.fillRect(px - 50, py + size * 0.1, 100, 18);
                ctx.fillStyle = this.config.color;
                ctx.font = 'bold 10px monospace';
                ctx.textAlign = 'center';
                ctx.fillText(this.config.name, px, py + size * 0.18);

                // Speech
                if (this.speech) {
                    ctx.fillStyle = '#fff';
                    const width = Math.min(ctx.measureText(this.speech).width + 20, 150);
                    ctx.fillRect(px - width/2, py - size - 25, width, 20);
                    ctx.strokeStyle = '#000';
                    ctx.lineWidth = 1;
                    ctx.strokeRect(px - width/2, py - size - 25, width, 20);
                    ctx.fillStyle = '#000';
                    ctx.font = '10px monospace';
                    ctx.fillText(this.speech, px, py - size - 12);
                }
            }

            renderGenerative(ctx, px, py, size) {
                // Kairosoft-style chibi
                ctx.fillStyle = '#ffdbac';
                ctx.beginPath();
                ctx.arc(px, py - size * 0.6, size * 0.3, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.fillStyle = this.config.color;
                ctx.fillRect(px - size * 0.2, py - size * 0.35, size * 0.4, size * 0.35);
                
                ctx.fillStyle = '#000';
                ctx.fillRect(px - size * 0.08, py - size * 0.65, size * 0.06, size * 0.08);
                ctx.fillRect(px + size * 0.02, py - size * 0.65, size * 0.06, size * 0.08);
            }

            speak(text) {
                this.speech = text;
                this.speechTimer = 3000;
                addToChat(this.config.name, text, this.config.color);
            }
        }

        // ============================================
        // GAME
        // ============================================
        class Game {
            constructor() {
                this.c = document.getElementById('gameCanvas');
                this.ctx = this.c.getContext('2d');
                this.agents = new Map();
                this.cam = { x: 0, y: -50, zoom: 0.7 };
                this.viewMode = 'iso';
                this.lastTime = 0;
                
                this.iso = { 
                    toScreen: (x, y, z) => ({ 
                        x: (x - y) * 52 + this.c.width / 2, 
                        y: (x + y) * 26 - z * 26 + this.c.height / 2.3 
                    }) 
                };
                this.td = { 
                    toScreen: (x, y, z) => ({ 
                        x: x * 72 + this.c.width / 2, 
                        y: y * 72 + this.c.height / 2 - z * 32 
                    }) 
                };
                
                this.setupInput();
                this.resize();
                window.addEventListener('resize', () => this.resize());
            }
            
            resize() { 
                this.c.width = window.innerWidth; 
                this.c.height = window.innerHeight - 60;
            }
            
            gm() { return this.viewMode === 'iso' ? this.iso : this.td; }
            
            setupInput() {
                let dragging = false, lx, ly;
                this.c.addEventListener('mousedown', e => {
                    dragging = true;
                    lx = e.clientX;
                    ly = e.clientY;
                });
                this.c.addEventListener('mousemove', e => {
                    if (!dragging) return;
                    this.cam.x -= (e.clientX - lx) / this.cam.zoom;
                    this.cam.y -= (e.clientY - ly) / this.cam.zoom;
                    lx = e.clientX;
                    ly = e.clientY;
                });
                this.c.addEventListener('mouseup', () => dragging = false);
                this.c.addEventListener('wheel', e => { 
                    e.preventDefault(); 
                    this.cam.zoom = Math.max(0.4, Math.min(2.5, this.cam.zoom * (e.deltaY > 0 ? 0.9 : 1.1))); 
                }, { passive: false });
            }
            
            async init() {
                const progress = document.getElementById('progress');
                const loadingText = document.getElementById('loadingText');
                let loaded = 0;
                let fallbackCount = 0;
                
                for (const config of AGENTS) {
                    loadingText.textContent = `Loading ${config.name}...`;
                    
                    const agent = new Agent(config);
                    await agent.loadSprites();
                    
                    if (agent.useFallback || agent.sprites.size === 0) {
                        fallbackCount++;
                    }
                    
                    this.agents.set(config.id, agent);
                    loaded++;
                    progress.style.width = `${(loaded / AGENTS.length) * 100}%`;
                }
                
                if (fallbackCount > 0) {
                    document.getElementById('fallbackNotice').style.display = 'block';
                    addToChat('System', `${fallbackCount} agents using fallback sprites`, '#ffc107');
                }
                
                setTimeout(() => {
                    document.getElementById('loading').classList.add('hidden');
                    this.renderUI();
                    this.start();
                }, 500);
            }
            
            start() {
                const loop = (now) => {
                    const dt = now - this.lastTime;
                    this.lastTime = now;
                    
                    this.agents.forEach(a => a.update(dt));
                    this.render(now);
                    requestAnimationFrame(loop);
                };
                requestAnimationFrame(loop);
            }
            
            render(time) {
                const ctx = this.ctx;
                const c = this.c;
                const m = this.gm();
                
                ctx.fillStyle = '#151520';
                ctx.fillRect(0, 0, c.width, c.height);
                
                // Floor
                for (let x = -15; x <= 15; x++) {
                    for (let y = -15; y <= 15; y++) {
                        const p = m.toScreen(x, y, 0);
                        const cx = (p.x - this.cam.x) * this.cam.zoom;
                        const cy = (p.y - this.cam.y) * this.cam.zoom;
                        const inOffice = x >= -10 && x <= 10 && y >= -10 && y <= 10;
                        
                        ctx.fillStyle = ((x + y) % 2 === 0) 
                            ? (inOffice ? '#C9A86C' : '#252535')
                            : (inOffice ? '#B8985C' : '#202030');
                        
                        const tw = 52 * this.cam.zoom;
                        const th = 26 * this.cam.zoom;
                        ctx.beginPath();
                        ctx.moveTo(cx, cy);
                        ctx.lineTo(cx + tw, cy + th);
                        ctx.lineTo(cx, cy + th * 2);
                        ctx.lineTo(cx - tw, cy + th);
                        ctx.closePath();
                        ctx.fill();
                    }
                }
                
                // Furniture (sorted by depth)
                const sortedFurniture = [...FURNITURE].sort((a, b) => (a.y + a.x) - (b.y + b.x));
                for (const f of sortedFurniture) {
                    const p = m.toScreen(f.x, f.y, 0);
                    const px = (p.x - this.cam.x) * this.cam.zoom;
                    const py = (p.y - this.cam.y) * this.cam.zoom;
                    f.render(ctx, px, py, this.cam.zoom, time);
                }
                
                // Agents (sorted by depth)
                const sortedAgents = Array.from(this.agents.values())
                    .sort((a, b) => (a.y + a.x) - (b.y + b.x));
                
                for (const agent of sortedAgents) {
                    agent.render(ctx, m, this.cam);
                }
            }
            
            renderUI() {
                const list = document.getElementById('agentList');
                list.innerHTML = `<div style="color:#00d4ff;font-family:'Press Start 2P';font-size:0.5rem;margin-bottom:15px;">👥 AGENTS</div>` +
                    Array.from(this.agents.values()).map(a => 
                        `<div class="agent-card" onclick="findAgent('${a.config.id}')">` +
                            `<div style="width:40px;height:40px;border:2px solid ${a.config.color};display:flex;align-items:center;justify-content:center;border-radius:4px;font-size:1.2rem;">${a.config.emoji}</div>` +
                            `<div style="flex:1;">` +
                                `<div style="font-weight:bold;">${a.config.name}</div>` +
                                `<div style="font-size:0.7rem;color:#888;">${a.config.role}</div>` +
                                `${a.useFallback ? '<div style="font-size:0.6rem;color:#ffc107;">⚠️ Fallback</div>' : ''}` +
                            `</div>` +
                        `</div>`
                    ).join('');
            }
        }

        // ============================================
        // UTILS
        // ============================================
        let renderMode = 'sprites';
        let game;

        function setMode(mode) {
            renderMode = mode;
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            addToChat('System', `Mode: ${mode.toUpperCase()}`, '#00d4ff');
        }

        function addToChat(name, text, color) {
            const history = document.getElementById('chatHistory');
            const msg = document.createElement('div');
            msg.style.cssText = 'margin-bottom:6px;padding:6px;background:rgba(255,255,255,0.1);border-radius:4px;font-size:0.85rem;';
            msg.innerHTML = `<span style="color:${color};font-weight:bold;">${name}:</span> ${text}`;
            history.insertBefore(msg, history.firstChild);
            while (history.children.length > 15) history.removeChild(history.lastChild);
        }

        function init() { game = new Game(); game.init(); }
        function resetCam() { game.cam.x = 0; game.cam.y = -50; game.cam.zoom = 0.7; }
        function toggleList() { document.getElementById('agentList').classList.toggle('active'); }
        function toggleView() { game.viewMode = game.viewMode === 'iso' ? 'topdown' : 'iso'; }
        function zoomIn() { game.cam.zoom = Math.min(2.5, game.cam.zoom * 1.15); }
        function zoomOut() { game.cam.zoom = Math.max(0.4, game.cam.zoom / 1.15); }
        function findAgent(id) {
            const agent = game.agents.get(id);
            if (agent) {
                game.cam.x = game.iso.toScreen(agent.x, agent.y, 0).x - game.c.width/2/game.cam.zoom;
                game.cam.y = game.iso.toScreen(agent.x, agent.y, 0).y - game.c.height/2/game.cam.zoom;
            }
        }

        window.addEventListener('load', init);
    </script>
</body>
</html>
