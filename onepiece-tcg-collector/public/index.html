<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏴‍☠️ One Piece TCG Collector | Price Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&family=Press+Start+2P&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-primary: #1a1a2e;
            --bg-secondary: #16213e;
            --bg-card: #0f3460;
            --bg-card-hover: #1a4a7a;
            --text-primary: #ffffff;
            --text-secondary: #a0a0a0;
            --accent-gold: #ffd700;
            --accent-red: #e94560;
            --accent-blue: #00d9ff;
            --accent-green: #00ff88;
            --border-color: #2d3a5a;
            --shadow-color: rgba(0, 0, 0, 0.5);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'VT323', monospace;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            font-size: 18px;
        }

        .header {
            background: linear-gradient(135deg, var(--bg-secondary) 0%, var(--bg-card) 100%);
            border-bottom: 4px solid var(--accent-gold);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 20px var(--shadow-color);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .logo-icon {
            font-size: 3rem;
            filter: drop-shadow(0 0 10px var(--accent-gold));
        }

        .logo-text {
            font-family: 'Press Start 2P', cursive;
            font-size: 0.7rem;
            line-height: 1.4;
        }

        .logo-text span {
            color: var(--accent-gold);
            text-shadow: 0 0 10px var(--accent-gold);
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        /* Search Section */
        .search-section {
            text-align: center;
            padding: 3rem 0;
        }

        .search-title {
            font-family: 'Press Start 2P', cursive;
            font-size: 1.2rem;
            margin-bottom: 1.5rem;
            color: var(--accent-gold);
            text-shadow: 0 0 20px var(--accent-gold);
        }

        .search-box {
            max-width: 700px;
            margin: 0 auto;
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 1rem 1.5rem;
            font-size: 1.3rem;
            font-family: 'VT323', monospace;
            background: var(--bg-secondary);
            border: 3px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-primary);
            outline: none;
            transition: all 0.3s;
        }

        .search-input:focus {
            border-color: var(--accent-gold);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
        }

        .search-btn {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            padding: 0.6rem 1.5rem;
            background: var(--accent-gold);
            color: #000;
            border: none;
            border-radius: 5px;
            font-family: 'VT323', monospace;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .search-btn:hover {
            background: #ffed4e;
            transform: translateY(-50%) scale(1.05);
        }

        /* Suggestions */
        .suggestions {
            margin-top: 1rem;
            padding: 1rem;
            background: var(--bg-card);
            border-radius: 8px;
            border: 2px solid var(--accent-red);
            display: none;
        }

        .suggestions.show {
            display: block;
        }

        .suggestions h4 {
            color: var(--accent-red);
            margin-bottom: 0.5rem;
        }

        .suggestion-item {
            padding: 0.5rem;
            cursor: pointer;
            border-radius: 4px;
            transition: background 0.2s;
        }

        .suggestion-item:hover {
            background: var(--bg-card-hover);
        }

        /* Results Grid */
        .results-section {
            margin-top: 2rem;
        }

        .results-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .results-count {
            color: var(--text-secondary);
        }

        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 1.5rem;
        }

        /* Card Component */
        .card-item {
            background: var(--bg-card);
            border: 3px solid var(--border-color);
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.3s;
            cursor: pointer;
        }

        .card-item:hover {
            transform: translateY(-5px);
            border-color: var(--accent-gold);
            box-shadow: 0 10px 30px rgba(255, 215, 0, 0.2);
        }

        .card-header {
            background: var(--bg-secondary);
            padding: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--border-color);
        }

        .card-number {
            font-family: 'Press Start 2P', cursive;
            font-size: 0.6rem;
            color: var(--accent-blue);
        }

        .card-rarity {
            padding: 0.3rem 0.8rem;
            border-radius: 4px;
            font-size: 0.9rem;
            font-weight: bold;
        }

        .rarity-SEC { background: linear-gradient(135deg, #ffd700, #ffed4e); color: #000; }
        .rarity-SR { background: linear-gradient(135deg, #c0c0c0, #e8e8e8); color: #000; }
        .rarity-R { background: linear-gradient(135deg, #cd7f32, #daa520); color: #fff; }
        .rarity-U { background: linear-gradient(135deg, #4169e1, #6495ed); color: #fff; }
        .rarity-C { background: var(--bg-card-hover); color: var(--text-secondary); }

        .card-body {
            padding: 1rem;
        }

        .card-name {
            font-size: 1.4rem;
            margin-bottom: 0.3rem;
            color: var(--text-primary);
        }

        .card-name-jp {
            font-size: 1rem;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
        }

        .card-set {
            font-size: 0.9rem;
            color: var(--accent-blue);
        }

        /* Price Grid */
        .price-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.5rem;
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 2px solid var(--border-color);
        }

        .price-box {
            text-align: center;
            padding: 0.5rem;
            background: var(--bg-secondary);
            border-radius: 6px;
        }

        .price-label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-bottom: 0.3rem;
        }

        .price-value {
            font-size: 1.1rem;
            font-weight: bold;
        }

        .price-en { color: var(--accent-green); }
        .price-jp { color: var(--accent-blue); }

        /* Detail Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 2rem;
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal-content {
            background: var(--bg-primary);
            border: 4px solid var(--accent-gold);
            border-radius: 16px;
            max-width: 900px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
        }

        .modal-close {
            position: absolute;
            top: 1rem;
            right: 1rem;
            font-size: 2rem;
            background: none;
            border: none;
            color: var(--text-primary);
            cursor: pointer;
        }

        .modal-body {
            padding: 2rem;
        }

        .detail-header {
            display: flex;
            gap: 2rem;
            margin-bottom: 2rem;
        }

        .detail-image {
            width: 250px;
            height: 350px;
            background: var(--bg-card);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            border: 3px solid var(--border-color);
        }

        .detail-info h2 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            color: var(--accent-gold);
        }

        .detail-info h3 {
            font-size: 1.2rem;
            color: var(--text-secondary);
            margin-bottom: 1rem;
        }

        .detail-stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.5rem;
            margin-top: 1rem;
        }

        .stat-item {
            padding: 0.5rem;
            background: var(--bg-card);
            border-radius: 6px;
        }

        .stat-label {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .stat-value {
            font-size: 1.1rem;
            color: var(--accent-blue);
        }

        /* Price Table */
        .price-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }

        .price-table th,
        .price-table td {
            padding: 1rem;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
        }

        .price-table th {
            background: var(--bg-secondary);
            font-family: 'Press Start 2P', cursive;
            font-size: 0.6rem;
            color: var(--accent-gold);
        }

        .grade-badge {
            padding: 0.3rem 0.8rem;
            border-radius: 4px;
            font-size: 0.9rem;
        }

        .grade-psa10 { background: var(--accent-gold); color: #000; }
        .grade-psa9 { background: var(--accent-blue); color: #000; }
        .grade-ungraded { background: var(--text-secondary); color: #000; }

        /* Chart Container */
        .chart-container {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 1rem;
            margin-top: 2rem;
            height: 300px;
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 3rem;
            font-size: 1.5rem;
            color: var(--accent-gold);
        }

        .loading::after {
            content: '';
            animation: dots 1.5s infinite;
        }

        @keyframes dots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60%, 100% { content: '...'; }
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 2rem;
            margin-top: 3rem;
            border-top: 2px solid var(--border-color);
            color: var(--text-secondary);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .results-grid {
                grid-template-columns: 1fr;
            }
            
            .detail-header {
                flex-direction: column;
                align-items: center;
            }
            
            .detail-image {
                width: 200px;
                height: 280px;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo">
            <div class="logo-icon">🏴‍☠️</div>
            <div class="logo-text">
                ONE PIECE<br>
                <span>TCG COLLECTOR</span>
            </div>
        </div>
        <div style="color: var(--text-secondary);">
            🔄 Last Updated: <span id="lastUpdated">--</span>
        </div>
    </header>

    <div class="container">
        <section class="search-section">
            <h1 class="search-title">SEARCH THE GRAND LINE</h1>
            <div class="search-box">
                <input 
                    type="text" 
                    class="search-input" 
                    id="searchInput"
                    placeholder="Search cards (e.g., 'Luffy', 'Shanks', 'OP01-001')..."
                    autocomplete="off"
                >
                <button class="search-btn" onclick="searchCards()">SEARCH</button>
            </div>
            <div class="suggestions" id="suggestions">
                <h4>🔍 Did you mean:</h4>
                <div id="suggestionsList"></div>
            </div>
        </section>

        <section class="results-section" id="resultsSection" style="display: none;">
            <div class="results-header">
                <h2>🏆 Search Results</h2>
                <span class="results-count" id="resultsCount"></span>
            </div>
            <div class="results-grid" id="resultsGrid"></div>
        </section>

        <section class="loading" id="loading" style="display: none;">
            Searching the Grand Line
        </section>
    </div>

    <!-- Card Detail Modal -->
    <div class="modal-overlay" id="cardModal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal()">×</button>
            <div class="modal-body" id="modalBody">
                <!-- Dynamic content -->
            </div>
        </div>
    </div>

    <footer class="footer">
        🏴‍☠️ One Piece TCG Collector | Auto-updates daily at 3:00 AM<br>
        Supports English & Japanese markets | PSA, BGS & Ungraded prices
    </footer>

    <script src="app.js"></script>
</body>
</html>
